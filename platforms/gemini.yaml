# Gemini Platform Configuration
platform: gemini
url_pattern: gemini.google.com
base_url: https://gemini.google.com/app
verify_navigation: false
tab_shortcut: alt+3

capabilities:
  # "Open mode picker" button — radio menu items with descriptions
  # Mode picker is SEPARATE from Tools menu
  models:
    - 3.5 Flash All-around help New
    - 3.5 Thinking Solves complex problems
    - 3.1 Pro Advanced math and code
  modes: []
  tools:
    # "Tools" button -> check menu items (AT-SPI do_action opens dropdown)
    # Also accessible via @-mention in input field (type @ to see tool list)
    - Create image New
    - Canvas
    - Deep research
    - Create video
    - Create music New
    - Learn
    - Deep think
  sources: []

# Click strategy: atspi_first (AT-SPI do_action reliable) or xdotool_first (default for React portals)
click_strategy: atspi_first

# How attach works: do_action on "Open upload file menu" → AT-SPI menu → click "Upload files"
attach_method: atspi_menu
# How dropdowns work: AT-SPI enumerates menu items after click
dropdown_method: atspi_enum

consultation_defaults:
  model: null
  mode: deep_think
  attach_method: atspi_menu
  extract_method: last_copy_button

quirks:
  - sidebar: "Left sidebar CLOSED, right sidebar always CLOSE"
  - tree_depth: "AT-SPI tree nests buttons at depth 16-20 (deeper than others)"
  - artifacts: "Use export_menu or tile_then_export for artifact extraction"
  - attach: "Button 'Open upload file menu' -> dropdown with items: 'Upload files. Documents, data, code files', 'Add from Drive. Sheets, Docs, Slides', 'Import code', 'NotebookLM'. File attach shifts input Y - always re-inspect after attach. File dialog is Firefox-embedded GTK (Ctrl+L for path entry)."
  - model_default: "Pro (3.1 Pro) is default."
  - mode_picker: "'Open mode picker' button near input. Radio menu items: Fast, Thinking, Pro."
  - tools_button: "'Tools' button opens check menu item list. AT-SPI do_action(0) opens it reliably. Coordinate click does NOT work on landing page."
  - at_mention: "Type '@' in input to see inline tool picker. Alternative to Tools button."
  - deep_research_flow: "Deep Research is multi-step: sends plan card first -> click 'Start research' -> actual research (5-10 min). Must respawn_monitor after clicking Start research."

stop_patterns:
  - stop
  - stop response
  - cancel

mode_guidance:
  deep_think:
    when: "Architecture-grade scrutiny, complex multi-step reasoning"
    how: "Click mode picker, select 3.5 Thinking, then click 'Upload & tools' (+), click 'More tools' at bottom of flyout to expand, click 'Deep think' check menu item. Verify by 'Deselect Deep think' push button appearing in composer."
    timeout: 3600
    steps:
      - trigger: mode_picker
        select: model_3_5_thinking
      - trigger: upload_tools
        select: more_tools_button
      - trigger: null
        select: deep_think_item
    validation:
      deep_think_active:
        indicators:
          - name: "Deselect Deep think"
            role: push button
  deep_research:
    when: "Research questions, fact-finding, comprehensive analysis"
    how: "Click 'Tools' button, select 'Deep research' check menu item"
    timeout: 3600
    note: "Multi-step: plan card -> click 'Start research' -> respawn_monitor -> extract via Share & Export > Copy Content"
    post_send_action:
      type: click_button
      name_contains: Start research
      wait_before: 3
  thinking:
    when: "Medium complexity reasoning"
    how: "Click 'Open mode picker', select 'Thinking' radio item"
    timeout: 3600
  normal:
    when: "Quick questions, creative writing, conversational"
    how: "Default mode — no selection needed"
    timeout: 1800

# ─── Sidebar Fence ────────────────────────────────────────────────
# When this element is encountered during traversal, it is collected but
# all remaining siblings in the parent are skipped. Excludes sidebar history.
fence_after:
  - { name: "Chats", role: heading }

# ─── Element Filtering ───────────────────────────────────────────────
element_filter:
  exclude:
    names:
      - "Gemini"                     # document web root
    name_contains:
      - "Gemini Apps Activity"
      - "Manage extensions"
      - ", Google Account"
      - "tap to use tool"
    roles:
      - separator
      - document web
      - paragraph                    # ProseMirror wrapper in input


element_map:
  input:
    role: entry
    states_include: [editable]
    # Gemini also uses contenteditable sections — match either
  input_alt:
    role_contains: section
    states_include: [editable, focusable, multi-line]
  mode_picker:
    # Live name is stateful. Driver discovers the exact current label at runtime.
    name_pattern: "Open mode picker, currently *"
    role: push button
  # Gemini merged "Tools" and the upload menu into one "Upload & tools"
  # button (UI 2026-05-21); both keys reference the same live element.
  tools_button:
    name: "Upload & tools"
    role: push button
  upload_tools:
    name: "Upload & tools"
    role: push button
  upload_menu:
    name: "Upload & tools"
    role: push button
  # "Deep think" / "Guided learning" sit behind this expander inside the
  # Upload & tools menu — expand before the deep_think item is in the tree.
  more_tools_button:
    name: "More tools"
    role: push button
  deep_think_item:
    name: "Deep think"
    role: check menu item
  deep_think_active:
    name: "Deselect Deep think"
    role: push button
  copy_button:
    name_contains: "Copy"
    role_contains: button
  stop_button:
    name: "Stop response"
    role: push button
  send_button:
    name: "Send message"
    role: push button
  share_export:
    name_contains: "Share & export"
    role_contains: button
  start_research:
    name: "Start research"
    role: push button
  microphone:
    name: "Microphone"
    role: toggle button
  # Menu items (visible when dropdown is open)
  upload_files_item:
    name_pattern: "Upload files*"
    role: menu item
  add_from_drive_item:
    name_pattern: "Add from Drive*"
    role: menu item
  import_code_item:
    name: "Import code"
    role: menu item
  notebooklm_item:
    name: "NotebookLM"
    role: menu item
  # Mode picker items
  mode_fast:
    name: "3.5 Flash All-around help New"
    role: radio menu item
  model_3_5_thinking:
    name: "3.5 Thinking Solves complex problems"
    role: radio menu item
  mode_thinking:
    name: "3.5 Thinking Solves complex problems"
    role: radio menu item
  mode_pro:
    name: "3.1 Pro Advanced math and code"
    role: radio menu item
  tool_deep_research:
    name: "Deep research"
    role_contains: item
  tool_canvas:
    name: "Canvas"
    role_contains: item
  tool_create_image:
    name_contains: "Create image"
    role_contains: item

sidebar_nav:
  - { name: "New chat", role: link }
  - { name: "New chat", role: push button }
  - { name: "Main menu", role: push button }
  - { name: "Search", role: push button }
  - { name: "Projects", role: push button }
  - { name: "New Project", role: push button }
  - { name: "History", role: push button }
  - { name: "My stuff", role: link }
  - { name: "Gems", role: link }
  - { name: "Chats", role: heading }
  - { name: "Settings & help", role: push button }
  - { name: "Show chat history", role: push button }
  - { name: "Settings", role: link }
  - { name: "Help & FAQ", role: link }

# ─── Validation Expectations ───────────────────────────────────────
validation:
  attach_success:
    # Gemini's visual file chip is not exposed to AT-SPI. Trust the exact
    # dialog lifecycle signal instead: successful selection closes the file dialog.
    method: file_dialog_close
  model_selected:
    # Mode picker button doesn't change text — read from mode items' checked state
    read_from: mode_picker
    check_menu_item_state: true
  tool_selected:
    # Tool check menu items have "checked" state when active
    read_from: tools_button
    check_menu_item_state: true
  send_success:
    indicators:
      - stop_button
    timeout: 30
  response_complete:
    indicators:
      - copy_button
    stop_absent: true
