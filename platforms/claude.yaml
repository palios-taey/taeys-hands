# Claude Platform Configuration
platform: claude
url_pattern: claude.ai
base_url: https://claude.ai/new
tab_shortcut: alt+2

capabilities:
  # Model button shows current model name (e.g. "Opus 4.6 Extended", "Sonnet 4.6")
  # Click opens dropdown with Extended thinking toggle + More models link
  # Available models (via More models): Opus 4.6, Sonnet 4.6, Haiku 4.5
  models:
    - Extended thinking Think longer for complex tasks
    - More models
  # "Toggle menu" button dropdown — contains both tools and sources
  modes: []
  tools:
    - Research Deep web research with multiple search passes
    - Web search Quick web lookup for current information
  sources:
    - Add files or photos Ctrl+U
    - Take a screenshot
    - Add to project
    - Add from Google Drive
    - Add from GitHub
    - Use style
    - Connectors

# Click strategy: xdotool_first (xdotool coordinate clicks work reliably on Claude menus)
click_strategy: xdotool_first

# How attach works: click "Toggle menu" → AT-SPI menu items appear → click "Add files or photos"
attach_method: atspi_menu
# How dropdowns work: AT-SPI enumerates menu items after click
dropdown_method: atspi_enum

quirks:
  - sidebar: "Left sidebar OPEN, right sidebar always CLOSE before interaction"
  - artifacts: "Code/documents appear as artifacts - use preview_then_copy strategy"
  - attach: "'Toggle menu' button -> 'Add files or photos' menu item. xdotool coordinate clicks work on Claude menu items."
  - model_default: "Sonnet 4.6 is default for Pro plans. Opus 4.6 Extended for Max plans."
  - model_selector: "Button shows current model name. Click opens dropdown with Extended thinking toggle and More models link."
  - paste_as_document: "Large clipboard pastes (>5KB) auto-convert to 'Pasted Text' document chip. Workaround for broken file dialog."
  - prosemirror: "ProseMirror contenteditable does NOT accept AT-SPI insert_text(). Clipboard paste is the only reliable input method."

stop_patterns:
  - stop
  - stop response

mode_guidance:
  extended_thinking:
    when: "Complex reasoning, code generation, architectural review, multi-step analysis"
    how: "Click model button, toggle 'Extended thinking' on, or select model with 'Extended' suffix"
    timeout: 3600
  research:
    when: "Need multi-pass web research, current events, comprehensive documentation lookup"
    how: "Toggle menu -> enable 'Research' check menu item"
    timeout: 3600
  web_search:
    when: "Quick web lookup, URL verification, single-query search"
    how: "Toggle menu -> enable 'Web search' check menu item"
    timeout: 1800
  normal:
    when: "Quick questions, simple tasks, conversational"
    how: "Default model without Extended thinking"
    timeout: 1800

# ─── Sidebar Fence ────────────────────────────────────────────────
# When this element is encountered during traversal, it is collected but
# all remaining siblings in the parent are skipped. Excludes starred
# projects and recent chat history links.
fence_after:
  - { name: "Starred", role: heading }

# ─── Element Filtering ───────────────────────────────────────────────
element_filter:
  exclude:
    names:
      - "Close sidebar"
      - "Claude"                     # logo image + document web root
      - "Profile image"
      - "Sidebar"                    # landmark container
    name_contains:
      - "Upgrade to"
      - ", Settings"                 # "Jesse LaRose, Settings" button
      - "Get apps and extensions"
      - "Claude's choice"            # prompt suggestion
    roles:
      - separator
      - document web
      - paragraph                    # ProseMirror paragraph wrappers
      - list item                    # Sidebar history (Starred projects + Recents)

element_map:
  input:
    name: "Write your prompt to Claude"
    role: entry
    states_include: [editable]
  toggle_menu:
    name_contains: ["Add files", "Toggle menu"]
    role: push button
  upload_files_item:
    name_contains: ["Add files", "Add content"]
    role_contains: item
  model_selector:
    name_contains: ["Opus 4.6 Extended", "Sonnet 4.6 Extended", "Sonnet 4.6", "Haiku 4.5"]
    role: push button
  # Model dropdown items
  model_opus:
    name_contains: "Opus 4.6 Most capable"
    role: push button
  model_sonnet:
    name_contains: "Sonnet 4.6 Most efficient"
    role: push button
  model_haiku:
    name_contains: "Haiku 4.5 Fastest"
    role: push button
  model_sonnet_extended:
    name: "Sonnet 4.6 Extended"
    role: push button
  model_extended_thinking:
    name_contains: "Extended thinking"
    role: push button
  model_more:
    name: "More models"
    role: push button
  copy_button:
    name_contains: "Copy"
    role_contains: button
  stop_button:
    name_contains: "Stop"
    role_contains: button
  # Prompt category tabs (main content area, not sidebar)
  prompt_categories:
    name: "Prompt categories"
    role: page tab list
  prompt_tab:
    name_contains: ["Write", "Learn", "Code", "Life stuff", "From Drive"]
    role: page tab
  open_sidebar:
    name: "Open sidebar"
    role: push button
  incognito:
    name_contains: "Use incognito"
    role: push button
  send_button:
    name: "Send message"
    role: push button
  scroll_to_bottom:
    name: "Scroll to bottom"
    role: push button

sidebar_nav:
  - { name: "Home", role: link }
  - { name: "New chat", role: link }
  - { name: "Search", role: link }
  - { name: "Customize", role: link }
  - { name: "Chats", role: link }
  - { name: "Projects", role: link }
  - { name: "Artifacts", role: link }
  - { name: "Code", role: link }
  - { name: "Starred", role: heading }
  - { name_pattern: "Recents*", role: push button }

# ─── Validation Expectations ───────────────────────────────────────
validation:
  attach_success:
    # Claude shows file chips as "Pasted Text" document chip or filename heading
    indicators:
      - { name_contains: "Remove", role_contains: button }
    file_chip:
      roles: [heading, push button, toggle button]
      name_match: filename_extension
  model_selected:
    # Model selector button name IS the current model name
    # e.g. "Opus 4.6 Extended", "Sonnet 4.6"
    read_from: model_selector
    name_is_model: true
  send_success:
    indicators:
      - stop_button
    timeout: 30
  response_complete:
    indicators:
      - copy_button
    stop_absent: true
