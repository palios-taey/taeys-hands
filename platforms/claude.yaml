# Claude Platform Configuration
platform: claude
url_pattern: claude.ai
base_url: https://claude.ai/new
verify_navigation: false
tab_shortcut: alt+2

capabilities:
  # Model button shows current model name (e.g. "Opus 4.8 High", "Sonnet 4.6")
  # Click opens dropdown with model items plus Effort High and More models
  # Available models: Opus 4.8, Sonnet 4.6, Haiku 4.5 (UI 2026-05-29)
  models:
    - Effort High
    - More models
  # "Toggle menu" button dropdown — contains both tools and sources
  modes: []
  tools:
    - Research Deep web research with multiple search passes
    - Web search Quick web lookup for current information
  sources:
    - Add files or photos Ctrl+U
    - Take a screenshot
    - Add to project
    - Add from Google Drive
    - Add from GitHub
    - Use style
    - Connectors

# Click strategy: xdotool_first (xdotool coordinate clicks work reliably on Claude menus)
click_strategy: xdotool_first

# How attach works: click "Toggle menu" → AT-SPI menu items appear → click "Add files or photos"
attach_method: atspi_menu
# How dropdowns work: AT-SPI enumerates menu items after click
dropdown_method: atspi_enum

workflow:
  attachment:
    # Ctrl+U opens file dialog directly, bypassing AT-SPI portal scanning.
    # More reliable than toggle_menu → menu_snapshot → upload_files_item.
    keyboard_shortcut: ctrl+u

consultation_defaults:
  model: null
  mode: extended_thinking
  attach_method: atspi_menu
  extract_method: last_copy_button

quirks:
  - sidebar: "Left sidebar OPEN, right sidebar always CLOSE before interaction"
  - artifacts: "Code/documents appear as artifacts - use preview_then_copy strategy"
  - attach: "'Toggle menu' button -> 'Add files or photos' menu item. xdotool coordinate clicks work on Claude menu items."
  - model_default: "Opus 4.8 High is the fresh-session default observed on Max plans (UI 2026-05-29)."
  - model_selector: "Button shows current model name. Click opens dropdown with model radio items plus 'Effort High' and 'More models'."
  - paste_as_document: "Large clipboard pastes (>5KB) auto-convert to 'Pasted Text' document chip. Workaround for broken file dialog."
  - prosemirror: "ProseMirror contenteditable does NOT accept AT-SPI insert_text(). Clipboard paste is the only reliable input method."

stop_patterns:
  - stop
  - stop response

mode_guidance:
  extended_thinking:
    when: "Complex reasoning, code generation, architectural review, multi-step analysis"
    how: "Click model_selector ('Model: Opus 4.8 High') and select 'Opus 4.8 Most capable for ambitious work'. Fresh Opus 4.8 sessions currently realize extended thinking as 'High' with no separate Adaptive toggle exposed (UI 2026-05-29)"
    timeout: 3600
    steps:
      - trigger: model_selector
        select: opus
  research:
    when: "Need multi-pass web research, current events, comprehensive documentation lookup"
    how: "Toggle menu -> enable 'Research' check menu item"
    timeout: 3600
  web_search:
    when: "Quick web lookup, URL verification, single-query search"
    how: "Toggle menu -> enable 'Web search' check menu item"
    timeout: 1800
  normal:
    when: "Quick questions, simple tasks, conversational"
    how: "Default model — no selection needed"
    timeout: 1800

# ─── Sidebar Fence ────────────────────────────────────────────────
# When this element is encountered during traversal, it is collected but
# all remaining siblings in the parent are skipped. Excludes starred
# projects and recent chat history links.
fence_after:
  - { name: "Starred", role: heading }

# ─── Element Filtering ───────────────────────────────────────────────
element_filter:
  exclude:
    names:
      - "Close sidebar"
      - "Claude"                     # logo image + document web root
      - "Profile image"
      - "Sidebar"                    # landmark container
    name_contains:
      - "Upgrade to"
      - ", Settings"                 # "Jesse LaRose, Settings" button
      - "Get apps and extensions"
      - "Claude's choice"            # prompt suggestion
    roles:
      - separator
      - document web
      - paragraph                    # ProseMirror paragraph wrappers
      - list item                    # Sidebar history (Starred projects + Recents)

element_map:
  input:
    name: "Write your prompt to Claude"
    role: entry
    states_include: [editable]
  toggle_menu:
    name_contains: ["Add files", "Toggle menu"]
    role: push button
  upload_files_item:
    name: Add files or photos Ctrl+U
    role: menu item
  git_connector_item:
    name: "Add from GitHub"
    role_contains: item
  # GitHub flow (verified live 2026-05-22): git_connector_item ->
  # "Try Claude Code for GitHub" modal -> github_continue_sync ->
  # "Add content from GitHub" modal (repo combo / paste URL -> pick files)
  github_continue_sync:
    name: "Continue to GitHub sync"
    role: push button
  github_paste_url:
    name: "Paste GitHub URL"
    role: push button
  model_selector:
    name_pattern: "Model: *"
    role: push button
  # Model dropdown items (UI as of 2026-05-29; live AT-SPI roles)
  model_opus:
    name: "Opus 4.8 Most capable for ambitious work"
    role: radio menu item
  model_sonnet:
    name: "Sonnet 4.6 Most efficient for everyday tasks"
    role: radio menu item
  model_haiku:
    name: "Haiku 4.5 Fastest for quick answers"
    role: radio menu item
  model_effort_high:
    name: "Effort High"
    role: menu item
  model_more:
    name: "More models"
    role: menu item
  copy_button:
    name_contains: "Copy"
    role_contains: button
  stop_button:
    name: "Stop response"
    role: push button
  # Prompt category tabs (main content area, not sidebar)
  prompt_categories:
    name: "Prompt categories"
    role: page tab list
  prompt_tab:
    name_contains: ["Write", "Learn", "Code", "Life stuff", "From Drive"]
    role: page tab
  open_sidebar:
    name: "Open sidebar"
    role: push button
  incognito:
    name_contains: "Use incognito"
    role: push button
  send_button:
    name: "Send message"
    role: push button
  scroll_to_bottom:
    name: "Scroll to bottom"
    role: push button

sidebar_nav:
  - { name: "Home", role: link }
  - { name: "New chat", role: link }
  - { name: "Search", role: link }
  - { name: "Customize", role: link }
  - { name: "Chats", role: link }
  - { name: "Projects", role: link }
  - { name: "Artifacts", role: link }
  - { name: "Code", role: link }
  - { name: "Starred", role: heading }
  - { name_pattern: "Recents*", role: push button }

# ─── Validation Expectations ───────────────────────────────────────
validation:
  attach_success:
    # Claude shows file chips as "Pasted Text" document chip or filename heading
    indicators:
      - { name_contains: "Remove", role_contains: button }
    file_chip:
      roles: [heading, push button, toggle button]
      name_match: filename_extension
  model_selected:
    # Model selector button name IS the current model name
    # e.g. "Opus 4.7 Adaptive", "Sonnet 4.6"
    read_from: model_selector
    name_is_model: true
  send_success:
    indicators:
      - stop_button
    timeout: 30
  response_complete:
    indicators:
      - copy_button
    stop_absent: true
