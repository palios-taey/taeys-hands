# Claude Platform Configuration
platform: claude
url_pattern: claude.ai
base_url: https://claude.ai/new
tab_shortcut: alt+2

capabilities:
  models:
    - Claude 4.5 Sonnet
    - Claude 4 Opus
    - Claude 3.5 Haiku
  modes: []
  tools:
    - Extended thinking
    - Research
    - Artifacts
  sources: []

quirks:
  - sidebar: "Left sidebar OPEN, right sidebar always CLOSE before interaction"
  - artifacts: "Code/documents appear as artifacts - use preview_then_copy strategy"
  - attach: "Dropdown with 'Add files or photos' item. xdotool coordinate clicks work on Claude menu items."
  - model_default: "Sonnet 4.6 Extended is default."

stop_patterns:
  - stop
  - stop response

mode_guidance:
  extended_thinking:
    when: "Complex reasoning, code generation, architectural review, multi-step analysis"
    how: "Select model with 'Extended' suffix (e.g., 'Opus 4.6 Extended')"
    timeout: 3600
    note: "Thinking is built into model selection, not a separate toggle"
  research:
    when: "Need web search, current information, documentation lookup"
    how: "Enable 'Research' tool toggle"
    timeout: 3600
  normal:
    when: "Quick questions, simple tasks, conversational"
    how: "Default model without Extended suffix"
    timeout: 1800

element_hints:
  input_role: textbox
  send_role: push button
  send_name_pattern: send
  copy_name_pattern: copy
