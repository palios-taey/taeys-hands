# X/Twitter Platform Configuration
platform: x_twitter
url_pattern: x.com
base_url: <AUXILIARY_URL>
tab_shortcut: alt+6

capabilities:
  models: []
  modes: []
  tools: []
  sources: []

attach_method: none
dropdown_method: none

quirks:
  - compose: "Compose button opens tweet editor"
  - media: "Supports image/video attachments"
  - threads: "Multiple tweets can be chained as threads"
  - reply_to_reply: "To reply to someone's reply: click their post article to navigate to their status URL, then use the compose box at the BOTTOM of that page. Do NOT click 'N Replies. Reply' on the parent post — that replies to the parent, not the reply."
  - draftjs_input: "All text input must use clipboard paste (DraftJS ignores AT-SPI DOM mutations and xdotool type)"

stop_patterns: []

# Elements to exclude from taey_inspect output.
# Name/role based only — NO coordinate exclusions (breaks on window resize).
# Left sidebar is NOT excluded — it contains actionable links (Articles, Profile, etc.).
inspect_noise:
  exclude_roles:
    - list item          # right sidebar profile/trending cards (tweets use 'article' role)
  exclude_names:         # exact match
    # Right sidebar noise
    - "What's happening"
    - "Trending now"
    - "Trending"
    - "Relevant people"
    - "Who to follow"
    - "Live on X"
    # Footer
    - "Terms of Service"
    - "Privacy Policy"
    - "Cookie Policy"
    - "Accessibility"
    - "Ads info"
  exclude_name_contains: # substring match
    - " · Trending "
    - "Trending with"
    - "Hosted by"        # Live Spaces banners
    - "undefined unread"  # badge noise
    - " followers"        # follower count links in right sidebar
    - "posts · "          # post count links
    - " following"        # following count links
  # Drop everything below the reply compose field (thread replies, suggested
  # posts, "More posts" sections). Buttons/links/controls below are kept.
  cutoff_below_editable: true

element_hints:
  input_role: textbox
  send_role: push button
  send_name_pattern: post
  compose_name_pattern: compose

# ─── Action flows ─────────────────────────────────────────────────────────────
# Each flow names the AT-SPI elements (by role + name pattern) to find and the
# action sequence. Scripts read this YAML to know what to look for instead of
# rederiving each session. All flows assume DISPLAY=:7 and PLATFORM_DISPLAYS
# already maps x_twitter→:7. Element coords are NOT hardcoded — scripts query
# AT-SPI fresh each call, validate the bbox is in-viewport (0 < y < 1080), and
# scroll into view if not.
#
# Verified working 2026-05-20 in a single live session.
flows:
  original:
    # Single original post (not thread)
    description: Post a single tweet via the compose modal
    navigate_to: https://x.com/compose/post
    settle_after_nav_seconds: 5
    steps:
      - find:
          role: entry
          name: Post text
          states_required: [editable]
          require_in_viewport: true
        action: click
        post_delay_seconds: 0.8
      - action: paste_text
        post_delay_seconds: 1.0
      - action: key
        key: ctrl+Return
        post_delay_seconds: 3
    verify_externally:
      navigate_to: https://x.com/jesselarose
      settle_seconds: 6
      atspi_text_fragment_search: true  # text_landed_externally(fragment)

  reply:
    description: Reply to an existing thread via the compose modal (NOT inline)
    navigate_to: "{thread_url}"  # caller substitutes
    settle_after_nav_seconds: 6
    # CRITICAL: inline 'Post text' entry below the tweet is unreliable to focus
    # (often at viewport edge y~1000+). The MODAL compose, opened by clicking the
    # speech-bubble Reply icon under the tweet, is reliable.
    steps:
      - find:
          role: push button
          name_contains: "Reply"
          # The speech-bubble icon is icon-sized (~38x47 typical)
          # Distinguish from the inline submit (75x36) and the action-bar "N Replies. Reply"
          # which is also the icon
          bbox_width_range: [30, 50]
          bbox_height_range: [40, 55]
          require_in_viewport: true
        action: click
        post_delay_seconds: 2
        note: This opens a modal compose dialog centered on screen.
      - find:
          role: entry
          name: Post text
          states_required: [editable, focused]
          require_in_viewport: true
        action: click
        post_delay_seconds: 0.8
      - action: paste_text
        post_delay_seconds: 1.2
      - action: key
        key: ctrl+Return
        post_delay_seconds: 3
    verify_externally:
      navigate_to: https://x.com/jesselarose/with_replies
      settle_seconds: 6
      atspi_text_fragment_search: true

  like:
    description: Like a post via the heart icon (or 'l' keyboard shortcut when post is focused)
    navigate_to: "{thread_url}"
    settle_after_nav_seconds: 6
    steps:
      - find:
          role: push button
          name_pattern: "^[0-9.,Kk]* ?Like[s]?\\. Like$"  # e.g. "59 Likes. Like" or "Like"
          bbox_width_range: [30, 60]
          bbox_height_range: [30, 60]
          require_in_viewport: true
        action: click
        post_delay_seconds: 1.5
    verify_in_place:
      # Same button should now read "Liked" or "Unlike"
      find:
        role: push button
        name_contains: "Liked"  # or "Unlike"
      expected: present
    # Keyboard alternative: focus the tweet, press 'l'

  follow:
    description: Follow an account from their profile page
    navigate_to: https://x.com/{handle}
    settle_after_nav_seconds: 6
    steps:
      - find:
          role: push button
          name_pattern: "^Follow @?{handle}?$"
          # Header-level Follow button on profile page
          bbox_width_range: [50, 120]
          require_in_viewport: true
        action: click
        post_delay_seconds: 2
    verify_in_place:
      find:
        role: push button
        name_pattern: "^Following @?{handle}?$"
      expected: present

  quote_tweet:
    description: Quote tweet — Repost menu → Quote item → modal compose
    navigate_to: "{thread_url}"
    settle_after_nav_seconds: 6
    steps:
      - find:
          role: push button
          name_pattern: "^[0-9.,Kk]* ?repost[s]?\\. Repost$|^Repost$"
          # Icon size, not the menu-item size
          bbox_width_range: [30, 50]
          bbox_height_range: [40, 55]
          require_in_viewport: true
        action: click
        post_delay_seconds: 1.5
        note: Opens a popup menu with Repost + Quote options.
      - find:
          role: push button
          name: Quote
          # Menu items are wider (~114x44)
          bbox_width_range: [80, 200]
          require_in_viewport: true
        action: click
        post_delay_seconds: 2
        note: Opens modal compose with the quoted-tweet embedded.
      - find:
          role: entry
          name: Post text
          states_required: [editable, focused]
          require_in_viewport: true
        action: click
        post_delay_seconds: 0.8
      - action: paste_text
        post_delay_seconds: 1.0
      - action: key
        key: ctrl+Return
        post_delay_seconds: 3
    verify_externally:
      navigate_to: https://x.com/jesselarose/with_replies
      atspi_text_fragment_search: true

  thread:
    description: Multi-tweet thread via compose modal "+ Add post" chaining
    navigate_to: https://x.com/compose/post
    settle_after_nav_seconds: 5
    helper: atspi_helpers.get_compose_textarea + find Add-post button by name='Add post'
    # KEY: the "Add post" button only appears AFTER text is typed into the first
    # textarea. So the sequence is: paste part 1 first, THEN find Add post.
    steps:
      - find:
          role: entry
          name: Post text
          states_required: [editable]
          require_in_viewport: true
        action: click
        post_delay_seconds: 0.8
      - action: paste_text
        text_source: parts[0]
        post_delay_seconds: 1.0
      # Loop the remaining parts:
      - for_each: parts[1:]
        steps:
          - find:
              role: push button
              name: Add post
              # Always the lowest "Add post" in viewport (newest one for current bottom tweet)
              pick: lowest_y
              require_in_viewport: true
            action: click
            post_delay_seconds: 1.5
          - find:
              role: entry
              name: Post text
              states_required: [editable]
              # Newly-added empty textarea — pick the LOWEST y
              pick: lowest_y
              require_in_viewport: true
            action: click
            post_delay_seconds: 0.8
          - action: paste_text
            text_source: current_part
            post_delay_seconds: 1.0
      - find:
          role: push button
          name: Post all
          require_in_viewport: true
        action: click
        post_delay_seconds: 4
    verify_externally:
      navigate_to: https://x.com/jesselarose
      settle_seconds: 6
      atspi_text_fragment_search: true  # check ALL parts landed
      verify_all_parts: true
    notes: |
      X counts a thread as ONE composed post (single Post all submit). Action
      tracker should record as 1 original, not N. Premium+ accounts can chain
      arbitrarily many parts; first one shows in feed timeline, expand to see rest.

  article:
    description: Long-form Article (X Premium+; up to 25k chars)
    # Direct URL is unreliable — /compose/article 404s. Navigate via Articles tab.
    flow:
      - navigate_to: https://x.com/compose/articles
        settle_after_nav_seconds: 5
      # The Articles tab lands you on a "Your drafts live here / This is where you write / Write" landing.
      # The "Write" button name in AT-SPI doesn't match name=='Write' reliably — fallback to coord-find
      # by visible location. Better: click 'Write' via name search OR via the article-edit icon next to "Articles" header.
      - find:
          role: push button
          name_contains: "Write"
          require_in_viewport: true
          # If not found, click the pencil-icon next to "Articles" header at top-right of left panel
        action: click
        fallback_coord: [1175, 620]  # observed Write button location 2026-05-20
        post_delay_seconds: 5
      - find:
          role: entry
          name: Add a title
          require_in_viewport: true
        action: click
        post_delay_seconds: 0.8
      - action: paste_title
        post_delay_seconds: 1.0
      - find:
          role: entry
          name: ""  # empty-name editable below title field
          states_required: [editable]
          # body field is the largest editable section below title
          bbox_height_range: [100, 999]
          require_in_viewport: true
        action: click
        post_delay_seconds: 0.8
      - action: paste_body
        post_delay_seconds: 1.5
      - find:
          role: push button
          name: Publish
          require_in_viewport: true
        action: click
        post_delay_seconds: 3
      # Confirm dialog appears with a second Publish button at center
      - find:
          role: push button
          name: Publish
          require_in_viewport: true
        action: click
        post_delay_seconds: 5
    verify_externally:
      navigate_to: https://x.com/jesselarose/articles
      settle_seconds: 6
      atspi_text_fragment_search: true

# ─── Failure-mode notes (cannot-lie lessons from 2026-05-20 first run) ────────
failure_modes:
  - id: viewport_bounds_silent_false_positive
    description: |
      AT-SPI returns logical coords for off-screen elements (negative y above viewport,
      y > 1080 below). Clicking those coords sends the click to the SCREEN position,
      not the element. The first vllm reply failed because the inline 'Post text'
      entry was at y=1106 (below the 1080 viewport); click went nowhere useful, but
      "page loaded" check passed because elements existed.
    rule: Always validate 0 < (y + h/2) < SCREEN_HEIGHT before clicking. If not in
      viewport, scroll until it is, then re-query.

  - id: inline_reply_field_focus_resistance
    description: |
      The inline 'Post text' entry below a tweet (vs. the modal compose) is hard to
      reliably focus — clicks land but the 'focused' state doesn't set, paste goes
      nowhere. Suspected cause: viewport-edge positioning, z-index issues with floating
      bottom UI (e.g., "Don't miss what's happening" banner).
    rule: For reply flows, click the speech-bubble Reply ICON under the tweet to open
      the modal compose. The modal textarea is reliably centered and focusable.

  - id: tree_growth_as_success_false_positive
    description: |
      x_reply_bot.py's success heuristic was "AT-SPI tree size grew after submit,
      composer field cleared." Both true after the failed first vllm reply — but the
      actual reply text never landed. The Ctrl+Return dismissed the empty composer
      without posting.
    rule: After every post-class action, navigate to the canonical verify URL and
      run text_landed_externally() with a distinctive fragment of the posted text.
      Only mark success=true after that external verify.

  - id: hardcoded_coords_brittle
    description: |
      Coords change run-to-run based on viewport scroll, modal vs inline, dynamic
      layout. Hardcoding "(1032, 279)" works on one page-state and fails on others.
    rule: Query AT-SPI for the element by role+name fresh on every call. Compute
      click target from the returned bbox center. atspi_helpers.py provides this.

  - id: handle_doesnt_exist_silent_no_follow_button
    description: |
      2026-05-21 YAML validation: tried to follow @timdettmers per the Grok mid-tier
      list. No Follow button found by the strict YAML predicate. Initially looked
      like YAML drift. Actual cause: the handle "@timdettmers" returns "This account
      doesn't exist" on X. The real handle uses different casing/underscore.
      The YAML predicate correctly found nothing because there was no profile-header
      Follow button to find — only sidebar "Who to follow" suggestions for other
      accounts.
    rule: Before following from a Grok-derived mid-tier list or scout output,
      curl -I or HEAD the profile URL to verify it returns 200 (not a "doesn't
      exist" page). Add this as a pre-action gate in the follow flow OR validate
      handles when ingesting them into the follow queue. Don't trust Grok handle
      suggestions verbatim — they have stale/wrong handles.

  - id: viewport_edge_click_unreliable
    description: |
      2026-05-21 NielsRogge reply attempt: speech-bubble Reply icon found at center
      y=1080, exactly at the viewport edge (screen is 1080 tall). atspi_helpers'
      _in_viewport check passed because it allowed `cy <= SCREEN_HEIGHT - margin`
      with margin=0. Click at y=1080 either missed the element or got dispatched
      to underlying browser chrome. First attempt looked successful (modal opened,
      paste happened, Ctrl+Return sent) but reply count didn't increment and text
      didn't appear in thread.
    rule: Treat elements with center y < 80 or > 1000 as effectively off-screen for
      click purposes (use 80px margin from each edge). Updated atspi_helpers._in_viewport
      to enforce this. If the YAML predicate would match an edge-zone element, either
      scroll into safer zone OR refuse and let caller scroll. Same applies to x-edges
      with same 80px margin.

  - id: ctrl_return_eaten_by_error_banner
    description: |
      2026-05-21 NielsRogge reply (second attempt): paste succeeded, Ctrl+Return
      DID NOT submit. An X error banner ("Something went wrong, but don't fret —
      let's give it another shot") was present at the top of the modal — likely
      lingering from the failed first attempt. Ctrl+Return was consumed by the
      banner's focus / X's error-state handling, not by the compose submit.
    rule: After Ctrl+Return, ALWAYS verify externally (canonical state check).
      If the post doesn't appear, the fallback is to find the Reply / Post submit
      button by AT-SPI (role=push_button, name="Reply" or "Post", width>=60) and
      click it directly. Click-the-button is more reliable than the keyboard
      shortcut under error-banner conditions. Long-term: prefer click-the-button
      over Ctrl+Return for all submit actions.

  - id: predicate_bbox_dimensions_too_tight
    description: |
      2026-05-21 chain-follow attempt: bbox dimension filter `30 <= h <= 60`
      missed Like buttons that are 20px tall on profile feed views. Profile-feed
      Like buttons render smaller than thread-view Like buttons. Width also
      varies: profile-Follow buttons range 78-81 wide (mid-tier accounts) but
      can be larger on smaller accounts. Tight ranges fail silently.
    rule: Use loose bbox dimension ranges in YAML predicates. For action-bar icons
      (Like, Reply, Repost): width 15-70, height 15-70. For profile-Follow buttons:
      width 50-130, height 25-50. Verify with the visible element on the actual
      target page rather than hardcoding the first observed range.

  - id: target_account_already_followed_by_human_history
    description: |
      2026-05-21 chain-follow attempt against 8 mid-tier handles from Grok's
      "20 follow targets" list. ZERO Follow buttons found across all 8. Cause:
      Jesse already follows many of these accounts manually (predates x-claude;
      his existing HF/alignment/ML-infra follow history). The script's predicate
      for "Follow @handle" correctly didn't match because the button is
      "Following @handle" instead.
    rule: Before queueing a follow batch, check whether the account is already
      followed. Either: (a) read x_strategy's mid-tier list against an existing
      follows snapshot, or (b) on profile load, check for "Following @handle"
      BEFORE looking for "Follow @handle"; if Following found, skip. The chain
      script must distinguish "already-following = skip and continue" from
      "follow click failed = retry/diagnose". Print outcomes explicitly so the
      caller can tell the difference (`already following` vs `no Follow button
      found` vs `follow click failed verify`).
