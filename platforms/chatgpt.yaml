# ChatGPT Platform Configuration
platform: chatgpt
url_pattern: chatgpt.com
base_url: https://chatgpt.com/?temporary-chat=true
verify_navigation: false
tab_shortcut: alt+1

capabilities:
  # "Model selector, current model is {name}" button — opens mode picker (React portal, invisible to AT-SPI)
  # Modes are mutually exclusive (radio behavior). Names include description text.
  models:
    - Auto Decides how long to think
    - Instant 5.3 Answers right away
    - Thinking 5.4 Thinks longer for better answers
    - Pro 5.4 Research-grade intelligence
    - Legacy models
  modes: []
  # Thinking time sub-modes — shown as "Extended Pro" / "Light" / etc. buttons near input
  # Only visible when Thinking or Pro mode is active. Behavior: radio (exclusive).
  thinking_time:
    - Light Fastest thinking
    - Standard Default thinking depth
    - Extended Deeper analysis
    - Heavy Maximum thinking time
  # "+" button or sidebar tools — accessible via sidebar links or compose area
  tools:
    - Create image Generate images from text descriptions
    - Deep research Multi-source research with citations
    - Shopping Research Product comparison and recommendations
    - Canvas Interactive document/code editing workspace
    - Study & Learn Educational tutoring mode
    - Web Search Real-time web information retrieval
    - Explore Apps Browse ChatGPT plugins/apps
  sources: []

# Click strategy: xdotool_first (React portals hide elements from AT-SPI do_action)
click_strategy: xdotool_first

# How attach works: click trigger → keyboard Down+Enter → file dialog
attach_method: keyboard_nav
# How dropdowns work: React portal (invisible to AT-SPI), must use keyboard
dropdown_method: keyboard_nav

consultation_defaults:
  model: pro
  mode: pro
  attach_method: atspi_menu
  extract_method: last_copy_button

quirks:
  # OpenAI has AI countermeasures detecting AT-SPI patterns
  # AT-SPI may show garbage elements, tabs may navigate elsewhere
  - interference: "ChatGPT has active countermeasures against accessibility automation"
  - workaround: "Assume interference first, try action anyway, trust verification"
  - sidebar: "Left sidebar OPEN, right sidebar always CLOSE before interaction"
  - attach: "Dropdown with 'Upload a file' item. Use keyboard nav (Down+Enter) - xdotool coordinate clicks fail on React menu items."
  - model_selector: "Button 'Model selector, current model is {name}'. React portal dropdown — AT-SPI do_action opens browser context menu. Use xdotool coordinate click to open, then keyboard nav to select."
  - model_default: "Auto mode on temporary chats. Use ?temporary-chat=true URL."
  - thinking_time: "'Extended Pro, click to remove' button toggles thinking depth. Click 'Extended Pro' button to change level (Light/Standard/Extended/Heavy)."
  - sidebar_tools: "Sidebar has: Pulse, Images, Apps, Deep research, Codex, GPTs, Projects links."
  - dropdown_invisible: "Model selector and attach dropdowns render via React portals — invisible to AT-SPI tree. Must use keyboard navigation (Down+Enter) after opening."

stop_patterns:
  - stop
  - stop generating
  - stop streaming

mode_guidance:
  auto:
    when: "General use — system decides thinking depth automatically"
    how: "Default mode, no selection needed"
    timeout: 1800
  instant:
    when: "Quick answers, no reasoning needed, fastest response"
    how: "Click model selector, select 'Instant'"
    timeout: 600
  thinking:
    when: "Complex reasoning, step-by-step analysis, math"
    how: "Click model selector, select 'Thinking'"
    timeout: 3600
  pro:
    when: "Research-grade intelligence, standard thinking time"
    how: "Click model selector, select 'Pro'"
    timeout: 7200
  extended:
    when: "Increase thinking depth after selecting Thinking or Pro"
    how: "Select 'Extended' thinking tile (appears in input area after Pro/Thinking selected)"
    steps:
      - trigger: null
        select: extended
    timeout: 14400
  pro_extended:
    when: "Research-grade intelligence WITH extended thinking time"
    how: "Two-step: 1) Click model selector, select 'Pro'. 2) Select 'Extended' tile in input area."
    steps:
      - trigger: model_selector
        select: pro
      - trigger: null
        select: extended
    verification:
      check: completed_steps
      expected_steps: 2
    timeout: 14400
  extended_thinking:
    when: "Alias for pro_extended"
    how: "Two-step: 1) Click model selector, select 'Pro'. 2) Select 'Extended' tile in input area."
    steps:
      - trigger: model_selector
        select: pro
      - trigger: null
        select: extended
    timeout: 14400

# ─── Element Filtering ───────────────────────────────────────────────
# Applied BEFORE returning inspect results. Two sections:
#   1. exclude → noise, never show
#   2. element_map → known controls we need (labeled with semantic name)
# Anything not in exclude OR element_map → flagged as NEW for investigation.
# Unknown elements (not in exclude, element_map, or sidebar_nav) are flagged NEW.

element_filter:
  exclude:
    # Exact name matches — never show
    names:
      - "Close sidebar"
      - "Turn on temporary chat"
      - "Start a group chat"
      - "Start a group chat"
      - "Dictate button"
      - "Start Voice"
      - "Profile image"
      - "ChatGPT"                    # document web root
      - "Chat history"              # sidebar landmark container
      - "Image attachment"          # decorative images
      - "Skip to content"           # accessibility skip link
      - "What's on the agenda today?"  # home page heading
    # Substring matches — exclude if name contains any of these
    name_contains:
      - "Open conversation options"
      - ", open profile menu"
      - "Upgrade"
      - "Get Plus"
      - "Manage my account"
    # Roles to always exclude
    roles:
      - separator
      - document web
      - landmark
      - heading
      - section


# ─── Known Elements ─────────────────────────────────────────────────
# Controls we interact with. Each gets a semantic label in inspect output.
# Matched by: name/name_contains/name_pattern + role/role_contains + states_include
element_map:
  input:
    role: entry
    states_include: [editable]
  model_selector:
    name_contains: "Model selector"
    role: push button
  attach_trigger:
    name: "Add files and more"
    role: push button
  copy_button:
    name_contains: "Copy"
    role_contains: button
  stop_button:
    name_contains: "Stop streaming"
    role: push button
  pro_indicator:
    name_pattern: "Pro, click to remove"
    role: push button
  thinking_mode:
    name_pattern: "*, click to remove"
    role: push button
  extended_pro:
    name: "Extended Pro"
    role: push button
  temporary_chat:
    name_contains: "Turn on temporary chat"
    role: push button
  search_chats:
    name_contains: "Search chats"
    role: push button
  send_button:
    name: "Send prompt"
    role: push button
  # Model dropdown items (visible in AT-SPI since ~March 2026)
  model_auto:
    name: "Auto Decides how long to think"
    role: push button
  model_instant:
    name: "Instant For everyday chats"
    role: push button
  model_thinking:
    name: "Thinking For complex questions"
    role: push button
  model_pro:
    name: "Pro Research-grade intelligence"
    role: push button
  model_configure:
    name: "Configure..."
    role: push button
  # Thinking time options (shown after clicking Extended Pro button)
  thinking_standard:
    name: "Standard"
    role: push button
  thinking_extended:
    name: "Extended"
    role: push button
  thinking_pro_button:
    name: "Pro"
    role: push button
  # Tools dropdown items (from "Add files and more" button)
  tool_upload:
    name_contains: "Add photos"
    role_contains: item  # AT-SPI role is 'menu item', not 'button'
  tool_google_drive:
    name: "Add from Google Drive"
    role_contains: button
  tool_deep_research:
    name: "Deep research"
    role_contains: item
  tool_web_search:
    name: "Web search"
    role_contains: item
  tool_study:
    name: "Study and learn"
    role_contains: item
  tool_more:
    name: "More"
    role_contains: item
  tool_recent_files:
    name: "Recent files"
    role_contains: item
  # More submenu items (hover over "More" to reveal)
  tool_github:
    name: "GitHub"
    role_contains: item
  tool_agent_mode:
    name: "Agent mode"
    role_contains: item
  tool_gmail:
    name: "Gmail"
    role_contains: item
  tool_quizzes:
    name: "Quizzes"
    role_contains: item

# ─── Known Sidebar Navigation ───────────────────────────────────────
# Whitelist of sidebar links/buttons. These always pass through.
# New items (link/button in sidebar not in this list) → flagged as NEW.
sidebar_nav:
  - { name: "Home", role: link }
  - { name_pattern: "New chat*", role: link }
  - { name: "Pulse", role: link }
  - { name: "Images", role: link }
  - { name: "Library", role: link }
  - { name: "Apps", role: link }
  - { name: "Deep research", role: link }
  - { name: "Codex", role: link }
  - { name: "GPTs", role: link }
  - { name: "Projects", role: push button }
  - { name: "Projects", role: heading }
  - { name: "New project", role: push button }
  - { name: "Your chats", role: push button }
  - { name: "Your chats", role: heading }

# ─── Sidebar Fence ────────────────────────────────────────────────
# Disabled — see comment below.
# EMPTY: ChatGPT model_selector and input area appear AFTER sidebar
# elements in the AT-SPI tree. Fencing at "Your chats" cuts them off.
# Sidebar noise is handled by element_filter.exclude instead.
fence_after: []

# ─── Validation Expectations ───────────────────────────────────────
# Post-action verification: what the AT-SPI tree should look like after each action.
# Tools use these to confirm actions succeeded — no guessing.
validation:
  attach_success:
    # After file attached: "Remove" button appears near input area
    indicators:
      - { name_contains: "Remove", role_contains: button }
    file_chip:
      roles: [heading, push button, toggle button]
      name_match: filename_extension
  model_selected:
    # Model selector button text updates to show current model
    read_from: model_selector
    # Button name pattern: "Model selector, current model is {model_name}"
    name_contains_model: true
  send_success:
    # Stop button appears within timeout after Enter
    indicators:
      - stop_button
    timeout: 30
  response_complete:
    # Copy button present, stop button absent
    indicators:
      - copy_button
    stop_absent: true

# ─── Dropdown Items ─────────────────────────────────────────────────
# Captured for drift detection. Updated when platform changes.
