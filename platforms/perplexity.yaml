# Perplexity Platform Configuration
platform: perplexity
url_pattern: perplexity.ai
base_url: https://www.perplexity.ai/
tab_shortcut: alt+5

capabilities:
  # "Choose a model" button — menu items (some have suffixes)
  models:
    - Best Selects your best available models
    - Sonar
    - Gemini 3 Flash
    - Gemini 3.1 Pro New
    - GPT-5.2
    - Claude Sonnet 4.6 New
    - Claude Sonnet 4.6 Thinking Extended reasoning mode
    - Claude Opus 4.6 Max
    - Grok 4.1
    - Kimi K2.5 Hosted in the US
    - Kimi K2.5 Thinking Extended reasoning mode
  modes:
    - Computer Agentic computer-use mode for multi-step tasks
  tools:
    # "Add files or tools" dropdown (+ button)
    # Deep research and Model council are radio items (exclusive)
    # Upload/Cloud/Connectors are action items
    - Upload files or images
    - Add files from cloud
    - Connectors and sources
    - Deep research New
    - Model council Max
    - Create files and apps
    - Learn step by step
    - More
  sources: []

# Click strategy: xdotool_first (xdotool coordinate clicks work on Perplexity dropdowns)
click_strategy: xdotool_first

# How attach works: click "Add files or tools" → AT-SPI menu → click item
attach_method: atspi_menu
# How dropdowns work: AT-SPI enumerates menu items
dropdown_method: atspi_enum

quirks:
  - sidebar: "Left sidebar OPEN (Search, Computer, New Thread, History, Discover, Spaces, Finance, More). Right sidebar always CLOSE."
  - model_selector: "'Model' button visible in search landing page input area (role=push button). Opens model selector. NOT visible in Computer mode."
  - tools_button: "'Add files or tools' (+ button) opens dropdown with tools and file upload options"
  - deep_research: "Deep research is a radio menu item in the tools dropdown, NOT a standalone mode. May be enabled by default on new threads — check state before toggling."
  - deep_research_toggle: "Standalone 'Deep research' button near input is a TOGGLE. If already on (checked in dropdown), clicking it turns it OFF."
  - computer_mode: "Two ways to enter Computer mode: (1) 'Computer' link in sidebar (role=link, always visible), (2) 'Computer' push button in search input area (role=push button, search mode only). URL becomes /computer/tasks. Task input is standard entry field with 'Add files or tools' button. Task table shows Status/Task/Files/Updated columns. Sidebar changes: Search mode has New Thread/History/Discover/Spaces/Finance/More. Computer mode has New Task/Tasks/Files/Connectors/Skills/Gallery."
  - copy_summary_only: "Copy button returns summary only. For Deep Research full reports, use Export > Download as Markdown."
  - file_dialog: "File upload dialog may open as Firefox-embedded GTK dialog OR Nautilus portal depending on session context. Firefox GTK dialog has Ctrl+L conflict (navigates URL bar). Nautilus portal: xdotool search --class Nautilus."
  - tools_dropdown_click: "xdotool coordinate click opens 'Add files or tools' dropdown. taey_select_dropdown may hit Firefox tab context menu instead. Use xdotool click directly."
  - model_selector_landing: "'Model' button IS visible on search landing page (March 2026 update). Located in input area alongside 'Add files or tools', 'Computer', 'Dictation', 'Voice mode'."

stop_patterns:
  - stop
  - stop response (esc)
  - cancel

mode_guidance:
  deep_research:
    when: "Need facts, citations, multi-source synthesis, current events, comprehensive documentation"
    how: "Click 'Add files or tools' button, select 'Deep research New' radio item"
    timeout: 7200
    note: "Takes 5-30 minutes. Copy button = summary only. Use Export > Download as Markdown for full report."
  model_council:
    when: "Need consensus from multiple models, cross-validation of complex claims"
    how: "Click 'Add files or tools' button, select 'Model council Max' radio item"
    timeout: 7200
    note: "Max plan feature. Sends query to multiple models and synthesizes."
  computer:
    when: "Multi-step agentic tasks requiring computer interaction, code generation across 19 models, E2B sandbox execution"
    how: "Click 'Computer' link in sidebar (role=link). URL becomes /computer/tasks. Input is standard entry field. 'Add files or tools' button available. Task table shows Status/Task/Files/Updated."
    sidebar_links: "New Task, Tasks, Files, Connectors, Skills, Gallery"
    url_pattern: "/computer/tasks"
    timeout: 7200
  normal:
    when: "Quick questions, simple lookups, conversational queries"
    how: "Default - no tool selection needed"
    timeout: 3600

# ─── Sidebar Fence ────────────────────────────────────────────────
# When this element is encountered during traversal, it is collected but
# all remaining siblings in the parent are skipped. Excludes sidebar history.
fence_after:
  - { name: "Recent Collapse", role: push button }

# ─── Element Filtering ───────────────────────────────────────────────
element_filter:
  exclude:
    names:
      - "User avatar"               # profile image
    name_contains:
      - "Upgrade to Pro"
      - ", open profile menu"
      - "User avatar Jesse"          # profile button
    roles:
      - separator
      - document web
      - paragraph                    # ProseMirror wrapper in input
      - landmark                     # Main content landmark


element_map:
  input:
    role: entry
    states_include: [editable]
  attach_trigger:
    name: "Add files or tools"
    role: push button
  upload_files_item:
    name_contains: "Upload files"
    role: menu item
  model_selector:
    name: "Model"
    role: push button
  copy_button:
    name: "Copy"
    role: push button
  copy_code:
    name: "Copy code"
    role: push button
  stop_button:
    name_contains: "Stop"
    role_contains: button
  submit_button:
    name: "Submit"
    role: push button
  share_button:
    name: "Share"
    role: push button
  download_button:
    name: "Download"
    role: push button
  rewrite_thread:
    name: "Rewrite Thread"
    role: push button
  helpful:
    name: "Helpful"
    role: push button
  not_helpful:
    name: "Not helpful"
    role: push button
  more_actions:
    name: "More actions"
    role: push button
  thread_actions:
    name: "Thread actions"
    role: push button
  dictation:
    name: "Dictation"
    role: push button
  answer_mode_tabs:
    name: "Answer mode tabs"
    role: page tab list
  # Answer mode tabs
  answer_tab:
    name: "Answer"
    role: page tab
  links_tab:
    name: "Links"
    role: page tab
  images_tab:
    name: "Images"
    role: page tab
  notifications:
    name: "Notifications"
    role: push button
  computer_mode:
    name: "Computer"
    role: push button
  voice_mode:
    name: "Use voice mode"
    role: push button
  incognito:
    name_contains: "Use incognito"
    role: push button

sidebar_nav:
  - { name: "Search", role: link }
  - { name: "Computer", role: link }
  - { name: "New Thread", role: push button }
  - { name: "History", role: link }
  - { name: "Discover", role: link }
  - { name: "Spaces", role: link }
  - { name: "Finance", role: link }
  - { name: "More", role: push button }
  - { name: "Recent Collapse", role: push button }
  - { name: "View All", role: link }

# ─── Validation Expectations ───────────────────────────────────────
validation:
  attach_success:
    indicators:
      - { name_contains: "Remove", role_contains: button }
    file_chip:
      roles: [heading, push button, toggle button, link]
      name_match: filename_extension
  model_selected:
    # Model button text shows current model
    read_from: model_selector
    name_is_model: true
  tool_selected:
    # Deep research / Model council are radio items — check state
    read_from: attach_trigger
    check_menu_item_state: true
  send_success:
    indicators:
      - stop_button
    timeout: 30
  response_complete:
    indicators:
      - copy_button
    stop_absent: true
