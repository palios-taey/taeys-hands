# Perplexity Platform Configuration
platform: perplexity
url_pattern: perplexity.ai
base_url: https://www.perplexity.ai/
tab_shortcut: alt+5

capabilities:
  # "Choose a model" button — menu items (some have suffixes)
  models:
    - Best Selects your best available models
    - Sonar
    - Gemini 3 Flash
    - Gemini 3.1 Pro New
    - GPT-5.2
    - Claude Sonnet 4.6 New
    - Claude Opus 4.6 Max
    - Grok 4.1
    - Kimi K2.5 Hosted in the US
  modes:
    - Computer
  tools:
    # "Add files or tools" dropdown
    - Upload files or images
    - Add files from cloud
    - Connectors and sources
    - Deep research New
    - Model council Max
    - More
  sources: []

quirks:
  - sidebar: "Left sidebar CLOSED, right sidebar always CLOSE"
  - model_selector: "'Choose a model' button for model selection"
  - tools_button: "'Add files or tools' opens dropdown with Upload files or images, Add files from cloud, Connectors and sources, Deep research (radio), Model council (radio), More"
  - deep_research: "Tools are radio menu items, NOT modes. Select via the dropdown."
  - computer_mode: "'Computer' button toggles computer use mode (tasks view). Main chat is default search view."

stop_patterns:
  - stop
  - cancel

mode_guidance:
  deep_research:
    when: "Need facts, citations, multi-source synthesis, current events, documentation lookup"
    how: "Click 'Add files or tools' button, select 'Deep research New' radio item"
    timeout: 7200
    note: "Can take 5-30 minutes. Uses multiple search passes."
  normal:
    when: "Quick questions, simple lookups, conversational queries"
    how: "Default - no tool selection needed"
    timeout: 3600

element_hints:
  input_role: textbox
  send_role: push button
  send_name_pattern: submit
  copy_name_pattern: copy
