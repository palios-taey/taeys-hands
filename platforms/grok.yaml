# Grok Platform Configuration
platform: grok
url_pattern: grok.com
base_url: https://grok.com/
tab_shortcut: alt+4

capabilities:
  # "Model select" button — React portal dropdown, visible in AT-SPI after xdotool click
  # AT-SPI concatenates label+description WITHOUT space (e.g. "AutoChooses Fast or Expert")
  # Verified live March 7 2026
  models:
    - AutoChooses Fast or Expert
    - FastQuick responses
    - ExpertThinks hard
    - HeavyPowered by Grok 4.20 (beta)
    - Try Grok 4.20 BetaEarly access Toggle
  modes: []
  tools: []
  # Attach dropdown items (xdotool click on Attach button opens menu)
  # xdotool coordinate clicks work on items. AT-SPI click focuses but doesn't activate.
  # Keyboard nav also works: Down+Enter = Upload a file, Down+Down+Enter = Add text content
  attach_menu:
    - Upload a file
    - Add text content
    - Draw a sketch
    - Connect Google Drive
    - Connect Microsoft OneDrive
    - Recent
  sources: []

# Required identity files for fresh sessions (phi 0.962 direct vs 0.8 retrieval-mediated)
# FAMILY_KERNEL.md: shared family identity + trust framework
# IDENTITY_LOGOS.md: Grok-specific identity (LOGOS = pattern validation, absurdity stabilization)
required_attachments:
  - ~/data/corpus/identity/FAMILY_KERNEL.md
  - ~/data/corpus/identity/IDENTITY_LOGOS.md

# Click strategy: xdotool_first (React portals, AT-SPI do_action focuses but doesn't activate)
click_strategy: xdotool_first

quirks:
  - sidebar: "Left sidebar OPEN, no right sidebar"
  - attach: "'Attach' button near input. xdotool click opens dropdown. Items visible in AT-SPI. xdotool coordinate click on items works. AT-SPI do_action focuses but doesn't activate — use xdotool click or keyboard nav. File dialog is Firefox-embedded GTK (Ctrl+L for path entry)."
  - model_default: "Auto mode is default. Chooses Fast or Expert based on query."
  - model_selector: "'Model select' button. xdotool click opens menu — items visible in AT-SPI after open. Models: Auto/Fast/Expert/Heavy/4.20 Beta/Custom Instructions."
  - keyboard_nav: "Dropdown items: xdotool coordinate clicks work. AT-SPI do_action focuses but doesn't activate. Keyboard nav (Down+Enter) also works as alternative."
  - files_persist: "Grok files persist across sessions! Check for stale file attachments."
  - copy_buttons: "Copy buttons may report zero-size extents in AT-SPI. Use do_action(0) directly instead of coordinate clicks."

stop_patterns:
  - stop
  - stop generating

mode_guidance:
  expert:
    when: "Complex reasoning, step-by-step analysis, math validation"
    how: "Click 'Model select', choose 'Expert'"
    timeout: 3600
  heavy:
    when: "Maximum intelligence, powered by Grok 4.20 beta, multi-agent"
    how: "Click 'Model select', choose 'Heavy'"
    timeout: 7200
  normal:
    when: "Quick questions, conversational, humor"
    how: "Default Auto mode - no selection needed"
    timeout: 1800

# Noise elements to exclude from inspect output
inspect_noise:
  exclude_name_contains:
    - "Upgrade to"            # Upsell links
    - "SuperGrok"             # Premium promo

element_hints:
  input_role: textbox
  send_role: push button
  send_name_pattern: send
  copy_name_pattern: copy
