# Grok Platform Configuration
platform: grok
url_pattern: grok.com
base_url: https://grok.com/
tab_shortcut: alt+4

capabilities:
  models:
    - Grok 3
    - Grok 3 mini
  modes: []
  tools:
    - Think
    - DeepSearch
  sources: []

quirks:
  - sidebar: "Left sidebar OPEN, no right sidebar"

stop_patterns:
  - stop
  - stop generating

mode_guidance:
  think:
    when: "Complex reasoning, step-by-step analysis, math validation"
    how: "Enable 'Think' tool toggle"
    timeout: 3600
  deepsearch:
    when: "Need facts, current information, web search"
    how: "Enable 'DeepSearch' tool toggle"
    timeout: 7200
    note: "Can take several minutes. Uses multiple search passes."
  normal:
    when: "Quick questions, conversational, humor"
    how: "Default - no tool selection needed"
    timeout: 1800

element_hints:
  input_role: textbox
  send_role: push button
  send_name_pattern: send
  copy_name_pattern: copy
