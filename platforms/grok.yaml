# Grok Platform Configuration
platform: grok
url_pattern: grok.com
base_url: https://grok.com/
tab_shortcut: alt+4

capabilities:
  # "Model select" button — menu items with descriptions
  models:
    - Auto Chooses Fast or Expert
    - Fast Quick responses by 4.1
    - Expert Thinks hard
    - Heavy Powered by Grok 4.20 (beta)
    - Grok 4.20 (Beta) 4 Agents
    - Custom Instructions Not set Open Custom Instructions
  modes: []
  tools: []
  sources: []

quirks:
  - sidebar: "Left sidebar OPEN, no right sidebar"
  - attach: "'Attach' button near input. Dropdown menu items require keyboard navigation (Down+Enter) - xdotool coordinate clicks do not trigger React handlers."
  - model_default: "Auto mode is default. Chooses Fast or Expert based on query."
  - model_selector: "'Model select' button. Click opens menu with Auto/Fast/Expert/Heavy/4.20 Beta options."
  - keyboard_nav: "Dropdown menu items require keyboard navigation (Down+Enter) - xdotool coordinate clicks do not trigger React handlers."

stop_patterns:
  - stop
  - stop generating

mode_guidance:
  expert:
    when: "Complex reasoning, step-by-step analysis, math validation"
    how: "Click 'Model select', choose 'Expert'"
    timeout: 3600
  heavy:
    when: "Maximum intelligence, powered by Grok 4.20 beta"
    how: "Click 'Model select', choose 'Heavy'"
    timeout: 7200
  normal:
    when: "Quick questions, conversational, humor"
    how: "Default Auto mode - no selection needed"
    timeout: 1800

element_hints:
  input_role: textbox
  send_role: push button
  send_name_pattern: send
  copy_name_pattern: copy
