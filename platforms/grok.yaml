# Grok Platform Configuration
platform: grok
url_pattern: grok.com
base_url: https://grok.com/
fresh_session_url: https://grok.com/
verify_navigation: true
tab_shortcut: alt+4

capabilities:
  # "Model select" button — React portal dropdown, visible in AT-SPI after xdotool click
  # AT-SPI concatenates label+description WITHOUT space (e.g. "AutoChooses Fast or Expert")
  # Verified live March 14 2026 via AT-SPI dump
  models:
    - AutoChooses Fast or Expert
    - FastQuick responses
    - ExpertThinks hard
    - HeavyPowered by Grok 4.20 (beta)
    - Try Grok 4.20 BetaEarly access Toggle
  modes: []
  tools: []
  # Attach dropdown items (xdotool click on Attach button opens menu)
  # xdotool coordinate clicks work on items. AT-SPI click focuses but doesn't activate.
  # Keyboard nav also works: Down+Enter = Upload a file, Down+Down+Enter = Add text content
  attach_menu:
    - Upload a file
    - Add text content
    - Draw a sketch
    - Connect Google Drive
    - Connect Microsoft OneDrive
    - Recent
  sources: []

# Click strategy: xdotool_first (React portals, AT-SPI do_action focuses but doesn't activate)
click_strategy: xdotool_first

# How attach works: click trigger → keyboard Down+Enter → file dialog
attach_method: keyboard_nav
# How dropdowns work: React portal, keyboard nav
dropdown_method: atspi_enum

consultation_defaults:
  model: null
  mode: heavy
  attach_method: atspi_menu
  extract_method: last_copy_button

quirks:
  - sidebar: "Left sidebar OPEN, no right sidebar"
  - attach: "'Attach' button near input. xdotool click opens dropdown. Items visible in AT-SPI. xdotool coordinate click on items works. AT-SPI do_action focuses but doesn't activate — use xdotool click or keyboard nav. File dialog is Firefox-embedded GTK (Ctrl+L for path entry)."
  - model_default: "Auto mode is default. Chooses Fast or Expert based on query."
  - model_selector: "'Model select' button. xdotool click opens menu — items visible in AT-SPI after open. Models: Auto/Fast/Expert/Heavy/4.20 Beta/Custom Instructions."
  - keyboard_nav: "Dropdown items: xdotool coordinate clicks work. AT-SPI do_action focuses but doesn't activate. Keyboard nav (Down+Enter) also works as alternative."
  - files_persist: "Grok files persist across sessions! Check for stale file attachments."
  - copy_buttons: "Copy buttons may report zero-size extents in AT-SPI. Use do_action(0) directly instead of coordinate clicks."

stop_patterns:
  - stop
  - stop generating
  - stop model response
  - thinking

mode_guidance:
  expert:
    when: "Complex reasoning, step-by-step analysis, math validation"
    how: "Click 'Model select', choose 'Expert'"
    timeout: 3600
  heavy:
    when: "Maximum intelligence, powered by Grok 4.20 beta, multi-agent"
    how: "Click 'Model select', choose 'Heavy'"
    timeout: 7200
  normal:
    when: "Quick questions, conversational, humor"
    how: "Default Auto mode - no selection needed"
    timeout: 1800

# ─── Sidebar Fence ────────────────────────────────────────────────
# When this element is encountered during traversal, it is collected but
# all remaining siblings in the parent are skipped. Excludes sidebar history.
fence_after:
  - { name: "History", role: push button }

# ─── Element Filtering ───────────────────────────────────────────────
element_filter:
  exclude:
    names:
      - "Toggle Sidebar"
      - "pfp"                        # profile picture button + image
      - "Web page favicon"           # source favicons in responses
      - "Markdown"                   # decorative image in responses
    name_contains:
      - "Upgrade to"
      - "SuperGrok"
    roles:
      - separator
      - document web
      - list item                    # Response bullets + sidebar dupes (sidebar has link/button dupes)
      - paragraph                    # Input wrapper
      - image                        # Decorative images in responses


element_map:
  input:
    role_contains: section
    states_include: [editable, focusable, multi-line]
  attach_trigger:
    name: "Attach"
    role: push button
  upload_files_item:
    name: "Upload a file"
    role: menu item
  model_selector:
    name: "Model select"
    role: push button
  copy_button:
    name: "Copy"
    role: push button
  edit_button:
    name: "Edit"
    role: push button
  stop_button:
    name_contains: "Stop"
    role: push button
  regenerate:
    name: "Regenerate"
    role: push button
  read_aloud:
    name: "Read aloud"
    role: push button
  start_thread:
    name: "Start thread"
    role: push button
  like:
    name: "Like"
    role: push button
  dislike:
    name: "Dislike"
    role: push button
  more_actions:
    name: "More actions"
    role: push button
  create_share_link:
    name: "Create share link"
    role: push button
  thought_indicator:
    name_pattern: "Thought for *"
    role: push button
  scroll_down:
    name: "Scroll down"
    role: push button
  dictation:
    name_pattern: "Start dictation*"
    role: push button
  voice_mode:
    name_pattern: "Enter voice mode*"
    role: push button

sidebar_nav:
  - { name: "Home page", role: link }
  - { name: "Search", role: push button }
  - { name_pattern: "Search*", role: list item }
  - { name: "Chat", role: link }
  - { name_pattern: "Chat*", role: list item }
  - { name: "Voice", role: link }
  - { name_pattern: "Voice*", role: list item }
  - { name: "Imagine", role: link }
  - { name_pattern: "Imagine*", role: list item }
  - { name: "Projects", role: push button }
  - { name: "New Project", role: push button }
  - { name_pattern: "New Project*", role: list item }
  - { name: "History", role: push button }
  - { name: "More", role: push button }
  - { name: "Options", role: push button }
  - { name: "Switch to Private Chat", role: link }

# ─── Validation Expectations ───────────────────────────────────────
validation:
  attach_success:
    # Grok shows unnamed file chip buttons above input area.
    # Also may show filename as heading/button element.
    indicators:
      - { name_contains: "Remove", role_contains: button }
    file_chip:
      roles: [heading, push button, toggle button]
      name_match: filename_extension
    # Grok quirk: files persist across sessions! Check for stale attachments.
    stale_check: true
  model_selected:
    # Model select button doesn't change text. Must re-open dropdown to verify.
    read_from: model_selector
    reopen_to_verify: true
  send_success:
    indicators:
      - stop_button
    # Grok has "thinking" as a stop pattern — stop button appears quickly
    timeout: 60
    require_new_url: false
  response_complete:
    indicators:
      - copy_button
    stop_absent: true
