# gitleaks config — taeys-hands public-release prep
# Extends the default ruleset; allowlists ONLY verified false positives, narrowly, by path.
# Generic secret rules stay ACTIVE everywhere else.
#
# Full-history scan 2026-06-19 (1286 commits): 86 hits, ALL verified false positives —
#   * agents/sft_tracker.py  : training-data config keys ({'key':'sft_c2_declaration',...}), not API keys
#   * consultations/*audit*.md: AI audit-response prose; matched code identifiers
#                               (getattachtriggerkey, ATTACHKEYS), not credentials
#   * archive/**             : dead V1 code (slated for REMOVAL before publish; not shipped)
# No real credentials found in current tree or history.
#
# NOTE: this allowlist is INTERIM. The durable fix is removing archive/ and the stale
# consultation dumps from the repo (see RELEASE_PREP.md). Until then this keeps the scan
# signal clean without claiming the files are gone.

[extend]
useDefault = true

[allowlist]
description = "Verified false positives only (2026-06-19), narrow by path; generic rules remain active elsewhere."
paths = [
  '''^archive/''',
  '''consultations/.*audit.*\.md$''',
  '''consultations/v2_audit_responses/.*\.md$''',
  '''agents/sft_tracker\.py(\.bak)?$''',
  '''tests/test_live_atspi\.py$''',
]
