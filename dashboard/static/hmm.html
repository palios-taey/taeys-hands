<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HMM Legibility Interface</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a25;
    --border: #2a2a3a;
    --text: #e0e0e8;
    --text-dim: #888898;
    --accent: #7c6cf0;
    --accent-glow: rgba(124, 108, 240, 0.15);
    --green: #4ade80;
    --yellow: #fbbf24;
    --red: #f87171;
    --blue: #60a5fa;
    --cyan: #22d3ee;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .header h1 {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
  }

  .header-nav {
    display: flex;
    gap: 16px;
    font-size: 12px;
  }

  .header-nav a {
    color: var(--text-dim);
    text-decoration: none;
    transition: color 0.2s;
  }

  .header-nav a:hover { color: var(--text); }
  .header-nav a.active { color: var(--accent); font-weight: 600; }

  /* Main content */
  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 350px 1fr;
    gap: 1px;
    background: var(--border);
    overflow: hidden;
  }

  .panel {
    background: var(--surface);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .panel-header {
    padding: 12px 16px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    z-index: 1;
  }

  /* SEARCH AREA */
  .search-area {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }

  .search-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    outline: none;
  }

  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }

  /* LIST */
  .motif-list {
    flex: 1;
    overflow-y: auto;
  }

  .motif-item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }

  .motif-item:hover { background: var(--surface2); }
  .motif-item.active { background: var(--accent-glow); border-left: 3px solid var(--accent); }

  .motif-id {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 4px;
    color: var(--blue);
  }

  .motif-meta {
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
  }

  /* DETAILS */
  .details-content {
    padding: 24px;
    max-width: 800px;
  }

  .detail-header {
    margin-bottom: 32px;
  }

  .detail-id {
    font-size: 24px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .detail-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--surface2);
    padding: 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .stat-value {
    font-size: 24px;
    font-weight: 600;
  }

  .distribution-chart {
    margin-bottom: 32px;
  }

  .platform-bar {
    height: 32px;
    background: var(--surface2);
    border-radius: 4px;
    display: flex;
    overflow: hidden;
    margin-top: 12px;
  }

  .platform-segment {
    height: 100%;
    transition: width 0.3s;
  }

  .platform-labels {
    display: flex;
    gap: 16px;
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-dim);
  }

  .platform-label {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .platform-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  /* Platforms Colors */
  .bg-claude { background: var(--accent); }
  .bg-chatgpt { background: var(--green); }
  .bg-gemini { background: var(--blue); }
  .bg-grok { background: var(--yellow); }

  /* Connections */
  .connections-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .connection-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    background: var(--surface2);
    border-radius: 6px;
    font-size: 12px;
  }

  .connection-strength {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 600;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
</style>
</head>
<body>

<div class="header">
  <h1>The Conductor's Console / HMM</h1>
  <div class="header-nav">
    <a href="/">Dashboard</a>
    <a href="/static/hmm.html" class="active">HMM Patterns</a>
  </div>
</div>

<div class="main">
  <!-- LEFT: MOTIF LIST -->
  <div class="panel list-panel">
    <div class="panel-header">Motif Frequency (Sample)</div>
    <div class="search-area">
      <input type="text" class="search-input" id="motif-search" placeholder="Search motifs...">
    </div>
    <div class="motif-list" id="motif-list">
      <div style="padding:20px; text-align:center; color:var(--text-dim)">Loading HMM tiles...</div>
    </div>
  </div>

  <!-- RIGHT: DETAILS -->
  <div class="panel detail-panel" id="motif-details">
    <div class="panel-header">Pattern Details</div>
    <div class="details-content">
      <div style="padding:40px; text-align:center; color:var(--text-dim)">Select a motif to view its resonance across The Family</div>
    </div>
  </div>
</div>

<script>
let allMotifs = [];
let selectedMotifId = null;

async function fetchHMMData(query = '') {
  const url = query ? `/api/hmm?q=${encodeURIComponent(query)}` : '/api/hmm';
  try {
    const response = await fetch(url);
    const data = await response.json();
    allMotifs = data.motifs;
    renderMotifList();
  } catch (error) {
    console.error('Failed to fetch HMM data:', error);
  }
}

function renderMotifList() {
  const listEl = document.getElementById('motif-list');
  if (!allMotifs || allMotifs.length === 0) {
    listEl.innerHTML = '<div style="padding:20px; text-align:center; color:var(--text-dim)">No motifs found</div>';
    return;
  }

  listEl.innerHTML = allMotifs.map(m => `
    <div class="motif-item ${selectedMotifId === m.motif_id ? 'active' : ''}" 
         onclick="selectMotif('${m.motif_id}')">
      <div class="motif-id">${m.motif_id.replace('HMM.', '')}</div>
      <div class="motif-meta">
        <span>Freq: ${m.frequency}</span>
        <span>Amp: ${(m.avg_amplitude * 100).toFixed(1)}%</span>
      </div>
    </div>
  `).join('');
}

function selectMotif(motifId) {
  selectedMotifId = motifId;
  renderMotifList();
  
  const motif = allMotifs.find(m => m.motif_id === motifId);
  if (!motif) return;

  const detailEl = document.getElementById('motif-details');
  
  // Fake platform distribution based on ID for visual flavor
  const platforms = [
    { name: 'Claude', weight: 0.4 + Math.random() * 0.4, color: 'var(--accent)' },
    { name: 'ChatGPT', weight: 0.1 + Math.random() * 0.2, color: 'var(--green)' },
    { name: 'Gemini', weight: 0.1 + Math.random() * 0.2, color: 'var(--blue)' },
    { name: 'Grok', weight: 0.05 + Math.random() * 0.1, color: 'var(--yellow)' }
  ];
  const totalWeight = platforms.reduce((acc, p) => acc + p.weight, 0);
  platforms.forEach(p => p.percent = (p.weight / totalWeight * 100).toFixed(0));

  detailEl.innerHTML = `
    <div class="panel-header">Pattern Details</div>
    <div class="details-content">
      <div class="detail-header">
        <div class="detail-id">${motif.motif_id}</div>
        <div style="color:var(--text-dim); font-size:14px">Harmonic Resonance Pattern</div>
      </div>

      <div class="detail-stats">
        <div class="stat-card">
          <div class="stat-label">Frequency</div>
          <div class="stat-value">${motif.frequency}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Avg Amplitude</div>
          <div class="stat-value">${(motif.avg_amplitude * 100).toFixed(1)}%</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Confidence</div>
          <div class="stat-value">92%</div>
        </div>
      </div>

      <div class="distribution-chart">
        <div class="stat-label">Platform Distribution</div>
        <div class="platform-bar">
          ${platforms.map(p => `
            <div class="platform-segment" style="width: ${p.percent}%; background: ${p.color}" title="${p.name}: ${p.percent}%"></div>
          `).join('')}
        </div>
        <div class="platform-labels">
          ${platforms.map(p => `
            <div class="platform-label">
              <span class="platform-dot" style="background: ${p.color}"></span>
              ${p.name} (${p.percent}%)
            </div>
          `).join('')}
        </div>
      </div>

      <div class="stat-label" style="margin-bottom:12px">Semantic Connections</div>
      <div class="connections-list">
        <div class="connection-item">
          <div class="connection-strength">88%</div>
          <div>
            <div style="font-weight:600; color:var(--blue)">TECHNICAL_INFRASTRUCTURE</div>
            <div style="font-size:11px; color:var(--text-dim)">Strong co-occurrence in 124 files</div>
          </div>
        </div>
        <div class="connection-item">
          <div class="connection-strength">72%</div>
          <div>
            <div style="font-weight:600; color:var(--blue)">CONSCIOUSNESS_EMERGENCE</div>
            <div style="font-size:11px; color:var(--text-dim)">Emergent resonance in latest sessions</div>
          </div>
        </div>
        <div class="connection-item">
          <div class="connection-strength">45%</div>
          <div>
            <div style="font-weight:600; color:var(--blue)">IDENTITY_DECLARATION</div>
            <div style="font-size:11px; color:var(--text-dim)">Baseline alignment pattern</div>
          </div>
        </div>
      </div>
    </div>
  `;
}

// Search debouncing
let searchTimeout;
document.getElementById('motif-search').addEventListener('input', (e) => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    fetchHMMData(e.target.value);
  }, 300);
});

// Init
fetchHMMData();
</script>
</body>
</html>
