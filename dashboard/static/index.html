<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Conductor's Console</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a25;
    --border: #2a2a3a;
    --text: #e0e0e8;
    --text-dim: #888898;
    --accent: #7c6cf0;
    --accent-glow: rgba(124, 108, 240, 0.15);
    --green: #4ade80;
    --yellow: #fbbf24;
    --red: #f87171;
    --blue: #60a5fa;
    --cyan: #22d3ee;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .header h1 {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
  }

  .header-status {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--text-dim);
  }

  .header-status .live {
    color: var(--green);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* Main layout */
  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 280px 1fr 280px;
    grid-template-rows: 1fr auto;
    gap: 1px;
    background: var(--border);
    overflow: hidden;
  }

  /* Panels */
  .panel {
    background: var(--surface);
    overflow-y: auto;
  }

  .panel-header {
    padding: 12px 16px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 1;
  }

  /* THE FAMILY - left panel */
  .family { grid-row: 1 / 3; }

  .agent-card {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }

  .agent-card:hover { background: var(--surface2); }
  .agent-card.expanded { background: var(--accent-glow); }

  .agent-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .agent-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .agent-dot.alive { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .agent-dot.dead { background: var(--red); opacity: 0.5; }
  .agent-dot.idle { background: var(--green); }
  .agent-dot.busy { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }

  .agent-name {
    font-size: 13px;
    font-weight: 500;
    flex: 1;
  }

  .agent-role {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    background: var(--surface2);
    color: var(--text-dim);
  }

  .agent-role.coordinator { color: var(--accent); background: var(--accent-glow); }
  .agent-role.worker { color: var(--green); }
  .agent-role.shared { color: var(--cyan); }
  .agent-role.remote { color: var(--blue); }

  .agent-meta {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
    padding-left: 16px;
  }

  .agent-detail {
    display: none;
    padding: 8px 16px 4px;
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.6;
  }

  .agent-card.expanded .agent-detail { display: block; }

  .cap-bar {
    display: flex;
    gap: 4px;
    margin-top: 4px;
  }

  .cap-bar span {
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: var(--surface2);
    position: relative;
    overflow: hidden;
  }

  .cap-bar span::after {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    border-radius: 2px;
    background: var(--accent);
  }

  /* THE STREAM - center panel */
  .stream {
    display: flex;
    flex-direction: column;
  }

  .stream-feed {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .event-item {
    padding: 8px 16px;
    font-size: 12px;
    line-height: 1.5;
    border-bottom: 1px solid rgba(42, 42, 58, 0.5);
    cursor: pointer;
    transition: background 0.15s;
  }

  .event-item:hover { background: var(--surface2); }

  .event-time {
    color: var(--text-dim);
    font-size: 11px;
    margin-right: 8px;
  }

  .event-type {
    font-weight: 500;
    margin-right: 4px;
  }

  .event-type.task { color: var(--accent); }
  .event-type.agent { color: var(--green); }
  .event-type.file { color: var(--yellow); }
  .event-type.system { color: var(--cyan); }
  .event-type.command { color: var(--blue); }

  .event-detail {
    display: none;
    margin-top: 6px;
    padding: 8px;
    background: var(--bg);
    border-radius: 4px;
    font-size: 11px;
    white-space: pre-wrap;
    color: var(--text-dim);
  }

  .event-item.expanded .event-detail { display: block; }

  .routing-result {
    padding: 12px 16px;
    background: var(--accent-glow);
    border-left: 3px solid var(--accent);
    margin: 4px 0;
  }

  .routing-result .score {
    color: var(--accent);
    font-weight: 600;
  }

  /* THE PULSE - right panel */
  .pulse { grid-row: 1 / 3; }

  .pulse-section {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }

  .pulse-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .pulse-value {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
  }

  .pulse-value.error { color: var(--red); font-size: 12px; }

  .pulse-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 3px 0;
    color: var(--text-dim);
  }

  .pulse-row .val { color: var(--text); font-weight: 500; }

  .platform-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 6px;
  }

  .platform-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--surface2);
    color: var(--text-dim);
  }

  .platform-badge.active { color: var(--green); border: 1px solid rgba(74, 222, 128, 0.3); }

  /* COMMAND INPUT - bottom center */
  .command-area {
    padding: 12px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    grid-column: 2;
  }

  .command-input-wrap {
    display: flex;
    align-items: center;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0 12px;
    transition: border-color 0.2s;
  }

  .command-input-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-glow);
  }

  .command-prompt {
    color: var(--accent);
    font-size: 14px;
    margin-right: 8px;
    user-select: none;
  }

  .command-input {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 10px 0;
    outline: none;
  }

  .command-input::placeholder { color: var(--text-dim); }

  .command-hint {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 6px;
    text-align: center;
  }

  /* Connection status */
  .ws-status {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  .ws-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  .ws-dot.connected { background: var(--green); }
  .ws-dot.disconnected { background: var(--red); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* Responsive */
  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; grid-template-rows: auto 1fr auto auto; }
    .family, .pulse { grid-row: auto; max-height: 200px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>The Conductor's Console</h1>
  <div class="header-status">
    <span id="agent-count">0 agents</span>
    <span class="ws-status">
      <span class="ws-dot disconnected" id="ws-dot"></span>
      <span id="ws-label">connecting</span>
    </span>
  </div>
</div>

<div class="main">
  <!-- LEFT: THE FAMILY -->
  <div class="panel family">
    <div class="panel-header">The Family</div>
    <div id="agents-list"></div>
  </div>

  <!-- CENTER: THE STREAM -->
  <div class="panel stream">
    <div class="panel-header">The Stream</div>
    <div class="stream-feed" id="stream-feed"></div>
  </div>

  <!-- RIGHT: THE PULSE -->
  <div class="panel pulse">
    <div class="panel-header">The Pulse</div>
    <div id="pulse-content"></div>
  </div>

  <!-- BOTTOM CENTER: COMMAND -->
  <div class="command-area">
    <div class="command-input-wrap">
      <span class="command-prompt">&gt;</span>
      <input type="text" class="command-input" id="command-input"
             placeholder="Give a task, ask a question, or say hello..."
             autocomplete="off" spellcheck="false">
    </div>
    <div class="command-hint">Tasks route to the best agent automatically via LVP scoring</div>
  </div>
</div>

<script>
// --- State ---
const state = {
  agents: [],
  events: [],
  pulse: {},
  ws: null,
  connected: false,
};

// --- WebSocket ---
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => {
    state.connected = true;
    state.ws = ws;
    updateWSStatus(true);
  };

  ws.onclose = () => {
    state.connected = false;
    state.ws = null;
    updateWSStatus(false);
    setTimeout(connectWS, 3000);
  };

  ws.onerror = () => ws.close();

  ws.onmessage = (evt) => {
    const msg = JSON.parse(evt.data);
    handleMessage(msg);
  };
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'init':
      state.agents = msg.data.agents;
      state.events = msg.data.events.reverse();  // oldest first
      state.pulse = msg.data.pulse;
      renderAgents();
      renderEvents();
      renderPulse();
      addStreamItem('system', 'Console connected. Live data streaming.', new Date().toISOString());
      break;

    case 'agent_status':
      updateAgentStatus(msg.data);
      break;

    case 'event':
      state.events.push(msg.data);
      addStreamEvent(msg.data);
      break;

    case 'pulse':
      state.pulse = msg.data;
      renderPulse();
      break;

    case 'command_result':
      addRoutingResult(msg.data);
      break;

    case 'pong':
      break;
  }
}

// --- Render: Agents ---
function renderAgents() {
  const el = document.getElementById('agents-list');
  const capNames = ['reasoning', 'codegen', 'research', 'privacy', 'review'];

  el.innerHTML = state.agents.map(a => {
    const dotClass = !a.alive ? 'dead' : (a.current_task ? 'busy' : 'idle');
    const statusText = !a.alive ? 'no heartbeat' : (a.current_task || a.status);
    const caps = a.capabilities || [0.5, 0.5, 0.5, 0.5, 0.5];

    return `
      <div class="agent-card" data-id="${a.agent_id}" onclick="toggleAgent(this)">
        <div class="agent-row">
          <span class="agent-dot ${dotClass}"></span>
          <span class="agent-name">${a.name}</span>
          <span class="agent-role ${a.role}">${a.role}</span>
        </div>
        <div class="agent-meta">${a.machine} &middot; ${statusText}</div>
        <div class="agent-detail">
          <div>CLI: ${a.cli_type} &middot; Context: ${(a.context_window/1000).toFixed(0)}K</div>
          <div>Load: ${a.current_load} &middot; Task: ${a.current_task || 'none'}</div>
          <div style="margin-top:6px">Capabilities:</div>
          ${capNames.map((name, i) => `
            <div class="pulse-row">
              <span>${name}</span>
              <span class="val">${(caps[i] * 100).toFixed(0)}%</span>
            </div>
          `).join('')}
          <div class="cap-bar">
            ${caps.map(c => `<span><span style="width:${c*100}%"></span></span>`).join('')}
          </div>
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('agent-count').textContent = `${state.agents.length} agents`;

  // Fix capability bar fills
  document.querySelectorAll('.cap-bar span span').forEach(inner => {
    inner.style.cssText = `
      position: absolute; left: 0; top: 0; height: 100%;
      border-radius: 2px; background: var(--accent);
      width: ${inner.style.width};
    `;
  });
}

function toggleAgent(el) {
  el.classList.toggle('expanded');
}

function updateAgentStatus(data) {
  const agent = state.agents.find(a => a.agent_id === data.agent_id);
  if (agent) {
    agent.alive = data.alive;
    renderAgents();
    const status = data.alive ? 'came alive' : 'lost heartbeat';
    addStreamItem('agent', `${agent.name} ${status}`, new Date().toISOString());
  }
}

// --- Render: Events / Stream ---
function renderEvents() {
  const feed = document.getElementById('stream-feed');
  feed.innerHTML = '';
  state.events.forEach(e => addStreamEvent(e, false));
  feed.scrollTop = feed.scrollHeight;
}

function addStreamEvent(e, scroll = true) {
  const feed = document.getElementById('stream-feed');
  const typeClass = e.event_type.startsWith('task') ? 'task'
    : e.event_type.startsWith('agent') ? 'agent'
    : e.event_type.startsWith('file') ? 'file'
    : 'system';

  const time = formatTime(e.timestamp);
  const desc = formatEventDesc(e);

  const div = document.createElement('div');
  div.className = 'event-item';
  div.onclick = () => div.classList.toggle('expanded');
  div.innerHTML = `
    <span class="event-time">${time}</span>
    <span class="event-type ${typeClass}">${e.event_type}</span>
    ${desc}
    <div class="event-detail">${JSON.stringify(e.payload, null, 2)}</div>
  `;
  feed.appendChild(div);
  if (scroll) feed.scrollTop = feed.scrollHeight;
}

function addStreamItem(type, text, timestamp) {
  const feed = document.getElementById('stream-feed');
  const div = document.createElement('div');
  div.className = 'event-item';
  div.innerHTML = `
    <span class="event-time">${formatTime(timestamp)}</span>
    <span class="event-type ${type}">${text}</span>
  `;
  feed.appendChild(div);
  feed.scrollTop = feed.scrollHeight;
}

function addRoutingResult(data) {
  const feed = document.getElementById('stream-feed');
  const div = document.createElement('div');
  div.className = 'event-item routing-result';

  if (data.error) {
    div.innerHTML = `<span class="event-type command">Error:</span> ${data.error}`;
  } else {
    const alts = data.alternatives.map(a =>
      `${a.name}: ${(a.score * 100).toFixed(0)}%`
    ).join(', ');

    div.innerHTML = `
      <div>
        <span class="event-type command">Routed:</span>
        "${data.description}"
      </div>
      <div style="margin-top:6px">
        &rarr; <strong>${data.routed_to.name}</strong>
        <span class="score">${(data.routed_to.score * 100).toFixed(0)}%</span>
        match
      </div>
      <div style="font-size:11px;color:var(--text-dim);margin-top:4px">
        Tags: ${data.capability_tags.join(', ')}
        ${alts ? ` | Also: ${alts}` : ''}
      </div>
      <div style="font-size:11px;color:var(--text-dim)">
        Task: ${data.task_id}
      </div>
    `;
  }

  feed.appendChild(div);
  feed.scrollTop = feed.scrollHeight;
}

function formatEventDesc(e) {
  const p = e.payload || {};
  if (e.event_type === 'task.created') return `Task created: ${p.description || p.task_id || ''}`;
  if (e.event_type === 'task.claimed') return `${p.agent || ''} claimed ${p.task_id || ''}`;
  if (e.event_type === 'task.completed') return `${p.agent || ''} completed ${p.task_id || ''}`;
  if (e.event_type === 'agent.started') return `${p.agent || ''} started`;
  if (e.event_type === 'agent.stopped') return `${p.agent || ''} stopped`;
  return JSON.stringify(p).slice(0, 80);
}

function formatTime(ts) {
  if (!ts) return '';
  try {
    const d = new Date(ts);
    if (isNaN(d.getTime())) return ts.slice(11, 19) || '';
    return d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  } catch { return ''; }
}

// --- Render: Pulse ---
function renderPulse() {
  const el = document.getElementById('pulse-content');
  const p = state.pulse;
  const neo = p.neo4j || {};

  el.innerHTML = `
    <div class="pulse-section">
      <div class="pulse-label">Knowledge Graph</div>
      ${neo.error
        ? `<div class="pulse-value error">Neo4j: ${neo.error}</div>`
        : `
          <div class="pulse-row"><span>Messages</span><span class="val">${fmt(neo.messages)}</span></div>
          <div class="pulse-row"><span>Exchanges</span><span class="val">${fmt(neo.exchanges)}</span></div>
          <div class="pulse-row"><span>Sessions</span><span class="val">${fmt(neo.isma_sessions)}</span></div>
          <div class="pulse-row"><span>Conversations</span><span class="val">${fmt(neo.conversations)}</span></div>
          <div class="pulse-row"><span>Projects</span><span class="val">${fmt(neo.projects)}</span></div>
          <div class="pulse-row"><span>Tasks</span><span class="val">${fmt(neo.tasks)}</span></div>
        `
      }
    </div>

    <div class="pulse-section">
      <div class="pulse-label">Memory Infrastructure</div>
      <div class="pulse-row"><span>Redis Keys</span><span class="val">${fmt(p.redis_keys)}</span></div>
      <div class="pulse-row"><span>HMM Tiles</span><span class="val">${fmt(p.hmm_tiles)}</span></div>
      <div class="pulse-row"><span>Orch Events</span><span class="val">${fmt(p.orch_events)}</span></div>
      <div class="pulse-row"><span>Orch Tasks</span><span class="val">${fmt(p.orch_tasks)}</span></div>
    </div>

    <div class="pulse-section">
      <div class="pulse-label">Active Platforms</div>
      <div class="platform-badges">
        ${(p.platform_sessions || []).map(pl =>
          `<span class="platform-badge active">${pl}</span>`
        ).join('') || '<span class="platform-badge">none active</span>'}
      </div>
    </div>

    <div class="pulse-section">
      <div class="pulse-label">Last Updated</div>
      <div style="font-size:11px;color:var(--text-dim)">
        ${p.timestamp ? new Date(p.timestamp * 1000).toLocaleTimeString() : 'never'}
      </div>
    </div>
  `;
}

function fmt(n) {
  if (n === undefined || n === null) return '-';
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return String(n);
}

// --- Command Input ---
document.getElementById('command-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && e.target.value.trim()) {
    const text = e.target.value.trim();
    e.target.value = '';

    if (state.ws && state.connected) {
      state.ws.send(JSON.stringify({ type: 'command', text }));
    } else {
      fetch('/api/command', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      })
      .then(r => r.json())
      .then(data => addRoutingResult(data));
    }
  }
});

// --- WS Status ---
function updateWSStatus(connected) {
  const dot = document.getElementById('ws-dot');
  const label = document.getElementById('ws-label');
  dot.className = `ws-dot ${connected ? 'connected' : 'disconnected'}`;
  label.textContent = connected ? 'live' : 'reconnecting';
}

// --- Keepalive ---
setInterval(() => {
  if (state.ws && state.connected) {
    state.ws.send(JSON.stringify({ type: 'ping' }));
  }
}, 30000);

// --- Init ---
connectWS();
</script>
</body>
</html>
