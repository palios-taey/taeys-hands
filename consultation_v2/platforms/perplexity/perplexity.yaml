platform: perplexity
click_strategy: xdotool_first
urls:
  fresh: https://www.perplexity.ai/
  verify_navigation: false
tree:
  # fence_after disabled — Deep Research and input controls appear AFTER
  # sidebar history in AT-SPI tree. Fencing cuts them off.
  fence_after: []
  menu_snapshot_roles:
    - menu item
    - radio menu item
    - check menu item
    - option
  menu_snapshot_exclude:
    names:
    - Undo
    - Redo
    - Cut
    - Copy
    - Paste
    - Paste Without Formatting
    - Delete
    - Select All
    - Check Spelling
    - Inspect
  exclude:
    names:
    - User avatar
    - Upgrade to Pro
    roles:
    - separator
    - document web
    - paragraph
    - landmark
  sidebar_nav:
  - name: Search
    role: link
  - name: Computer
    role: link
  - name: New Thread
    role: push button
  - name: History
    role: link
  - name: Discover
    role: link
  - name: Spaces
    role: link
  - name: Finance
    role: link
  - name: More
    role: push button
  element_map:
    # ─── Toolbar / persistent controls ───────────────────────────────────────
    input:
      role: entry
      states_include:
      - editable
      match_strategy: name_agnostic_structural
      structural:
        before: attach_trigger
      reason: Perplexity's composer entry is nameless; the Submit button is absent on an empty composer (it appears only after text entry), so anchor the editable page entry before the always-present "Add files or tools" trigger that sits just below the composer (composer y<attach y).
    input_message:
      name: Message
      role: entry
      states_include:
      - editable
    attach_trigger:
      name: Add files or tools
      role: push button
    new_thread:
      name: New thread Ctrl I
      role: push button
    dictation:
      name: Dictation
      role: push button
    voice_mode:
      name: Use voice mode
      role: push button
    computer_ready:
      name: "Your Computer is ready"
      role: push button
    notifications:
      name: Notifications
      role: push button
    scheduled:
      name: Scheduled
      role: push button
    incognito:
      name: "Use incognito: create anonymous threads that aren't saved to your history and expire after 24 hours"
      role: push button
    # ─── Mode tiles (toolbar chips next to "+" attach button) ─────────────
    # IMPORTANT: Mode tiles have TWO visual states in Perplexity's UI:
    #   - INACTIVE (with "+"): tile is just an available option, NOT selected.
    #     AT-SPI shows as push button with name "Computer" or "Deep research".
    #     Presence does NOT mean the mode is active.
    #   - ACTIVE (no "+" / with "×" on hover): mode IS selected.
    #     AT-SPI shows "Remove" push button adjacent (appears on hover).
    #     The "Deep research" tile appears WITHOUT "+" when active.
    # To CHECK if a mode is active: look for the tile WITHOUT a "+" and
    # without a sibling "Computer" inactive tile. If "Computer" push button
    # is present alongside "Deep research", only ONE is active — the one
    # that does NOT have "+" visually.
    # To SELECT a mode: use the attach dropdown radio menu items (below),
    # NOT the toolbar tiles. do_action(0) on the radio menu item works.
    deep_research_toggle:
      name: Deep research
      role: toggle button
      states_include:
      - pressed
    search_mode_trigger:
      name: Search
      role: toggle button
      states_include:
      - pressed
    computer_mode:
      name: Computer
      role: push button
    suggestion_tabs:
      name: Primer query categories
      role: page tab list
    suggestion_tab_for_you:
      name: For you
      role: page tab

    # ─── Attach dropdown (Firefox root / portal — use menu_snapshot()) ────────
    upload_files_item:
      name: "Upload files or images"
      role: menu item
    git_connector_item:
      name: Connectors
      role: menu item
    spaces_item:
      name: Spaces
      role: menu item
    # radio menu items — mode selection (main attach dropdown level)
    computer_dropdown:
      name: Computer
      role: radio menu item
    deep_research:
      name: Deep research
      role: radio menu item
    tool_model_council:
      name: "Model council Max"
      role: radio menu item
    # "More" sub-menu trigger inside attach dropdown
    attach_more_trigger:
      name: More
      role: menu item
    # "More" sub-menu items (Firefox root — use menu_snapshot())
    mode_create_files:
      name: "Create files and apps"
      role: radio menu item
    mode_learn:
      name: "Learn step by step"
      role: radio menu item

    # ─── Persistent toolbar indicators (presence = mode active) ──────────
    model_council_indicator:
      name: "Model council"
      role: push button
    create_files_indicator:
      name: "Create files and apps"
      role: push button
    learn_step_indicator:
      name: "Learn step by step"
      role: push button

    # ─── Connectors and sources panel (Firefox root — use menu_snapshot()) ───
    search_sources:
      name: "Search sources"
      role: entry
      states_include:
      - editable
    clear_search:
      name: Clear
      role: push button
    # Source toggles (check menu items)
    source_web:
      name: "Web"
      role: check menu item
    source_academic:
      name: "Academic"
      role: check menu item
    source_gmail:
      name: "Gmail with Calendar Gmail with Calendar"
      role: check menu item
    source_google_drive:
      name: "Google Drive Google Drive"
      role: check menu item
    source_health:
      name: "Health"
      role: check menu item
    source_social:
      name: "Social"
      role: check menu item
    source_blockscout:
      name: "Blockscout Blockscout"
      role: check menu item
    source_github:
      name: "GitHub GitHub"
      role: check menu item
    # Cloud connectors (menu items — click to connect, not toggles)
    add_files_from_cloud:
      name: "Add files from cloud"
      role: menu item
    manage_connectors:
      name: "Manage Connectors"
      role: menu item
    # Cloud service connectors (below fold — menu items, not toggleable)
    connector_asana:
      name: "Asana Asana"
      role: menu item
    connector_box:
      name: "Box Box"
      role: menu item
    connector_circleback:
      name: "Circleback Circleback"
      role: menu item
    connector_cloudinary:
      name: "Cloudinary Cloudinary"
      role: menu item
    connector_confluence:
      name: "Confluence Confluence"
      role: menu item

    # ─── Model selector ───────────────────────────────────────────────────────
    model_selector:
      name: Model
      role: push button

    # ─── Response / post-generation controls ─────────────────────────────────
    submit_button:
      name: Submit
      role: push button
      pick: last_by_y
    stop_button:
      name: Stop response (Esc)
      role: push button
    copy_button:
      role: push button
      match_strategy: name_agnostic_structural
      structural:
        after: download_button
        before: more_actions
        ordinal: first
      reason: "Current Deep Research answer rows expose the response Copy action as a plain Copy push button between Download and More actions."
    copy_query_button:
      name: Copy query
      role: push button
    copy_code:
      name: Copy code
      role: push button
    copy_contents_button:
      name: Copy contents
      role: push button
    share_button:
      name: Share
      role: push button
    download_button:
      name: Download
      role: push button
    rewrite_thread:
      name: Rewrite Thread
      role: push button
    helpful:
      name: Helpful
      role: push button
    not_helpful:
      name: Not helpful
      role: push button
    more_actions:
      name: More actions
      role: push button
    export_markdown_item:
      name: Export as Markdown
      role: menu item
    download_markdown_item:
      name: Markdown
      role: menu item
    thread_actions:
      name: Thread actions
      role: push button

workflow:
  defaults:
    model: null
    mode: deep_research
    tools: []
  selection:
    menus:
      mode:
        select: single
        active_recognition: checked
        must_choose: false
        resettable_on_followup: true
        operate:
          trigger: search_mode_trigger
          scope: menu_snapshot
        options:
          deep_research:
            element: deep_research
            active_element: deep_research_toggle
            click_strategy: coordinate_only
        default_for_fresh: deep_research
        example_rationale: Use Deep Research for Perplexity because regular Pro Search can return thin or incomplete research.
  attachment:
    trigger: attach_trigger
    menu_target: upload_files_item
    open_method: atspi_menu
  connectors:
    # Source toggle workflow: open attach dropdown → click git_connector_item
    # → panel opens in portal → use menu_snapshot() for all source items.
    trigger: attach_trigger
    panel_trigger: git_connector_item
    source_targets:
      web: source_web
      academic: source_academic
      gmail: source_gmail
      google_drive: source_google_drive
      health: source_health
      social: source_social
      blockscout: source_blockscout
      github: source_github
  prompt:
    input: input
    send_button: submit_button
  send:
    trigger: submit_button
    require_new_url: true
    stop_key: stop_button
    settle_redirects: true
  monitor:
    stop_key: stop_button
    generation_timeout: 3600
  extract:
    primary_key: copy_contents_button
    strategy: last_by_y
  extra_extract:
    strategy: copy_contents_button
    copy_contents_key: copy_contents_button
settle:
  default_ms: 8000
  navigate_ms: 3500
  attach_ms: 2500
  rescan_attempts: 1

validation:
  attach_success:
    file_chip:
      roles:
      - push button
      - section
      - link
      - heading
  send_success:
    indicators:
    - name: Stop response (Esc)
      role: push button
    timeout: 120
  response_complete:
    stop_absent: stop_button
  deep_research_active:
    indicators:
    - name: Deep research
      role: toggle button
      states_include: [pressed]
  model_council_active:
    indicators:
    - name: "Model council"
      role: push button
  create_files_and_apps_active:
    indicators:
    - name: "Create files and apps"
      role: push button
  learn_step_by_step_active:
    indicators:
    - name: "Learn step by step"
      role: push button
  # No model menu is declared until the model selector dropdown is live-scanned.

# ============================================================================
# extraction — output-type -> ordered exact-matched workflow.
# Schema + load-time validation: consultation_v2/yaml_contract.py;
# grammar doc: consultation_v2/EXTRACTION_SCHEMA.md.
#  - assistant_text: normal answer via the mapped `copy_button`.
#  - research_report: Deep Research full report via the mapped report controls:
#    first `copy_contents_button` ("Copy contents" at the top of the report card),
#    then `copy_code` when the primary report content is a virtualized code block.
#    Do NOT use the bottom icon-row `copy_button` (summary only) or
#    `download_button` -> Markdown (transcript with hidden footnote refs); the
#    report control is scrolled into view before activation.
# ============================================================================
extraction:
  assistant_text:
    steps:
      - action: copy_element
        element: copy_button
        select: last
      - action: read_clipboard
        validation: response_complete
  research_report:
    steps:
      - action: scroll_into_view
        element: copy_contents_button
      - action: copy_element
        element: copy_contents_button
      - action: read_clipboard
        validation: response_complete
      - action: copy_element
        element: copy_code
      - action: read_clipboard
        validation: response_complete
      - action: read_tree_text
        validation: response_complete
