platform: gemini
identity_file: IDENTITY_COSMOS.md
click_strategy: atspi_only
navigation_key: F6

urls:
  fresh: https://gemini.google.com/app
  settle_delay: 5

tree:
  scan_root: app
  dialog_titles:
    - "File Upload"
    - "Open"
    - "Open File"
  fence_after: []

  exclude:
    names:
      - "Search with Google or enter address"
      - "Google, pick a search engine"
      - "View site information"
      - "You have granted this website additional permissions."
      - "Enter Reader View"
      - "Bookmark this page (Ctrl+D)"
      - "Sidebars"
      - "Back"
      - "Forward"
      - "Reload"
      - "Firefox View"
      - "Close tab"
      - "Open a new tab (Ctrl+T)"
      - "List all tabs"
      - "Account"
      - "Extensions"
      - "Firefox"
    roles:
      - separator
      - document web
      - paragraph
      - list item
      - page tab

  sidebar_nav:
    - name: "Main menu"
      role: push button
    - name: "Search"
      role: push button
    - name: "New chat"
      role: link
    - name: "My stuff"
      role: link
    - name: "Gems"
      role: link
    - name: "Settings & help"
      role: push button

  element_map:
    input:
      name: "Enter a prompt for Gemini"
      role: entry
      states_include: [editable, multi-line]

    attach_trigger:
      name: "Open upload file menu"
      role: push button

    tools_button:
      name: "Tools"
      role: push button

    mode_picker:
      name: "Open mode picker"
      role: push button

    send_button:
      name: "Send message"
      role: push button

    stop_button:
      name: "Stop response"
      role: push button

    copy_button:
      name: "Copy"
      role: push button

    microphone:
      name: "Microphone"
      role: toggle button

    deep_think_active_indicator:
      name: "Deselect Deep think"
      role: push button

    upload_files_item:
      name: "Upload files. Documents, data, code files"
      role: menu item

    add_from_drive_item:
      name: "Add from Drive. Sheets, Docs, Slides"
      role: menu item

    import_code_item:
      name: "Import code"
      role: menu item

    notebooklm_item:
      name: "NotebookLM"
      role: menu item

    mode_fast:
      name: "Fast Answers quickly"
      role: menu item
      selected_state: focused

    mode_thinking:
      name: "Thinking Solves complex problems"
      role: menu item
      selected_state: focused

    mode_pro:
      name: "Pro Advanced math and code with 3.1 Pro"
      role: menu item
      selected_state: focused

    tool_create_image:
      name: "Create image New"
      role: check menu item

    tool_canvas:
      name: "Canvas"
      role: check menu item

    tool_deep_research:
      name: "Deep research"
      role: check menu item

    tool_create_video:
      name: "Create video"
      role: check menu item

    tool_create_music:
      name: "Create music New"
      role: check menu item

    tool_guided_learning:
      name: "Guided learning"
      role: check menu item

    tool_deep_think:
      name: "Deep think"
      role: check menu item

    # Deep Research is two-phase: initial send triggers a brief "Plan"
    # phase (stop_button flickers while Gemini produces the research
    # plan), then a "Start research" push button appears. Clicking it
    # begins the actual multi-minute research. Without this, the monitor
    # sees the plan phase's stop_button disappear and prematurely declares
    # complete on the research-plan card.
    start_research_button:
      name: "Start research"
      role: push button

workflow:
  defaults:
    mode: pro
    tools:
      - deep_think

  selection:
    mode_trigger: mode_picker
    mode_snapshot: menu
    mode_click_strategy: atspi_only
    mode_verified_by_checked_state: true
    mode_skip_if_checked: true
    mode_reverify_via_reopen: true
    mode_close_with_escape: true
    mode_targets:
      fast: mode_fast
      thinking: mode_thinking
      pro: mode_pro
    mode_validations:
      fast: fast_active
      thinking: thinking_active
      pro: pro_active

    tool_trigger: tools_button
    tool_snapshot: menu
    tool_click_strategy: atspi_only
    tool_skip_if_checked: true
    tool_targets:
      create_image: tool_create_image
      canvas: tool_canvas
      deep_research: tool_deep_research
      create_video: tool_create_video
      create_music: tool_create_music
      guided_learning: tool_guided_learning

    sequences:
      deep_think:
        - trigger: mode_picker
          snapshot: menu
          target: mode_pro
          click_strategy: atspi_only
          skip_if_checked: true
          close_with_escape: true
          validation: pro_active
        - trigger: tools_button
          snapshot: menu
          target: tool_deep_think
          click_strategy: atspi_only
          skip_if_checked: true
          close_with_escape: true
          validation: deep_think_active

      # Deep Research is a DIFFERENT tool from Deep Think. DR performs
      # multi-source web research with citations and typically runs 10+ min.
      # Deep Think is extended reasoning on model-internal context only.
      # They are mutually exclusive; selecting one deselects the other.
      deep_research:
        - trigger: mode_picker
          snapshot: menu
          target: mode_pro
          click_strategy: atspi_only
          skip_if_checked: true
          close_with_escape: true
          validation: pro_active
        - trigger: tools_button
          snapshot: menu
          target: tool_deep_research
          click_strategy: atspi_only
          skip_if_checked: true
          close_with_escape: true
          validation: deep_research_active

  attachment:
    trigger: attach_trigger
    menu_target: upload_files_item
    menu_target_scope: menu
    dialog_location_shortcut: ctrl+l
    dialog_select_all_key: ctrl+a
    dialog_paste_key: ctrl+v
    dialog_confirm_key: Return
    validation: attach_success
    sequence:
      - action: snapshot_buttons
        into: pre_attach_buttons
      - action: click
        element: attach_trigger
        delay: 1.5
      - action: click
        element: upload_files_item
        scope: menu
        delay: 3.0
      - action: file_dialog_upload
        file: ${pkg}
        delay: 5.0
      - action: verify_attachment_chip
        baseline: pre_attach_buttons
        validation: attach_success
        file: ${pkg}
        timeout: 20
        poll_interval: 1.0

  prompt:
    input: input
    validation: prompt_ready
    sequence:
      - action: click
        element: input
        delay: 0.5
      - action: paste
        text: ${message}
        delay: 1.0
      - action: verify_text_landed
        element: input
        slack_absolute: 20
        slack_ratio: 0.01
        head_chars: 30
      - action: wait_for_indicator
        validation: prompt_ready
        timeout: 10
        poll_interval: 1.0

  send:
    confirmation_key: stop_button
    trigger: send_button
    require_new_url: false
    confirmation_timeout: 15
    validation: send_success
    sequence:
      - action: capture_url
        into: pre_send_url
      - action: assert_indicator_absent
        validation: send_success
      - action: click
        element: send_button
        delay: 0.5
      - action: wait_for_indicator
        validation: send_success
        timeout: 15
        poll_interval: 2.0
      # Gemini R11 #2: Deep Research two-phase flow. After the prompt is
      # sent with DR active, Gemini produces a research PLAN first
      # (stop_button flickers, disappears). A "Start research" push button
      # then appears. Clicking it begins the actual 10+ minute research
      # phase (stop_button reappears and stays until synthesis completes).
      # For non-DR prompts, start_research_button never appears and the
      # optional steps below become no-ops (the wait_for_indicator_absent
      # hits its timeout harmlessly; click returns absent_optional).
      - action: wait_for_indicator_absent
        validation: send_success
        required_absent_cycles: 2
        timeout: 60
        poll_interval: 2.0
        optional: true
      - action: click
        element: start_research_button
        click_strategy: atspi_only
        delay: 1.0
        optional: true
      - action: wait_for_indicator
        validation: send_success
        timeout: 15
        poll_interval: 2.0
        optional: true

  timing:
    after_trigger_click: 1.5
    after_target_click: 1.0
    after_escape: 1.0
    after_input_click: 0.5
    after_paste: 1.0
    after_attach_menu: 3.0
    after_file_dialog: 5.0
    send_poll_interval: 2.0
    dialog_after_focus: 0.5
    dialog_after_path_entry: 0.2
    dialog_after_paste: 0.5

  monitor:
    stop_key: stop_button
    poll_interval: 2.0
    required_stop_absent_cycles: 3
    complete_key: copy_button
    timeout: 3600
    validation: response_complete

  extract:
    # Gemini shows a Copy button on each completed assistant message. Pick
    # the last-by-y (most recent response). For Deep Research specifically,
    # the regular Copy button truncates the report; those responses need
    # the Share & Export → Copy menu path (TODO: handle separately, e.g.,
    # via a mode-specific extract sequence, once DR flow is promoted to YAML).
    output_var: response
    sequence:
      - action: press
        key: ctrl+End
        delay: 2.0
      - action: write_clipboard
        text: ""
      - action: click
        element: copy_button
        pick: last_by_y
        click_strategy: atspi_only
        delay: 2.0
      - action: read_clipboard
        into: response
        min_chars: 20


validation:
  attach_success:
    # Gemini's chip appears as "Remove file <filename>" push button next to the
    # attached file. The chip name includes the full filename.
    diff_validated: true
    file_chip_template: "Remove file {filename}"

  prompt_ready:
    # Send button must be present after paste — persistent indicator
    indicators:
      - name: "Send message"
        role: push button

  send_success:
    indicators:
      - name: "Stop response"
        role: push button

  response_complete:
    indicators:
      - name: "Copy"
        role: push button

  fast_active:
    # No persistent indicator — verified by checked state during selection
    verified_by_checked_state: true

  thinking_active:
    # No persistent indicator — verified by checked state during selection
    verified_by_checked_state: true

  pro_active:
    # No persistent indicator — verified by checked state during selection
    verified_by_checked_state: true

  deep_think_active:
    indicators:
      - name: "Deselect Deep think"
        role: push button

  # Deep Research is mutually exclusive with Deep Think. Gemini's tool UI
  # shows a "Deselect <tool>" push button for whichever is currently active.
  deep_research_active:
    indicators:
      - name: "Deselect Deep research"
        role: push button
