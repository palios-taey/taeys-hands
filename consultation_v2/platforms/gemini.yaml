platform: gemini
click_strategy: atspi_first
urls:
  fresh: https://gemini.google.com/app
  verify_navigation: false
tree:
  fence_after:
  - name: Chats
    role: heading
  exclude:
    names:
    - Gemini
    name_contains: # lint-allow: known p1 debt; sidebar/noise exclusions still rely on substring until exact live map rewrite
    - Gemini Apps Activity
    - Manage extensions
    - ', Google Account'
    - tap to use tool
    roles:
    - separator
    - document web
    - paragraph
  sidebar_nav:
  - name: New chat
    role: link
  - name: New chat
    role: push button
  - name: Main menu
    role: push button
  - name: Search
    role: push button
  - name: Projects
    role: push button
  - name: History
    role: push button
  - name: Chats
    role: heading
  element_map:
    input:
      name: Enter a prompt for Gemini
      role: entry
      states_include:
      - editable
    input_alt:
      name: ""
      role: section
      states_include:
      - editable
      - focusable
    mode_picker:
      name: Open mode picker, currently Pro
      role: push button
    # Gemini merged "Tools" and the upload menu into one "Upload & tools"
    # button (UI 2026-05-21). Both keys reference the same live element.
    tools_button:
      name: Upload & tools
      role: push button
    upload_menu:
      name: Upload & tools
      role: push button
    # "Deep think" + "Guided learning" live behind a "More tools" expander
    # inside the Upload & tools menu. VERIFIED LIVE 2026-05-22 (Ultra acct):
    #  - REAL Deep Think requires the "3.1 Pro" model selected first (NOT the
    #    "3.5 Thinking" model — that is a different feature).
    #  - Open "Upload & tools" via do_action(0); xdotool COORDINATE clicks
    #    intermittently fail to open the menu (and to Send — use do_action there too).
    #  - Menu items sit at the menu's own x-range (~x>=796), NOT the left edge.
    #    "More tools" is the LAST item (below Create music) and is often NOT
    #    exposed as an AT-SPI node (visual only) — hover it by coordinate inside
    #    the menu x-range.
    #  - Its flyout opens to the RIGHT (~x=1037) and exposes tool_deep_think /
    #    tool_guided_learning as menu items; click tool_deep_think there.
    #  - Verify via tool_deselect_deep_think / the "Deep think" composer chip.
    #  - Input needs grab_focus before xdotool type.
    more_tools:
      name: More tools
      role: push button
      trigger_type: hover
    copy_button:
      name: Copy
      role: push button
    stop_button:
      name: Stop response
      role: push button
    send_button:
      name: Send message
      role: push button
    share_export:
      name: Share & Export
      role: push button
    # The Deep Research report renders in a canvas/immersive panel; the FULL
    # report is copied via Share & Export -> "Copy" (a menu item in the popover,
    # NOT the chat-bubble Copy push button which only yields the ~89-char "I've
    # completed your research" stub). Verified live 2026-06-15.
    copy_content_item:
      name: Copy
      role: menu item
    start_research:
      name: Start research
      role: push button
    microphone:
      name: Microphone
      role: toggle button
    new_chat:
      name: New chat
      role: push button
    # BUG 4 FIX: exact AT-SPI name for upload dropdown item
    upload_files_item:
      name: "Upload files. Documents, data, code files"
      role: menu item
    # BUG 4 FIX: exact AT-SPI name for Drive item
    add_from_drive_item:
      name: "Add from Drive. Sheets, Docs, Slides"
      role: menu item
    import_code_item:
      name: Import code
      role: menu item
    notebooklm_item:
      name: NotebookLM
      role: menu item
    mode_fast:
      name: 3.5 Flash All-around help New
      role: menu item
    mode_thinking:
      name: 3.5 Thinking Solves complex problems
      role: menu item
    # The model menu prefixes "Selected " onto the ACTIVE model, so a single
    # exact name can't click Pro FROM Flash (when Flash is active the Pro item
    # is "3.1 Pro Advanced math and code", NO "Selected"). names_any_of matches
    # Pro in either state (enumerated-exact, contract-allowed).
    mode_pro:
      names_any_of:
        - "3.1 Pro Advanced math and code"
        - "Selected 3.1 Pro Advanced math and code"
      role: menu item
    # BUG 2 FIX: all tool items are check menu item, not menu item
    # BUG 3 FIX: tool_create_image exact AT-SPI name includes "New"
    tool_create_image:
      name: "Create image New"
      role: check menu item
    tool_canvas:
      name: Canvas
      role: check menu item
    tool_deep_research:
      name: Deep research
      role: check menu item
    # BUG 5 FIX: three new tool entries present in live AT-SPI scan
    tool_create_video:
      name: Create video
      role: check menu item
    tool_create_music:
      name: "Create music New"
      role: check menu item
    tool_guided_learning:
      name: Guided learning
      role: check menu item
    tool_deep_think:
      name: Deep think
      role: check menu item
    tool_deselect_deep_think:
      name: Deselect Deep think
      role: push button
workflow:
  defaults:
    model: null
    mode: deep_think
    tools: []
  selection:
    model_targets:
      fast: mode_fast
      thinking: mode_thinking
      pro: mode_pro
    tool_targets:
      deep_think: tool_deep_think
      deep_research: tool_deep_research
      canvas: tool_canvas
      create_image: tool_create_image
      create_video: tool_create_video
      create_music: tool_create_music
      guided_learning: tool_guided_learning
      import_code: import_code_item
  attachment:
    trigger: upload_menu
    menu_target: upload_files_item
    open_method: atspi_menu
  prompt:
    input: input
    input_fallback: input_alt
    send_button: send_button
  send:
    trigger: send_button
    require_new_url: false
    stop_key: stop_button
    post_send_key: start_research
  monitor:
    stop_key: stop_button
    complete_key: copy_button
  extract:
    primary_key: copy_button
    strategy: last_by_y
  extra_extract:
    strategy: share_export_copy_content
    share_export_key: share_export
    copy_content_key: copy_content_item
settle:
  default_ms: 2000
  navigate_ms: 4000
  attach_ms: 3000
  rescan_attempts: 1
validation:
  attach_success: {}
    # Gemini's uploaded file chip is not AT-SPI filename-addressable in live scans.
    # Success is the completed upload action itself; no chip validation.
  prompt_ready:
    indicators:
    - name: Send message
      role: push button
  send_success:
    indicators:
    - name: Stop response
      role: push button
    timeout: 30
  # response_complete: the stop button is GONE (persistent-element gate).
  response_complete:
    stop_absent: stop_button
  # BUG 7 FIX: mode validation uses checked state, not selected
  fast_active:
    indicators:
    - name: 3.5 Flash
      states_include: [checked]
  thinking_active:
    indicators:
    - name: 3.5 Thinking
      states_include: [checked]
  # The PERSISTENT Pro indicator is the mode-picker BUTTON, whose name encodes
  # the active model ("Open mode picker, currently Pro") and is present whether
  # the menu is open or CLOSED. The old "Selected 3.1 Pro..." menu item only
  # exists while the menu is OPEN, so it false-negatived Pro once the menu
  # closed — making select_model fail verification on a genuinely-Pro session
  # (and masking that deep_think was toggled on Flash). Jesse 2026-06-15.
  pro_active:
    indicators:
    - name: "Open mode picker, currently Pro"
      role: push button
  deep_think_active:
    indicators:
    - name: Deselect Deep think
      role: push button
  # PRE-SEND indicator that Deep Research is engaged: the composer shows a
  # "Deselect Deep research" toggle button (mirrors "Deselect Deep think").
  # The old "Start research"/"Share & export" buttons only appear on the
  # RESULTS page AFTER the DR query is sent, so validating them at select-mode
  # time (pre-send) always failed and ABORTED the run before it could send
  # (Jesse-corrected: code audits run in Deep Research; this gate blocked it).
  deep_research_active:
    indicators:
    - name: Deselect Deep research
      role: push button
  canvas_active:
    indicators:
    - name: Canvas
      states_include: [checked]
