platform: gemini
identity_file: IDENTITY_COSMOS.md
click_strategy: atspi_only
navigation_key: F6

urls:
  fresh: https://gemini.google.com/app
  settle_delay: 5

tree:
  scan_root: app
  dialog_titles:
    - "File Upload"
    - "Open"
    - "Open File"
  fence_after: []

  exclude:
    names:
      - "Search with Google or enter address"
      - "Google, pick a search engine"
      - "View site information"
      - "You have granted this website additional permissions."
      - "Enter Reader View"
      - "Bookmark this page (Ctrl+D)"
      - "Sidebars"
      - "Back"
      - "Forward"
      - "Reload"
      - "Firefox View"
      - "Close tab"
      - "Open a new tab (Ctrl+T)"
      - "List all tabs"
      - "Account"
      - "Extensions"
      - "Firefox"
    roles:
      - separator
      - document web
      - paragraph
      - list item
      - page tab

  sidebar_nav:
    - name: "Main menu"
      role: push button
    - name: "Search"
      role: push button
    - name: "New chat"
      role: link
    - name: "My stuff"
      role: link
    - name: "Gems"
      role: link
    - name: "Settings & help"
      role: push button

  element_map:
    input:
      name: "Enter a prompt for Gemini"
      role: entry
      states_include: [editable, multi-line]

    attach_trigger:
      name: "Open upload file menu"
      role: push button

    tools_button:
      name: "Tools"
      role: push button

    mode_picker:
      name: "Open mode picker"
      role: push button

    send_button:
      name: "Send message"
      role: push button

    stop_button:
      name: "Stop response"
      role: push button

    copy_button:
      name: "Copy"
      role: push button

    microphone:
      name: "Microphone"
      role: toggle button

    deep_think_active_indicator:
      name: "Deselect Deep think"
      role: push button

    upload_files_item:
      name: "Upload files. Documents, data, code files"
      role: menu item

    add_from_drive_item:
      name: "Add from Drive. Sheets, Docs, Slides"
      role: menu item

    import_code_item:
      name: "Import code"
      role: menu item

    notebooklm_item:
      name: "NotebookLM"
      role: menu item

    mode_fast:
      name: "Fast Answers quickly"
      role: menu item

    mode_thinking:
      name: "Thinking Solves complex problems"
      role: menu item

    mode_pro:
      name: "Pro Advanced math and code with 3.1 Pro"
      role: menu item

    tool_create_image:
      name: "Create image New"
      role: check menu item

    tool_canvas:
      name: "Canvas"
      role: check menu item

    tool_deep_research:
      name: "Deep research"
      role: check menu item

    tool_create_video:
      name: "Create video"
      role: check menu item

    tool_create_music:
      name: "Create music New"
      role: check menu item

    tool_guided_learning:
      name: "Guided learning"
      role: check menu item

    tool_deep_think:
      name: "Deep think"
      role: check menu item

workflow:
  defaults:
    model: null
    mode: pro
    tools:
      - deep_think

  selection:
    mode_trigger: mode_picker
    mode_snapshot: menu
    mode_click_strategy: atspi_only
    mode_verified_by_checked_state: true
    mode_targets:
      fast: mode_fast
      thinking: mode_thinking
      pro: mode_pro
    mode_validations:
      fast: fast_active
      thinking: thinking_active
      pro: pro_active

    tool_trigger: tools_button
    tool_snapshot: menu
    tool_click_strategy: atspi_only
    tool_skip_if_checked: true
    tool_targets:
      create_image: tool_create_image
      canvas: tool_canvas
      deep_research: tool_deep_research
      create_video: tool_create_video
      create_music: tool_create_music
      guided_learning: tool_guided_learning

    sequences:
      deep_think:
        - trigger: mode_picker
          snapshot: menu
          target: mode_pro
          click_strategy: atspi_only
          verified_by_checked_state: true
          validation: pro_active
        - trigger: tools_button
          snapshot: menu
          target: tool_deep_think
          click_strategy: atspi_only
          skip_if_checked: true
          close_with_escape: true
          validation: deep_think_active

  attachment:
    trigger: attach_trigger
    menu_target: upload_files_item
    dialog_location_shortcut: ctrl+l
    validation: attach_success

  prompt:
    input: input
    validation: prompt_ready

  send:
    confirmation_key: stop_button
    trigger: send_button
    require_new_url: false
    confirmation_timeout: 15
    validation: send_success

  timing:
    after_trigger_click: 1.5
    after_target_click: 1.0
    after_escape: 1.0
    after_input_click: 0.5
    after_paste: 1.0
    after_attach_menu: 3.0
    after_file_dialog: 5.0
    send_poll_interval: 2.0
    dialog_after_focus: 0.5
    dialog_after_path_entry: 0.2
    dialog_after_paste: 0.5

  monitor:
    stop_key: stop_button
    poll_interval: 2.0
    required_stop_absent_cycles: 3
    complete_key: copy_button
    timeout: 3600
    validation: response_complete

  extract:
    scroll_before_extract: ctrl+End
    primary_key: copy_button
    strategy: last_by_y
    click_strategy: atspi_only

  extra_extract:
    strategy: none

validation:
  attach_success:
    # Validated by snapshot diff in driver — new push button (file chip) must appear.
    # No YAML indicators needed; driver compares pre/post-attach snapshots.
    diff_validated: true

  prompt_ready:
    # Send button presence is sufficient — if send_button is in tree, prompt is ready.
    # The send step will fail if send_button is missing.
    pass_through: true

  send_success:
    indicators:
      - name: "Stop response"
        role: push button

  response_complete:
    indicators:
      - name: "Copy"
        role: push button
    stop_absent: true

  fast_active:
    # No persistent indicator — verified by checked state during selection
    verified_by_checked_state: true

  thinking_active:
    # No persistent indicator — verified by checked state during selection
    verified_by_checked_state: true

  pro_active:
    # No persistent indicator — verified by checked state during selection
    verified_by_checked_state: true

  deep_think_active:
    indicators:
      - name: "Deselect Deep think"
        role: push button
