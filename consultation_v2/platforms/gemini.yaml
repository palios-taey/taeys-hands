platform: gemini
click_strategy: atspi_first
urls:
  fresh: https://gemini.google.com/app
  verify_navigation: false
tree:
  fence_after:
  - name: Chats
    role: heading
  exclude:
    names:
    - Gemini
    name_contains:
    - Gemini Apps Activity
    - Manage extensions
    - ', Google Account'
    - tap to use tool
    roles:
    - separator
    - document web
    - paragraph
  sidebar_nav:
  - name: New chat
    role: link
  - name: New chat
    role: push button
  - name: Main menu
    role: push button
  - name: Search
    role: push button
  - name: Projects
    role: push button
  - name: History
    role: push button
  - name: Chats
    role: heading
  element_map:
    input:
      role: entry
      states_include:
      - editable
    input_alt:
      role_contains: section
      states_include:
      - editable
      - focusable
      - multi-line
    mode_picker:
      name: Open mode picker
      role: push button
    tools_button:
      name: Tools
      role: push button
    upload_menu:
      name: Open upload file menu
      role: push button
    copy_button:
      name_contains: Copy
      role_contains: button
    stop_button:
      name_contains: Stop response
      role: push button
    send_button:
      name: Send message
      role: push button
    share_export:
      name_contains: Share & export
      role_contains: button
    start_research:
      name: Start research
      role: push button
    microphone:
      name: Microphone
      role: toggle button
    upload_files_item:
      name_pattern: Upload files*
      role: menu item
    add_from_drive_item:
      name_pattern: Add from Drive*
      role: menu item
    import_code_item:
      name: Import code
      role: menu item
    notebooklm_item:
      name: NotebookLM
      role: menu item
    mode_fast:
      name: Fast Answers quickly
      role_contains: item
    mode_thinking:
      name: Thinking Solves complex problems
      role_contains: item
    mode_pro:
      name_contains: Pro Advanced math
      role_contains: item
    tool_deep_think:
      name: Deep think
      role_contains: item
    tool_deep_research:
      name: Deep research
      role_contains: item
    tool_canvas:
      name: Canvas
      role_contains: item
    tool_create_image:
      name_contains: Create image
      role_contains: item
    tool_deselect_deep_think:
      name: Deselect Deep think
      role_contains: button
workflow:
  defaults:
    model: null
    mode: deep_think
    tools: []
  selection:
    model_targets:
      fast: mode_fast
      thinking: mode_thinking
      pro: mode_pro
    tool_targets:
      deep_think: tool_deep_think
      deep_research: tool_deep_research
      canvas: tool_canvas
  attachment:
    trigger: upload_menu
    menu_target: upload_files_item
    open_method: atspi_menu
  prompt:
    input: input
    input_fallback: input_alt
    send_button: send_button
  send:
    trigger: send_button
    require_new_url: true
    stop_key: stop_button
    post_send_key: start_research
  monitor:
    stop_key: stop_button
    complete_key: copy_button
  extract:
    primary_key: copy_button
    strategy: last_by_y
  extra_extract:
    strategy: share_export_copy_content
    share_export_key: share_export
    copy_content_key: copy_content_item
validation:
  attach_success:
    indicators:
    - name_contains: Remove
      role_contains: button
  model_selected:
    indicators:
    - name: Open mode picker
      role: push button
    check_menu_item_state: true
  tool_selected:
    indicators:
    - name: Tools
      role: push button
    check_menu_item_state: true
  prompt_ready:
    indicators:
    - name: Send message
      role: push button
  send_success:
    indicators:
    - name_contains: Stop response
      role: push button
    timeout: 30
  response_complete:
    indicators:
    - name_contains: Copy
      role_contains: button
    stop_absent: true
