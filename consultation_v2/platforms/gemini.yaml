platform: gemini
click_strategy: atspi_first
urls:
  fresh: https://gemini.google.com/app
  verify_navigation: false
tree:
  fence_after:
  - name: Chats
    role: heading
  exclude:
    names:
    - Gemini
    name_contains:
    - Gemini Apps Activity
    - Manage extensions
    - ', Google Account'
    - tap to use tool
    roles:
    - separator
    - document web
    - paragraph
  sidebar_nav:
  - name: New chat
    role: link
  - name: New chat
    role: push button
  - name: Main menu
    role: push button
  - name: Search
    role: push button
  - name: Projects
    role: push button
  - name: History
    role: push button
  - name: Chats
    role: heading
  element_map:
    input:
      name: Enter a prompt for Gemini
      role: entry
      states_include:
      - editable
    input_alt:
      name: ""
      role: section
      states_include:
      - editable
      - focusable
    mode_picker:
      name: Open mode picker
      role: push button
    tools_button:
      name: Tools
      role: push button
    upload_menu:
      name: Open upload file menu
      role: push button
    copy_button:
      name_contains: Copy
      role: push button
    stop_button:
      name: Stop response
      role: push button
    send_button:
      name: Send message
      role: push button
    share_export:
      name: Share & export
      role: push button
    start_research:
      name: Start research
      role: push button
    microphone:
      name: Microphone
      role: toggle button
    new_chat:
      name: New chat
      role: push button
    # BUG 4 FIX: exact AT-SPI name for upload dropdown item
    upload_files_item:
      name: "Upload files. Documents, data, code files"
      role: menu item
    # BUG 4 FIX: exact AT-SPI name for Drive item
    add_from_drive_item:
      name: "Add from Drive. Sheets, Docs, Slides"
      role: menu item
    import_code_item:
      name: Import code
      role: menu item
    notebooklm_item:
      name: NotebookLM
      role: menu item
    mode_fast:
      name: Fast Answers quickly
      role: menu item
    mode_thinking:
      name: Thinking Solves complex problems
      role: menu item
    # BUG 1 FIX: exact AT-SPI name for Pro mode
    mode_pro:
      name: "Pro Advanced math and code with 3.1 Pro"
      role: menu item
    # BUG 2 FIX: all tool items are check menu item, not menu item
    # BUG 3 FIX: tool_create_image exact AT-SPI name includes "New"
    tool_create_image:
      name: "Create image New"
      role: check menu item
    tool_canvas:
      name: Canvas
      role: check menu item
    tool_deep_research:
      name: Deep research
      role: check menu item
    # BUG 5 FIX: three new tool entries present in live AT-SPI scan
    tool_create_video:
      name: Create video
      role: check menu item
    tool_create_music:
      name: "Create music New"
      role: check menu item
    tool_guided_learning:
      name: Guided learning
      role: check menu item
    tool_deep_think:
      name: Deep think
      role: check menu item
    tool_deselect_deep_think:
      name: Deselect Deep think
      role: push button
workflow:
  defaults:
    model: null
    mode: deep_think
    tools: []
  selection:
    model_targets:
      fast: mode_fast
      thinking: mode_thinking
      pro: mode_pro
    tool_targets:
      deep_think: tool_deep_think
      deep_research: tool_deep_research
      canvas: tool_canvas
      create_image: tool_create_image
      create_video: tool_create_video
      create_music: tool_create_music
      guided_learning: tool_guided_learning
  attachment:
    trigger: upload_menu
    menu_target: upload_files_item
    open_method: atspi_menu
  prompt:
    input: input
    input_fallback: input_alt
    send_button: send_button
  send:
    trigger: send_button
    require_new_url: false
    stop_key: stop_button
    post_send_key: start_research
  monitor:
    stop_key: stop_button
    complete_key: copy_button
  extract:
    primary_key: copy_button
    strategy: last_by_y
  extra_extract:
    strategy: share_export_copy_content
    share_export_key: share_export
    copy_content_key: copy_content_item
validation:
  attach_success:
    indicators:
    - name_contains: Remove
      role_contains: button
  prompt_ready:
    indicators:
    - name: Send message
      role: push button
  send_success:
    indicators:
    - name: Stop response
      role: push button
    timeout: 30
  # BUG 6 FIX: name_contains: Copy (not exact name: Copy) per driver spec
  response_complete:
    indicators:
    - name_contains: Copy
    stop_absent: true
  # BUG 7 FIX: mode validation uses checked state, not selected
  fast_active:
    indicators:
    - name: Fast Answers quickly
      states_include: [checked]
  thinking_active:
    indicators:
    - name: Thinking Solves complex problems
      states_include: [checked]
  pro_active:
    indicators:
    - name: "Pro Advanced math and code with 3.1 Pro"
      states_include: [checked]
  deep_think_active:
    indicators:
    - name: Deselect Deep think
      role: push button
  deep_research_active:
    indicators:
    - name: Start research
      role: push button
    - name: Share & export
      role: push button
  canvas_active:
    indicators:
    - name: Canvas
      states_include: [checked]
