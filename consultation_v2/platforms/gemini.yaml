platform: gemini
click_strategy: atspi_first
urls:
  fresh: https://gemini.google.com/app
  verify_navigation: false
tree:
  fence_after:
  - name: Chats
    role: heading
  menu_snapshot_roles:
    - menu item
    - radio menu item
    - check menu item
    - option
  menu_snapshot_exclude:
    names:
    - Undo
    - Redo
    - Cut
    - Copy
    - Paste
    - Paste Without Formatting
    - Delete
    - Select All
    - Check Spelling
    - Inspect
  exclude:
    names:
    - Gemini
    - Gemini Apps Activity
    - Manage extensions
    - tap to use tool
    roles:
    - separator
    - document web
    - paragraph
  sidebar_nav:
  - name: New chat
    role: link
  - name: New chat
    role: push button
  - name: Main menu
    role: push button
  - name: Search
    role: push button
  - name: Projects
    role: push button
  - name: History
    role: push button
  - name: Chats
    role: heading
  element_map:
    input:
      name: Enter a prompt for Gemini
      role: entry
      states_include:
      - editable
    mode_picker:
      role: push button
      match_strategy: name_agnostic_structural
      structural:
        after: input
      reason: Gemini's model picker visible name changes with the selected model; by live composer layout it is the only push button positioned after the prompt input (picker x>input x on the same composer row).
    # Gemini merged "Tools" and the upload menu into one "Upload & tools"
    # button (UI 2026-05-21). Both keys reference the same live element.
    tools_button:
      name: Upload & tools
      role: push button
    upload_menu:
      name: Upload & tools
      role: push button
    # "Deep think" + "Guided learning" live behind a "More tools" expander
    # inside the Upload & tools menu. VERIFIED LIVE 2026-05-22 (Ultra acct):
    #  - REAL Deep Think requires the "3.1 Pro" model selected first (NOT the
    #    "3.5 Thinking" model — that is a different feature).
    #  - Open "Upload & tools" via do_action(0); xdotool COORDINATE clicks
    #    intermittently fail to open the menu (and to Send — use do_action there too).
    #  - Menu items sit at the menu's own x-range (~x>=796), NOT the left edge.
    #    "More tools" is the LAST item (below Create music) and is often NOT
    #    exposed as an AT-SPI node (visual only) — hover it by coordinate inside
    #    the menu x-range.
    #  - Its flyout opens to the RIGHT (~x=1037) and exposes tool_deep_think /
    #    tool_guided_learning as menu items; click tool_deep_think there.
    #  - Verify via tool_deselect_deep_think / the "Deep think" composer chip.
    #  - Input needs grab_focus before xdotool type.
    more_tools:
      name: More tools
      role: push button
      trigger_type: hover
    copy_button:
      name: Copy
      role: push button
    stop_button:
      name: Stop response
      role: push button
    send_button:
      name: Send message
      role: push button
    share_export:
      name: Share & Export
      role: push button
    # The Deep Research report renders in a canvas/immersive panel; the FULL
    # report is copied via Share & Export -> "Copy" (a menu item in the popover,
    # NOT the chat-bubble Copy push button which only yields the ~89-char "I've
    # completed your research" stub). Verified live 2026-06-15.
    copy_content_item:
      name: Copy
      role: menu item
    start_research:
      name: Start research
      role: push button
    microphone:
      name: Microphone
      role: toggle button
    new_chat:
      name: New chat
      role: push button
    # BUG 4 FIX: exact AT-SPI name for upload dropdown item
    upload_files_item:
      name: "Upload files. Documents, data, code files"
      role: menu item
    # BUG 4 FIX: exact AT-SPI name for Drive item
    add_from_drive_item:
      name: "Add from Drive. Sheets, Docs, Slides"
      role: menu item
    import_code_item:
      name: Import code
      role: menu item
    notebooklm_item:
      name: NotebookLM
      role: menu item
    mode_fast:
      names_any_of:
        - "3.5 Flash All-around help"
        - "Selected 3.5 Flash All-around help"
      role: menu item
    mode_thinking:
      names_any_of:
        - "3.5 Thinking Solves complex problems"
        - "Selected 3.5 Thinking Solves complex problems"
      role: menu item
    # The model menu prefixes "Selected " onto the ACTIVE model, so a single
    # exact name can't click Pro FROM Flash (when Flash is active the Pro item
    # is "3.1 Pro Advanced math and code", NO "Selected"). names_any_of matches
    # Pro in either state (enumerated-exact, contract-allowed).
    mode_pro:
      names_any_of:
        - "3.1 Pro Advanced math and code"
        - "Selected 3.1 Pro Advanced math and code"
      role: menu item
    # BUG 2 FIX: all tool items are check menu item, not menu item
    # BUG 3 FIX: tool_create_image exact AT-SPI name includes "New"
    tool_create_image:
      name: "Create image New"
      role: check menu item
    tool_canvas:
      name: Canvas
      role: check menu item
    tool_deep_research:
      name: Deep research
      role: check menu item
    # BUG 5 FIX: three new tool entries present in live AT-SPI scan
    tool_create_video:
      name: Create video
      role: check menu item
    tool_create_music:
      name: "Create music New"
      role: check menu item
    tool_guided_learning:
      name: Guided learning
      role: check menu item
    tool_deep_think:
      name: Deep think
      role: check menu item
    tool_deselect_deep_think:
      name: Deselect Deep think
      role: push button
    tool_deselect_deep_research:
      name: Deselect Deep research
      role: push button
workflow:
  defaults:
    model: null
    mode: deep_think
    tools: []
  selection:
    menus:
      model:
        select: single
        active_recognition: selected_name_prefix
        must_choose: false
        resettable_on_followup: true
        operate:
          trigger: mode_picker
          scope: menu_snapshot
        options:
          fast:
            element: mode_fast
          pro:
            element: mode_pro
          thinking:
            element: mode_thinking
        default_for_fresh: pro
        example_rationale: Use Gemini 3.1 Pro before Deep Think so the consult does not silently run on Flash.
      mode:
        select: single
        active_recognition: checked
        must_choose: false
        resettable_on_followup: true
        operate:
          trigger: tools_button
          scope: snapshot
        options:
          deep_think:
            element: tool_deep_think
            path:
              - element: more_tools
                action: hover
            active_element: tool_deselect_deep_think
          deep_research:
            element: tool_deep_research
            active_element: tool_deselect_deep_research
        default_for_fresh: deep_think
        example_rationale: Use Deep Think for substantive Gemini reasoning unless a research report is explicitly needed.
  attachment:
    trigger: upload_menu
    menu_target: upload_files_item
    open_method: atspi_menu
  prompt:
    input: input
    send_button: send_button
  send:
    trigger: send_button
    require_new_url: false
    stop_key: stop_button
    post_send_key: start_research
  monitor:
    stop_key: stop_button
  extract:
    primary_key: copy_button
    strategy: last_by_y
  extra_extract:
    strategy: share_export_copy_content
    share_export_key: share_export
    copy_content_key: copy_content_item
settle:
  default_ms: 2000
  navigate_ms: 4000
  attach_ms: 3000
  rescan_attempts: 1
validation:
  attach_success:
    # Live post-Deep-Think chips expose the filename in description on a section.
    file_chip:
      roles:
      - section
  prompt_ready:
    indicators:
    - name: Send message
      role: push button
  send_success:
    indicators:
    - name: Stop response
      role: push button
    timeout: 30
  # response_complete: the stop button is GONE (persistent-element gate).
  response_complete:
    stop_absent: stop_button
  # BUG 7 FIX: mode validation uses checked state, not selected
  fast_active:
    indicators:
    - name: 3.5 Flash
      states_include: [checked]
  thinking_active:
    indicators:
    - name: 3.5 Thinking
      states_include: [checked]
  deep_think_active:
    indicators:
    - name: Deselect Deep think
      role: push button
  # PRE-SEND indicator that Deep Research is engaged: the composer shows a
  # "Deselect Deep research" toggle button (mirrors "Deselect Deep think").
  # The old "Start research"/"Share & export" buttons only appear on the
  # RESULTS page AFTER the DR query is sent, so validating them at select-mode
  # time (pre-send) always failed and ABORTED the run before it could send
  # (Jesse-corrected: code audits run in Deep Research; this gate blocked it).
  deep_research_active:
    indicators:
    - name: Deselect Deep research
      role: push button
  canvas_active:
    indicators:
    - name: Canvas
      states_include: [checked]

# ============================================================================
# extraction — output-type -> ordered exact-matched workflow.
# Schema + load-time validation: consultation_v2/yaml_contract.py;
# grammar doc: consultation_v2/EXTRACTION_SCHEMA.md.
#  - assistant_text: normal chat response via the mapped `copy_button`.
#  - research_report: Deep Research renders the full report in a canvas panel
#    whose body the chat-bubble Copy MISSES (yields the ~89-char "I've completed
#    your research" stub). The full report is `share_export` (push button) ->
#    `copy_content_item` (Copy menu item). Production-proven on :4 (36KB report
#    vs 89 chars); share_export is clicked first to open the popover.
# ============================================================================
extraction:
  assistant_text:
    steps:
      - action: copy_element
        element: copy_button
        select: last
      - action: read_clipboard
        validation: response_complete
  research_report:
    steps:
      - action: click
        element: share_export
      - action: copy_element
        element: copy_content_item
      - action: read_clipboard
        validation: response_complete
