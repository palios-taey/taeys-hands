platform: claude
click_strategy: xdotool_first
navigation_key: F6
urls:
  fresh: https://claude.ai/new
  verify_navigation: false
tree:
  fence_after:
  - name: Starred
    role: heading
  exclude:
    names:
    - Close sidebar
    - Claude
    - Profile image
    - Sidebar
    name_contains: # lint-allow: known p1 debt; sidebar/noise exclusions still rely on substring until exact live map rewrite
    - Upgrade to
    - ', Settings'
    - Get apps and extensions
    - Claude's choice
    roles:
    - separator
    - document web
    - paragraph
    - list item
  sidebar_nav:
  - name: Home
    role: link
  - name: New chat
    role: link
  - name: Search
    role: link
  - name: Customize
    role: link
  - name: Chats
    role: link
  - name: Projects
    role: link
  - name: Artifacts
    role: link
  - name: Code
    role: link
  element_map:
    # -- Main page persistent elements --
    input:
      name: Write your prompt to Claude
      role: entry
      states_include:
      - editable
    toggle_menu:
      name: Add files, connectors, and more
      role: push button
    send_button:
      name: Send message
      role: push button
    stop_button:
      name: Stop
      role: push button
    copy_button:
      name: Copy
      role: push button
    show_thinking:
      name: Show thinking
      role: push button
    hide_thinking:
      name: Hide thinking
      role: push button
    open_sidebar:
      name: Open sidebar
      role: push button
    incognito:
      name: Use incognito
      role: push button
    prompt_categories:
      name: Prompt categories
      role: page tab list
    prompt_tab:
      names_any_of:
      - Write
      - Learn
      - Code
      - Life stuff
      - "Claude’s choice"
      role: push button

    # -- Toggle-menu portal items (require menu_snapshot) --
    upload_files_item:
      name: "Add files or photos Ctrl+U"
      role: menu item
    take_screenshot:
      name: Take a screenshot
      role: menu item
    add_to_project:
      name: Add to project
      role: menu item
    git_connector_item:
      name: Add from GitHub
      role: menu item
    # GitHub flow (verified live 2026-05-22):
    # +menu -> git_connector_item -> "Try Claude Code for GitHub" modal ->
    # github_continue_sync -> "Add content from GitHub" modal (repo select / paste URL -> pick files)
    github_continue_sync:
      name: Continue to GitHub sync
      role: push button
    github_paste_url:
      name: Paste GitHub URL
      role: push button
    # NOTE: the repo dropdown renders as a combo box whose displayed text is
    # "Select a repository" but whose AT-SPI name is empty — needs a live re-scan
    # in the open "Add content from GitHub" modal to capture an exact matchable
    # name/role before the driver can target it deterministically.
    skills:
      name: Skills
      role: menu item
    add_connectors:
      name: Connectors
      role: menu item
    tool_research:
      name: Research
      role: check menu item
    tool_web_search:
      name: Web search
      role: check menu item
    use_style:
      name: Use style
      role: menu item

    # -- Model selector trigger (structural; label changes with active model) --
    model_selector:
      structural:
        parent: toggle_menu
        role: push button
        ordinal: last

    # -- Model / mode menu items (require menu_snapshot after clicking selector) --
    model_opus:
      name: Opus 4.8 For complex tasks
      role: radio menu item
    model_sonnet:
      name: Sonnet 4.6 Most efficient for everyday tasks
      role: radio menu item
    model_haiku:
      name: Haiku 4.5 Fastest for quick answers
      role: radio menu item
    model_fable:
      name: Fable 5Currently unavailable For your toughest challenges
      role: radio menu item
    effort_menu:
      names_any_of: [Effort Low, Effort Medium, Effort High, Effort Extra, Effort Max] # lint-allow: known p5 debt; dynamic-name effort menu needs structural/stable locator remap
      role: menu item
      trigger_type: hover
    effort_low:
      name: Low
      role: radio menu item
    effort_medium:
      name: Medium
      role: radio menu item
    effort_high_default:
      name: High Default
      role: radio menu item
    effort_extra:
      name: Extra
      role: radio menu item
    effort_max:
      name: Max
      role: radio menu item
    thinking_toggle:
      name: Thinking Can think for more complex tasks Thinking
      role: menu item
    model_more:
      name: More models
      role: menu item

workflow:
  defaults:
    model: null
    mode: extended_thinking
    tools: []
  selection:
    model_targets:
      opus: model_opus
      sonnet: model_sonnet
      haiku: model_haiku
      fable: model_fable
    effort_targets:
      low: effort_low
      medium: effort_medium
      high: effort_high_default
      extra: effort_extra
      max: effort_max
    mode_targets:
      extended_thinking:
        model: model_opus
        effort: extra
        validation: extended_thinking_active
    tool_targets:
      research: tool_research
      web_search: tool_web_search
      github: git_connector_item
  attachment:
    trigger: toggle_menu
    menu_target: upload_files_item
    open_method: atspi_menu
    # Keyboard shortcut: Ctrl+U opens file dialog directly, bypassing
    # the toggle_menu portal entirely. More reliable than AT-SPI menu
    # click because it avoids stale portal/menu_snapshot issues.
    keyboard_shortcut: ctrl+u
  prompt:
    input: input
    send_button: send_button
  send:
    trigger: send_button
    stop_key: stop_button
  monitor:
    stop_key: stop_button
    complete_key: copy_button
  extract:
    primary_key: copy_button
    strategy: last_by_y
  extra_extract:
    strategy: none

settle:
  default_ms: 1500
  navigate_ms: 3500
  attach_ms: 2500
  rescan_attempts: 1
validation:
  attach_success:
    file_chip:
      roles:
      - push button
      - list item
      - heading
  prompt_ready:
    indicators:
    - name: Send message
      role: push button
  send_success:
    indicators:
    - name: Stop
      role: push button
    timeout: 30
  response_complete:
    indicators:
    - name: Copy
      role: push button
    stop_absent: stop_button
  sonnet_active: {}
    # Persistent Sonnet active-state is not mapped in the current live tree.
    # If requested, validation_passes returns false and select_model fails loud.
  opus_active:
    indicators:
    - names_any_of:
      - "Model: Opus 4.8 Max"
      - "Model: Opus 4.8 Extra"
      - "Model: Opus 4.8 High"
      - "Model: Opus 4.8 Medium"
      - "Model: Opus 4.8 Low"
      role: push button
  haiku_active: {}
    # Persistent Haiku active-state is not mapped in the current live tree.
    # If requested, validation_passes returns false and select_model fails loud.
  fable_active: {}
    # Live scan 2026-06-14 exposed Fable 5 as "Currently unavailable"; selecting
    # it must fail loud until a live enabled-state validation exists.
  # Jesse/task #170: Claude consultation extended_thinking means Opus 4.8 plus
  # Effort Extra, not High and not Max. Live map:
  # consultations/p2_map_claude_exact.md lines 31-45.
  extended_thinking_active:
    indicators:
    - name: "Model: Opus 4.8 Extra" # lint-allow: known p5 debt; dynamic-name active-state validation needs structural/stable locator remap
      role: push button

# ============================================================================
# extraction — output-type -> ordered exact-matched workflow.
# Schema + load-time validation: consultation_v2/yaml_contract.py;
# grammar doc: consultation_v2/EXTRACTION_SCHEMA.md.
# assistant_text is production-proven on :3 (scroll, lowest visible Copy by y,
# AT-SPI activate, clipboard, reject prompt echo). When Claude exposes a mapped
# Show/Hide thinking toggle, the driver expands it and copies the distinct
# thinking block before concatenating it above the assistant response. Claude
# ARTIFACT panel extraction is NOT enabled in V2 (driver records it as not
# configured) and is deliberately NOT declared here — the downstream
# p4-artifact task maps the artifact-panel copy path. No downgrade: an artifact
# request with no mapped workflow stops/notifies, it does not fall back to the
# chat bubble.
# ============================================================================
extraction:
  assistant_text:
    steps:
      - action: scroll_to_bottom
        element: copy_button
      - action: copy_element
        element: copy_button
        select: last
      - action: read_clipboard
        validation: response_complete
