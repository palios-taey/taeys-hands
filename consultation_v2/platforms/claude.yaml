platform: claude
click_strategy: xdotool_first
navigation_key: F6
urls:
  fresh: https://claude.ai/new
  verify_navigation: false
tree:
  fence_after:
  - name: Starred
    role: heading
  exclude:
    names:
    - Close sidebar
    - Claude
    - Profile image
    - Sidebar
    name_contains: # lint-allow: known p1 debt; sidebar/noise exclusions still rely on substring until exact live map rewrite
    - Upgrade to
    - ', Settings'
    - Get apps and extensions
    - Claude's choice
    roles:
    - separator
    - document web
    - paragraph
    - list item
  sidebar_nav:
  - name: Home
    role: link
  - name: New chat
    role: link
  - name: Search
    role: link
  - name: Customize
    role: link
  - name: Chats
    role: link
  - name: Projects
    role: link
  - name: Artifacts
    role: link
  - name: Code
    role: link
  element_map:
    # -- Main page persistent elements --
    input:
      name: Write your prompt to Claude
      role: entry
      states_include:
      - editable
    toggle_menu:
      name: Add files, connectors, and more
      role: push button
    send_button:
      name: Send message
      role: push button
    stop_button:
      name: Stop
      role: push button
    copy_button:
      name_contains: Copy # lint-allow: known p3 debt; extract still keyed by substring until output-type matrix is implemented
      role: push button
    open_sidebar:
      name: Open sidebar
      role: push button
    incognito:
      name_contains: Use incognito # lint-allow: known p1 debt; incognito control still substring-based pending exact remap
      role: push button
    prompt_categories:
      name: Prompt categories
      role: page tab list
    prompt_tab:
      name_contains: # lint-allow: known p1 debt; prompt-tab labels are a bounded substring set pending exact tab inventory
      - Write
      - Learn
      - Code
      - Life stuff
      - "Claude's choice"
      role: page tab

    # -- Toggle-menu portal items (require menu_snapshot) --
    upload_files_item:
      name: "Add files or photos Ctrl+U"
      role: menu item
    take_screenshot:
      name: Take a screenshot
      role: menu item
    add_to_project:
      name: Add to project
      role: menu item
    git_connector_item:
      name: Add from GitHub
      role: menu item
    # GitHub flow (verified live 2026-05-22):
    # +menu -> git_connector_item -> "Try Claude Code for GitHub" modal ->
    # github_continue_sync -> "Add content from GitHub" modal (repo select / paste URL -> pick files)
    github_continue_sync:
      name: Continue to GitHub sync
      role: push button
    github_paste_url:
      name: Paste GitHub URL
      role: push button
    # NOTE: the repo dropdown renders as a combo box whose displayed text is
    # "Select a repository" but whose AT-SPI name is empty — needs a live re-scan
    # in the open "Add content from GitHub" modal to capture an exact matchable
    # name/role before the driver can target it deterministically.
    skills:
      name: Skills
      role: menu item
    add_connectors:
      name: Connectors
      role: menu item
    tool_research:
      name: Research
      role: check menu item
    tool_web_search:
      name: Web search
      role: check menu item
    use_style:
      name: Use style
      role: menu item

    # -- Model selector (label changes with active model; validation only) --
    model_selector:
      name: "Model: Opus 4.8 Max"
      role: push button

    # -- Model / mode menu items (require menu_snapshot after clicking selector) --
    model_opus:
      name: Opus 4.8 For complex tasks
      role: radio menu item
    model_sonnet:
      name: Sonnet 4.6 Most efficient for everyday tasks
      role: radio menu item
    model_haiku:
      name: Haiku 4.5 Fastest for quick answers
      role: radio menu item
    model_fable:
      name: Fable 5Currently unavailable For your toughest challenges
      role: radio menu item
    effort_menu:
      name: Effort Max
      role: menu item
      trigger_type: hover
    effort_low:
      name: Low
      role: radio menu item
    effort_medium:
      name: Medium
      role: radio menu item
    effort_high_default:
      name: High Default
      role: radio menu item
    effort_extra:
      name: Extra
      role: radio menu item
    effort_max:
      name: Max
      role: radio menu item
    thinking_toggle:
      name: Thinking Can think for more complex tasks Thinking
      role: menu item
    model_more:
      name: More models
      role: menu item

workflow:
  defaults:
    model: null
    mode: extended_thinking
    tools: []
  selection:
    model_targets:
      opus: model_opus
      sonnet: model_sonnet
      haiku: model_haiku
    mode_targets:
      extended_thinking: model_opus
    tool_targets:
      research: tool_research
      web_search: tool_web_search
      github: git_connector_item
  attachment:
    trigger: toggle_menu
    menu_target: upload_files_item
    open_method: atspi_menu
    # Keyboard shortcut: Ctrl+U opens file dialog directly, bypassing
    # the toggle_menu portal entirely. More reliable than AT-SPI menu
    # click because it avoids stale portal/menu_snapshot issues.
    keyboard_shortcut: ctrl+u
  prompt:
    input: input
    send_button: send_button
  send:
    trigger: send_button
    stop_key: stop_button
  monitor:
    stop_key: stop_button
    complete_key: copy_button
  extract:
    primary_key: copy_button
    strategy: last_by_y
  extra_extract:
    strategy: none

settle:
  default_ms: 1500
  navigate_ms: 3500
  attach_ms: 2500
  rescan_attempts: 1
validation:
  attach_success:
    indicators:
    - name_contains: Remove # lint-allow: known p1 debt; attach-success still uses generic remove chip until exact indicator is mapped
      role_contains: button # lint-allow: known p1 debt; attach-success still uses generic role filter until exact indicator is mapped
  prompt_ready:
    indicators:
    - name: Send message
      role: push button
  send_success:
    indicators:
    - name: Stop
      role: push button
    timeout: 30
  response_complete:
    indicators:
    - name_contains: Copy # lint-allow: known p3 debt; response-complete still uses generic copy indicator pending extract matrix
      role: push button
    stop_absent: true
  sonnet_active:
    indicators:
    - name_contains: Sonnet 4.6 # lint-allow: known p1 debt; model-active verification still substring-based pending exact selector remap
      role: push button
  opus_active:
    indicators:
    - name_contains: Opus 4.8 # lint-allow: known p1 debt; model-active verification still substring-based pending exact selector remap
      role: push button
  haiku_active:
    indicators:
    - name_contains: Haiku 4.5 # lint-allow: known p1 debt; model-active verification still substring-based pending exact selector remap
      role: push button
  extended_thinking_active:
    indicators:
    - name: "Model: Opus 4.8 Extra"
      role: push button
