schema: identity_v1
platform: claude
click_strategy: xdotool_first
navigation_key: F6
urls:
  fresh: https://claude.ai/new
  verify_navigation: false
tree:
  schema: identity_v1
  fence_after:
    - name: Starred
      role: heading
  menu_snapshot_scan: document_menu_roles
  menu_snapshot_roles:
    - menu item
    - radio menu item
    - check menu item
    - option
  exclude:
    names:
      - Close sidebar
      - Claude
      - Profile image
      - Sidebar
      - Get apps and extensions
    roles:
      - alert
      - document web
      - form
      - heading
      - image
      - landmark
      - list
      - list item
      - menu
      - paragraph
      - section
      - separator
      - static
      - status bar
  sidebar_nav:
    - name: Home
      role: link
    - name: New chat
      role: link
    - name: Search
      role: link
    - name: Customize
      role: link
    - name: Chats
      role: link
    - name: Projects
      role: link
    - name: Artifacts
      role: link
    - name: Code
      role: link
  conformance:
    scopes:
      base:
        expected:
          - input
          - toggle_menu
          - model_selector
      toggle_menu:
        expected:
          - upload_files_item
          - take_screenshot
          - add_to_project
          - git_connector_item
          - skills
          - add_connectors
          - tool_research
          - tool_web_search
          - use_style
      model_menu:
        expected:
          - model_opus
          - model_sonnet
          - model_haiku
          - model_fable
          - effort_menu
          - thinking_toggle
          - model_more
      effort_menu:
        expected:
          - effort_low
          - effort_medium
          - effort_high_default
          - effort_extra
          - effort_max
      github_modal:
        expected:
          - github_continue_sync
          - github_paste_url
      artifacts:
        expected:
          - artifacts_link
  element_map:
    home_link:
      name: Home
      role: link
      scope: base.sidebar
    new_chat_link:
      name: New chat
      role: link
      scope: base.sidebar
    search_link:
      name: Search
      role: link
      scope: base.sidebar
    customize_link:
      name: Customize
      role: link
      scope: base.sidebar
    chats_link:
      name: Chats
      role: link
      scope: base.sidebar
    projects_link:
      name: Projects
      role: link
      scope: base.sidebar
    artifacts_link:
      name: Artifacts
      role: link
      scope: base.sidebar
    code_link:
      name: Code
      role: link
      scope: base.sidebar
    input:
      name: Write your prompt to Claude
      role: entry
      scope: base.composer
    toggle_menu:
      name: Add files, connectors, and more
      role: push button
      scope: base.composer
    model_selector:
      role: push button
      scope: base.composer
      match_strategy: name_agnostic_structural
      structural:
        after: toggle_menu
        before: input
      reason: Claude labels the selector with the selected model and effort.
    send_button:
      name: Send message
      role: push button
      scope: base.composer
    stop_button:
      name: Stop
      role: push button
      scope: response.generating
    stop_response_button:
      name: Stop response
      role: push button
      scope: response.generating
    copy_button:
      name: Copy
      role: push button
      scope: response.actions
    show_thinking:
      name: Show thinking
      role: push button
      scope: response.actions
    hide_thinking:
      name: Hide thinking
      role: push button
      scope: response.actions
    open_sidebar:
      name: Open sidebar
      role: push button
      scope: base.header
    incognito:
      name: Use incognito
      role: push button
      scope: base.header
    prompt_categories:
      name: Prompt categories
      role: page tab list
      scope: base.main
    prompt_tab_write:
      name: Write
      role: push button
      scope: base.main
    prompt_tab_learn:
      name: Learn
      role: push button
      scope: base.main
    prompt_tab_code:
      name: Code
      role: push button
      scope: base.main
    prompt_tab_life:
      name: Life stuff
      role: push button
      scope: base.main
    prompt_tab_choice:
      name: Claude's choice
      role: push button
      scope: base.main
    prompt_tab_choice_curly:
      name: Claude’s choice
      role: push button
      scope: base.main
    upload_files_item:
      name: Add files or photos Ctrl+U
      role: menu item
      scope: toggle_menu
    take_screenshot:
      name: Take a screenshot
      role: menu item
      scope: toggle_menu
    add_to_project:
      name: Add to project
      role: menu item
      scope: toggle_menu
    git_connector_item:
      name: Add from GitHub
      role: menu item
      scope: toggle_menu
    github_continue_sync:
      # Needs live :3 confirmation; first-time GitHub connector interstitial only.
      name: Continue to GitHub sync
      role: push button
      scope: github_modal
    github_paste_url:
      # Needs live :3 confirmation inside the Add content from GitHub modal.
      name: Paste GitHub URL
      role: push button
      scope: github_modal
    skills:
      name: Skills
      role: menu item
      scope: toggle_menu
    add_connectors:
      name: Connectors
      role: menu item
      scope: toggle_menu
    tool_research:
      name: Research
      role: check menu item
      scope: toggle_menu
      active_state: checked
    tool_web_search:
      name: Web search
      role: check menu item
      scope: toggle_menu
      active_state: checked
    use_style:
      name: Use style
      role: menu item
      scope: toggle_menu
    model_opus:
      name: Opus 4.8 For complex tasks
      role: radio menu item
      scope: model_menu
      active_state: checked
    model_sonnet:
      name: Sonnet 4.6 Most efficient for everyday tasks
      role: radio menu item
      scope: model_menu
      active_state: checked
    model_haiku:
      name: Haiku 4.5 Fastest for quick answers
      role: radio menu item
      scope: model_menu
      active_state: checked
    model_fable:
      # Needs live :3 confirmation; last audit saw this disabled/unavailable.
      name: Fable 5Currently unavailable For your toughest challenges
      role: radio menu item
      scope: model_menu
    effort_menu:
      # Needs live :3 confirmation; Claude labels this row with dynamic effort text.
      role: menu item
      scope: model_menu
      match_strategy: name_agnostic_structural
      structural:
        after: model_haiku
        before: thinking_toggle
      reason: Claude labels this row with the currently selected effort level.
    effort_low:
      name: Low
      role: radio menu item
      scope: effort_menu
      active_state: checked
    effort_medium:
      name: Medium
      role: radio menu item
      scope: effort_menu
      active_state: checked
    effort_high_default:
      name: High Default
      role: radio menu item
      scope: effort_menu
      active_state: checked
    effort_extra:
      name: Extra
      role: radio menu item
      scope: effort_menu
      active_state: checked
    effort_max:
      name: Max
      role: radio menu item
      scope: effort_menu
      active_state: checked
    thinking_toggle:
      name: Thinking Can think for more complex tasks Thinking
      role: menu item
      scope: model_menu
    model_more:
      name: More models
      role: menu item
      scope: model_menu
workflow:
  defaults:
    model: null
    mode: extended_thinking
    tools: []
  selection:
    menus:
      model:
        select: single
        active_recognition: checked
        must_choose: true
        resettable_on_followup: true
        operate:
          trigger: model_selector
          scope: menu_snapshot
        options:
          opus:
            element: model_opus
          sonnet:
            element: model_sonnet
          haiku:
            element: model_haiku
        default_for_fresh: opus
        example_rationale: Use Opus for deep synthesis, complex audits, and high-stakes mission work.
      mode:
        select: single
        active_recognition: checked
        must_choose: true
        resettable_on_followup: true
        operate:
          trigger: model_selector
          scope: menu_snapshot
        options:
          low:
            element: effort_low
            path:
              - element: effort_menu
                action: hover
          medium:
            element: effort_medium
            path:
              - element: effort_menu
                action: hover
          high:
            element: effort_high_default
            path:
              - element: effort_menu
                action: hover
          extended_thinking:
            element: effort_extra
            path:
              - element: effort_menu
                action: hover
          max:
            element: effort_max
            path:
              - element: effort_menu
                action: hover
        default_for_fresh: extended_thinking
        example_rationale: Use extended thinking when the prompt requires deeper reasoning than the default high effort.
      tools:
        select: multi
        active_recognition: checked
        must_choose: false
        resettable_on_followup: false
        operate:
          trigger: toggle_menu
          scope: menu_snapshot
        options:
          research:
            element: tool_research
          web_search:
            element: tool_web_search
        default_for_fresh: none
        example_rationale: No Claude tools are needed because the request is fully answered from supplied context.
  attachment:
    trigger: toggle_menu
    menu_target: upload_files_item
    open_method: atspi_menu
    keyboard_shortcut: ctrl+u
  prompt:
    input: input
    send_button: send_button
  send:
    trigger: send_button
    stop_keys:
      - stop_button
      - stop_response_button
  monitor:
    stop_keys:
      - stop_button
      - stop_response_button
    complete_key: copy_button
  extract:
    primary_key: copy_button
    strategy: last_by_y
  extra_extract:
    strategy: none
settle:
  default_ms: 1500
  navigate_ms: 3500
  attach_ms: 2500
  rescan_attempts: 1
extraction:
  assistant_text:
    steps:
      - action: scroll_to_bottom
        element: copy_button
      - action: copy_element
        element: copy_button
        select: last
      - action: read_clipboard
