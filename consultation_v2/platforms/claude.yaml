platform: claude
identity_file: IDENTITY_GAIA.md
click_strategy: coordinate_only
navigation_key: F6

urls:
  fresh: https://claude.ai/new
  settle_delay: 5

tree:
  scan_root: app
  dialog_titles:
    - "File Upload"
    - "Open"
    - "Open File"
  fence_after: []

  exclude:
    names:
      - "Search with Google or enter address"
      - "Google, pick a search engine"
      - "View site information"
      - "You have granted this website additional permissions."
      - "Bookmark this page (Ctrl+D)"
      - "Sidebars"
      - "Back"
      - "Forward"
      - "Reload"
      - "Firefox View"
      - "Close tab"
      - "Open a new tab (Ctrl+T)"
      - "List all tabs"
      - "Account"
      - "Extensions"
      - "Firefox"
    roles:
      - separator
      - document web
      - paragraph
      - list item
      - page tab

  sidebar_nav:
    - name: "Open sidebar"
      role: toggle button
    - name: "Home"
      role: link
    - name: "New chat"
      role: link
    - name: "Search"
      role: link
    - name: "Customize"
      role: link
    - name: "Chats"
      role: link
    - name: "Projects"
      role: link
    - name: "Artifacts"
      role: link
    - name: "Code"
      role: link
    - name: "Get apps and extensions"
      role: link
    - name: "Jesse LaRose, Settings"
      role: push button

  element_map:
    input:
      name: "Write your prompt to Claude"
      role: entry
      states_include: [editable, multi-line]

    attach_trigger:
      name: "Add files, connectors, and more"
      role: push button

    send_button:
      name: "Send message"
      role: push button

    stop_button:
      name: "Stop response"
      role: push button

    copy_button:
      name: "Copy"
      role: push button

    model_selector:
      # Exact current-model button names only; no substring matching.
      names:
        - "Opus 4.7"
        - "Opus 4.7 Adaptive"
        - "Opus 4.6"
        - "Opus 4.6 Extended"
        - "Sonnet 4.6"
        - "Sonnet 4.6 Extended"
        - "Haiku 4.5"
        - "Haiku 4.5 Extended"
      role: push button

    voice_mode:
      name: "Use voice mode"
      role: push button

    incognito:
      name: "Use incognito"
      role: push button

    upload_files_item:
      name: "Add files or photos Ctrl+U"
      role: menu item

    take_screenshot_item:
      name: "Take a screenshot"
      role: menu item

    add_to_project_item:
      name: "Add to project"
      role: menu item

    add_from_github_item:
      name: "Add from GitHub"
      role: menu item

    skills_item:
      name: "Skills"
      role: menu item

    add_connectors_item:
      name: "Add connectors"
      role: menu item

    research_item:
      name: "Research"
      role: check menu item

    web_search_item:
      name: "Web search"
      role: check menu item

    use_style_item:
      name: "Use style"
      role: menu item

    model_opus:
      name: "Opus 4.7 Most capable for ambitious work"
      role: radio menu item

    model_sonnet:
      name: "Sonnet 4.6 Most efficient for everyday tasks"
      role: radio menu item

    model_haiku:
      name: "Haiku 4.5 Fastest for quick answers"
      role: radio menu item

    model_adaptive_thinking_item:
      name: "Adaptive thinking Thinks only when needed Adaptive thinking"
      role: menu item

    model_more_item:
      name: "More models"
      role: menu item

workflow:
  defaults:
    mode: extended_thinking
    tools: []

  selection:
    sequences: {}
    mode_trigger: model_selector
    mode_snapshot: menu
    mode_click_strategy: coordinate_only
    mode_close_with_escape: true
    mode_targets:
      extended_thinking: model_adaptive_thinking_item
    mode_validations:
      extended_thinking: extended_thinking_active

    tool_trigger: attach_trigger
    tool_snapshot: menu
    tool_click_strategy: coordinate_only
    tool_skip_if_checked: true
    tool_close_with_escape: true
    tool_targets:
      research: research_item
      web_search: web_search_item
      github: add_from_github_item

  attachment:
    trigger: attach_trigger
    menu_target: upload_files_item
    dialog_location_shortcut: ctrl+l
    dialog_select_all_key: ctrl+a
    dialog_paste_key: ctrl+v
    dialog_confirm_key: Return
    validation: attach_success

  prompt:
    input: input
    validation: prompt_ready

  send:
    confirmation_key: stop_button
    trigger: send_button
    require_new_url: false
    confirmation_timeout: 15
    validation: send_success

  timing:
    after_trigger_click: 1.5
    after_target_click: 1.0
    after_escape: 1.0
    after_input_click: 0.5
    after_paste: 1.0
    after_attach_menu: 3.0
    after_file_dialog: 5.0
    send_poll_interval: 2.0
    dialog_after_focus: 0.5
    dialog_after_path_entry: 0.2
    dialog_after_paste: 0.5

  monitor:
    stop_key: stop_button
    poll_interval: 2.0
    required_stop_absent_cycles: 3
    complete_key: copy_button
    timeout: 3600
    validation: response_complete

  extract:
    scroll_before_extract: ctrl+End
    scroll_delay: 2.0
    post_click_delay: 1.0
    primary_key: copy_button
    strategy: last_by_y
    click_strategy: atspi_only


validation:
  attach_success:
    # Validated by snapshot diff in driver — new push button (file chip) must appear.
    # No YAML indicators needed; driver compares pre/post-attach snapshots.
    diff_validated: true
    file_chip_template: "{filename}"

  prompt_ready:
    # Send button must be present after paste — persistent indicator
    indicators:
      - name: "Send message"
        role: push button

  send_success:
    indicators:
      - name: "Stop response"
        role: push button

  response_complete:
    indicators:
      - name: "Copy"
        role: push button

  opus_active:
    indicators:
      - name: "Opus 4.7"
        role: push button
      - name: "Opus 4.7 Adaptive"
        role: push button
      - name: "Opus 4.6"
        role: push button
      - name: "Opus 4.6 Extended"
        role: push button

  sonnet_active:
    indicators:
      - name: "Sonnet 4.6"
        role: push button
      - name: "Sonnet 4.6 Extended"
        role: push button

  haiku_active:
    indicators:
      - name: "Haiku 4.5"
        role: push button
      - name: "Haiku 4.5 Extended"
        role: push button

  extended_thinking_active:
    indicators:
      - name: "Opus 4.7 Adaptive"
        role: push button
      - name: "Opus 4.6 Extended"
        role: push button
      - name: "Sonnet 4.6 Extended"
        role: push button
      - name: "Haiku 4.5 Extended"
        role: push button
