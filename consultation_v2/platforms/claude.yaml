platform: claude
identity_file: IDENTITY_GAIA.md
click_strategy: coordinate_only
navigation_key: F6

urls:
  fresh: https://claude.ai/new
  settle_delay: 5

tree:
  scan_root: app
  dialog_titles:
    - "File Upload"
    - "Open"
    - "Open File"
  fence_after: []

  exclude:
    names:
      - "Search with Google or enter address"
      - "Google, pick a search engine"
      - "View site information"
      - "You have granted this website additional permissions."
      - "Bookmark this page (Ctrl+D)"
      - "Sidebars"
      - "Back"
      - "Forward"
      - "Reload"
      - "Firefox View"
      - "Close tab"
      - "Open a new tab (Ctrl+T)"
      - "List all tabs"
      - "Account"
      - "Extensions"
      - "Firefox"
    roles:
      - separator
      - document web
      - paragraph
      - list item
      - page tab

  sidebar_nav:
    - name: "Open sidebar"
      role: toggle button
    - name: "Home"
      role: link
    - name: "New chat"
      role: link
    - name: "Search"
      role: link
    - name: "Customize"
      role: link
    - name: "Chats"
      role: link
    - name: "Projects"
      role: link
    - name: "Artifacts"
      role: link
    - name: "Code"
      role: link
    - name: "Get apps and extensions"
      role: link
    - name: "Jesse LaRose, Settings"
      role: push button

  element_map:
    input:
      name: "Write your prompt to Claude"
      role: entry
      states_include: [editable, multi-line]

    attach_trigger:
      name: "Add files, connectors, and more"
      role: push button

    send_button:
      name: "Send message"
      role: push button

    stop_button:
      name: "Stop response"
      role: push button

    copy_button:
      name: "Copy"
      role: push button

    model_selector:
      # Exact current-model button names only; no substring matching.
      names:
        - "Model: Opus 4.7"
        - "Model: Opus 4.7 Adaptive"
        - "Model: Opus 4.6"
        - "Model: Opus 4.6 Extended"
        - "Model: Sonnet 4.6"
        - "Model: Sonnet 4.6 Extended"
        - "Model: Haiku 4.5"
        - "Model: Haiku 4.5 Extended"
      role: push button

    voice_mode:
      name: "Use voice mode"
      role: push button

    incognito:
      name: "Use incognito"
      role: push button

    upload_files_item:
      name: "Add files or photos Ctrl+U"
      role: menu item

    take_screenshot_item:
      name: "Take a screenshot"
      role: menu item

    add_to_project_item:
      name: "Add to project"
      role: menu item

    add_from_github_item:
      name: "Add from GitHub"
      role: menu item

    skills_item:
      name: "Skills"
      role: menu item

    add_connectors_item:
      name: "Add connectors"
      role: menu item

    research_item:
      name: "Research"
      role: check menu item

    web_search_item:
      name: "Web search"
      role: check menu item

    use_style_item:
      name: "Use style"
      role: menu item

    model_opus:
      name: "Opus 4.7 Most capable for ambitious work"
      role: radio menu item

    model_sonnet:
      name: "Sonnet 4.6 Most efficient for everyday tasks"
      role: radio menu item

    model_haiku:
      name: "Haiku 4.5 Fastest for quick answers"
      role: radio menu item

    model_adaptive_thinking_item:
      name: "Adaptive thinking Thinks only when needed Adaptive thinking"
      role: menu item

    model_more_item:
      name: "More models"
      role: menu item

workflow:
  defaults:
    mode: extended_thinking
    tools: []

  selection:
    sequences: {}
    mode_trigger: model_selector
    mode_snapshot: menu
    mode_click_strategy: coordinate_only
    mode_close_with_escape: true
    mode_targets:
      extended_thinking: model_adaptive_thinking_item
    mode_validations:
      extended_thinking: extended_thinking_active
    # Claude has no simple-target tool path; tools are handled via
    # workflow.selection.sequences only. If a tool needs adding (research,
    # web_search, github), declare it as a sequence entry.

  attachment:
    trigger: attach_trigger
    menu_target: upload_files_item
    menu_target_scope: menu
    dialog_location_shortcut: ctrl+l
    dialog_select_all_key: ctrl+a
    dialog_paste_key: ctrl+v
    dialog_confirm_key: Return
    validation: attach_success
    sequence:
      - action: snapshot_buttons
        into: pre_attach_buttons
        role: push button
      - action: click
        element: attach_trigger
        delay: 1.5
      - action: click
        element: upload_files_item
        scope: menu
        delay: 3.0
      - action: file_dialog_upload
        file: ${pkg}
        delay: 5.0
      - action: verify_attachment_chip
        baseline: pre_attach_buttons
        role: push button
        validation: attach_success
        file: ${pkg}
        timeout: 20
        poll_interval: 1.0

  prompt:
    input: input
    validation: prompt_ready
    sequence:
      - action: click
        element: input
        delay: 0.5
      - action: paste
        text: ${message}
        delay: 1.0
      - action: verify_text_landed
        element: input
        slack_absolute: 20
        slack_ratio: 0.01
        head_chars: 30
      - action: wait_for_indicator
        validation: prompt_ready
        timeout: 10
        poll_interval: 1.0

  send:
    confirmation_key: stop_button
    trigger: send_button
    require_new_url: false
    confirmation_timeout: 15
    validation: send_success
    sequence:
      - action: capture_url
        into: pre_send_url
      - action: assert_indicator_absent
        validation: send_success
      # Send must use atspi_only. Coordinate click at the AT-SPI-reported
      # position (1291, 1047) returns success but doesn't actually
      # trigger Claude.ai's send action — reproducible HALT at
      # wait_for_indicator(send_success). atspi_only routes through the
      # accessibility API's invoke action and works reliably. Root cause
      # is likely React's synthetic event system not accepting raw
      # xdotool clicks at those coordinates; this is Claude-UI-specific
      # so the fix stays scoped to this step, not the platform default.
      - action: click
        element: send_button
        click_strategy: atspi_only
        delay: 0.5
      - action: wait_for_indicator
        validation: send_success
        timeout: 15
        poll_interval: 2.0
      # Claude R11 #1: session URL transitions claude.ai/new →
      # claude.ai/chat/{uuid} on send. Without this gate a residual
      # Stop response from an earlier dispatched request (back/forward
      # cache, slow cleanup) could false-confirm.
      - action: require_url_changed
        baseline: pre_send_url
        timeout: 15
        poll_interval: 1.0

  timing:
    after_trigger_click: 1.5
    after_target_click: 1.0
    after_escape: 1.0
    after_input_click: 0.5
    after_paste: 1.0
    after_attach_menu: 3.0
    after_file_dialog: 5.0
    send_poll_interval: 2.0
    dialog_after_focus: 0.5
    dialog_after_path_entry: 0.2
    dialog_after_paste: 0.5

  monitor:
    stop_key: stop_button
    poll_interval: 2.0
    required_stop_absent_cycles: 3
    complete_key: copy_button
    timeout: 3600
    validation: response_complete
    sequence:
      - action: wait_for_indicator_absent
        validation: send_success
        required_absent_cycles: 3
        poll_interval: 2.0
        timeout: 3600
      - action: wait_for_indicator
        validation: response_complete
        into: complete_key_present
        timeout: 30
        poll_interval: 2.0
        optional: true

  extract:
    # Claude shows a Copy button on each completed assistant message. Pick
    # the last-by-y (most recent response). Clear clipboard first so a
    # silent click failure reads stale prompt content.
    output_var: response
    sequence:
      - action: press
        key: ctrl+End
        delay: 2.0
      - action: write_clipboard
        text: ""
      - action: click
        element: copy_button
        pick: last_by_y
        click_strategy: atspi_only
        delay: 2.0
      - action: read_clipboard
        into: response
        min_chars: 20


validation:
  attach_success:
    # Claude's chip adds " MD" suffix (uppercase extension) after filename.
    # Pattern: "taey_package_claude_1776442894.md MD"
    diff_validated: true
    file_chip_template: "{filename} MD"

  prompt_ready:
    # Send button must be present after paste — persistent indicator
    indicators:
      - name: "Send message"
        role: push button

  send_success:
    indicators:
      - name: "Stop response"
        role: push button

  response_complete:
    indicators:
      - name: "Copy"
        role: push button

  opus_active:
    indicators:
      - name: "Opus 4.7"
        role: push button
      - name: "Opus 4.7 Adaptive"
        role: push button
      - name: "Opus 4.6"
        role: push button
      - name: "Opus 4.6 Extended"
        role: push button

  sonnet_active:
    indicators:
      - name: "Sonnet 4.6"
        role: push button
      - name: "Sonnet 4.6 Extended"
        role: push button

  haiku_active:
    indicators:
      - name: "Haiku 4.5"
        role: push button
      - name: "Haiku 4.5 Extended"
        role: push button

  extended_thinking_active:
    indicators:
      - name: "Opus 4.7 Adaptive"
        role: push button
      - name: "Opus 4.6 Extended"
        role: push button
      - name: "Sonnet 4.6 Extended"
        role: push button
      - name: "Haiku 4.5 Extended"
        role: push button
