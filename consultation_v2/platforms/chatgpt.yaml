platform: chatgpt
identity_file: IDENTITY_HORIZON.md
click_strategy: xdotool_first

urls:
  fresh: https://chatgpt.com/
  verify_navigation: false

tree:
  # Empty fence keeps snapshot() on the Firefox app root. ChatGPT needs this
  # because key controls and React portals escape the document subtree.
  fence_after: []

  exclude:
    names:
      - "Search with Google or enter address"
      - "Google, pick a search engine"
      - "View site information"
      - "You have granted this website additional permissions."
      - "Bookmark this page (Ctrl+D)"
      - "Sidebars"
      - "Back"
      - "Forward"
      - "Reload"
      - "Firefox View"
      - "Close tab"
      - "Open a new tab (Ctrl+T)"
      - "List all tabs"
      - "Account"
      - "Extensions"
      - "Firefox"
    roles:
      - separator
      - document web
      - paragraph
      - list item
      - page tab

  sidebar_nav:
    - name: "Home"
      role: link
    - name: "Close sidebar"
      role: push button
    - name: "New chat Control Shift O"
      role: link
    - name: "Search chats Control K"
      role: push button
    - name: "Pulse"
      role: link
    - name: "Images"
      role: link
    - name: "Library"
      role: link
    - name: "Apps"
      role: link
    - name: "Codex"
      role: link
    - name: "GPTs"
      role: link
    - name: "Projects"
      role: push button
    - name: "New project"
      role: push button
    - name: "Recents"
      role: push button
    - name: "Jesse LaRose, open profile menu"
      role: push button

  element_map:
    input:
      name: "Chat with ChatGPT"
      role: entry
      states_include: [editable, multi-line]

    attach_trigger:
      name: "Add files and more"
      role: push button

    send_button:
      name: "Send prompt"
      role: push button

    stop_button:
      name: "Stop streaming"
      role: push button

    copy_button:
      name: "Copy response"
      role: push button

    model_selector:
      name: "Model selector"
      role: push button

    temporary_chat:
      name: "Turn on temporary chat"
      role: push button

    extended_pro_option:
      name: "Extended Pro"
      role: push button

    extended_pro_active_indicator:
      name: "Extended Pro, click to remove"
      role: push button

    dictation:
      name: "Start dictation"
      role: push button

    voice_mode:
      name: "Start Voice"
      role: push button

    upload_files_item:
      name: "Add photos & files Control U"
      role: menu item

    recent_files_item:
      name: "Recent files"
      role: menu item

    create_image_item:
      name: "Create image"
      role: radio menu item

    deep_research_item:
      name: "Deep research"
      role: radio menu item

    web_search_item:
      name: "Web search"
      role: radio menu item

    more_submenu_trigger:
      name: "More"
      role: menu item

    agent_mode_item:
      name: "Agent mode"
      role: radio menu item

    github_item:
      name: "GitHub"
      role: radio menu item

    gmail_item:
      name: "Gmail"
      role: radio menu item

    quizzes_item:
      name: "Quizzes"
      role: radio menu item

    model_instant:
      name: "Instant For everyday chats"
      role: radio menu item

    model_thinking:
      name: "Thinking For complex questions"
      role: radio menu item

    model_pro:
      name: "Pro Research-grade intelligence"
      role: radio menu item

    model_configure:
      name: "Configure..."
      role: menu item

workflow:
  defaults:
    model: null
    mode: pro_extended
    tools: []

  selection:
    model_trigger: model_selector
    model_snapshot: menu
    model_click_strategy: atspi_first
    model_targets:
      instant: model_instant
      thinking: model_thinking
      pro: model_pro
    model_validations:
      instant: instant_active
      thinking: thinking_active
      pro: pro_active

    tool_trigger: attach_trigger
    tool_snapshot: menu
    tool_click_strategy: atspi_first
    tool_targets:
      create_image: create_image_item
      deep_research: deep_research_item
      web_search: web_search_item

    sequences:
      pro_extended:
        - trigger: model_selector
          snapshot: menu
          target: model_pro
          click_strategy: atspi_first
          validation: pro_active
        - snapshot: document
          target: extended_pro_option
          click_strategy: xdotool_first
          validation: pro_extended_active

      agent_mode:
        - trigger: attach_trigger
          snapshot: menu
          target: more_submenu_trigger
          action: hover
        - snapshot: menu
          target: agent_mode_item
          click_strategy: atspi_first
          validation: agent_mode_active

      github:
        - trigger: attach_trigger
          snapshot: menu
          target: more_submenu_trigger
          action: hover
        - snapshot: menu
          target: github_item
          click_strategy: atspi_first
          validation: github_active

      gmail:
        - trigger: attach_trigger
          snapshot: menu
          target: more_submenu_trigger
          action: hover
        - snapshot: menu
          target: gmail_item
          click_strategy: atspi_first
          validation: gmail_active

      quizzes:
        - trigger: attach_trigger
          snapshot: menu
          target: more_submenu_trigger
          action: hover
        - snapshot: menu
          target: quizzes_item
          click_strategy: atspi_first
          validation: quizzes_active

  attachment:
    trigger: attach_trigger
    menu_target: upload_files_item
    open_method: keyboard_shortcut
    keyboard_shortcut: ctrl+u
    prefer_keyboard_shortcut: true
    validation: attach_success

  prompt:
    input: input
    paste_via_clipboard: true
    validation: prompt_ready

  send:
    trigger: send_button
    require_new_url: true
    validation: send_success

  monitor:
    stop_key: stop_button
    complete_key: copy_button
    validation: response_complete

  extract:
    primary_key: copy_button
    strategy: last_by_y

  extra_extract:
    strategy: none

validation:
  attach_success:
    pending: true

  prompt_ready:
    pending: true

  send_success:
    pending: true

  response_complete:
    pending: true

  pro_active:
    indicators:
      - name: "Extended Pro, click to remove"
        role: push button

  pro_extended_active:
    indicators:
      - name: "Extended Pro, click to remove"
        role: push button

  instant_active:
    pending: true

  thinking_active:
    pending: true

  agent_mode_active:
    pending: true

  github_active:
    pending: true

  gmail_active:
    pending: true

  quizzes_active:
    pending: true
