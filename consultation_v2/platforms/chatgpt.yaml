platform: chatgpt
click_strategy: xdotool_first
urls:
  fresh: https://chatgpt.com/
  verify_navigation: false
tree:
  fence_after: []
  exclude:
    names:
    - Close sidebar
    - Turn off temporary chat
    - Start Voice
    - Profile image
    - ChatGPT
    - Chat history
    - Skip to content
    name_contains: # lint-allow: known p1 debt; sidebar/noise exclusions still rely on substring until exact live map rewrite
    - Upgrade
    - Get Plus
    - ', open profile menu'
    - Manage my account
    roles:
    - separator
    - document web
    - landmark
    - heading
    - section
  sidebar_nav:
  - name: Home
    role: link
  - name_pattern: New chat* # lint-allow: known p1 debt; fresh-chat nav label is still wildcarded pending exact AT-SPI remap
    role: link
  - name: Pulse
    role: link
  - name: Images
    role: link
  - name: Apps
    role: link
  - name: Deep research
    role: link
  - name: Codex
    role: link
  - name: GPTs
    role: link
  - name: Projects
    role: push button
  - name: Your chats
    role: push button
  element_map:
    input:
      name: Chat with ChatGPT
      role: entry
      states_include:
      - editable
    model_selector:
      name: Extended Pro
      role: push button
    attach_trigger:
      name: Add files and more
      role: push button
    copy_button:
      name_contains: Copy # lint-allow: known p3 debt; extract still keyed by substring until output-type matrix is implemented
      role: push button
    stop_button:
      name_contains: Stop # lint-allow: known p4 debt; stop-state labels still vary and await exact completion map
      role: push button
    pro_indicator:
      name: Extended Pro, click to remove
      role: push button
    thinking_mode:
      name_pattern: '*, click to remove' # lint-allow: known p1 debt; toolbar chip label still wildcarded pending exact state catalog
      role: push button
    extended_pro:
      name: Extended Pro
      role: push button
    temporary_chat:
      name_contains: temporary chat # lint-allow: known p1 debt; temporary-chat indicator still substring-based pending exact remap
      role: push button
    search_chats:
      name: Search chats Control K
      role: push button
    dictation:
      name: Start dictation
      role: push button
    send_button:
      name: Send prompt
      role: push button
    # --- Model selector dropdown items (Firefox root / menu_snapshot) ---
    model_instant:
      name: Instant For everyday chats
      role: menu item
    model_thinking:
      name: Thinking For complex questions
      role: menu item
    model_pro:
      name: Pro Research-grade intelligence
      role: menu item
    # Bug 4 fixed: "Configure..." was present in live scan, missing from YAML
    model_configure:
      name: "Configure..."
      role: menu item
    # --- Extended Pro thinking selector (Firefox root / menu_snapshot) ---
    thinking_standard:
      name: Standard
      role: radio menu item
    thinking_extended:
      name: Extended
      role: radio menu item
    # --- Attach/+ dropdown items (Firefox root / menu_snapshot) ---
    # Bug 1 fixed: was name:"Add photos and files" role:push button
    # AT-SPI actual: [menu item] "Add photos & files Control U"
    tool_upload:
      name: "Add photos & files Control U"
      role: menu item
    tool_recent_files:
      name: Recent files
      role: menu item
    # Re-baselined 2026-05-22 (live scan, "More" submenu EXPANDED).
    # TOP-LEVEL items of the "Add files and more" menu:
    tool_create_image:
      name: Create image
      role: radio menu item
    tool_deep_research:
      name: Deep research
      role: radio menu item
    tool_web_search:
      name: Web search
      role: radio menu item
    tool_more:
      name: More
      role: menu item
    # "More" SUBMENU items (must hover/click tool_more first to reveal these):
    tool_agent_mode:
      name: Agent mode
      role: radio menu item
    tool_create_task:
      name: Create task
      role: radio menu item
    tool_finances:
      name: Finances
      role: radio menu item
    tool_github:
      name: GitHub
      role: radio menu item
    tool_gmail:
      name: Gmail
      role: radio menu item
    tool_openai_platform:
      name: OpenAI Platform
      role: radio menu item
    # GitHub repo picker (after selecting tool_github, a chip + selector appear in
    # the composer). Verified live 2026-05-22:
    github_chip:
      name_contains: "GitHub, click to remove" # lint-allow: known p5 debt; connector chip text is still substring-based pending connector remap
      role: push button
    github_repo_selector:
      name: GitHub
      role: push button
    github_search_repos:
      name: "Search repositories…"
      role: menu item
    github_configure_repos:
      name: Configure Repositories
      role: menu item
    # Repo menu items render as: name="palios-taey/<repo>"; UN-INDEXED repos carry a
    # trailing " Not indexed" in the name (e.g. "palios-taey/taeys-hands-v2 Not indexed").
    # Indexed repos (e.g. "palios-taey/taeys-hands") are selectable directly.
    github_repo_item:
      name_pattern: "palios-taey/*" # lint-allow: known p5 debt; repo picker items remain wildcarded until exact connector inventory exists
      role: menu item
workflow:
  defaults:
    model: pro
    mode: pro
    tools: []
  selection:
    model_targets:
      instant: model_instant
      thinking: model_thinking
      pro: model_pro
    composite_modes:
      pro_extended:
      - trigger: model_selector
        target: model_pro
        verification: pro_active
      - trigger: extended_pro
        target: thinking_extended
        verification: pro_extended_active
      extended_thinking:
      - trigger: model_selector
        target: model_pro
        verification: pro_active
      - trigger: extended_pro
        target: thinking_extended
        verification: extended_thinking_active
    # Re-baselined 2026-05-22. Top-level tools selectable directly; tools marked
    # `via: tool_more` live in the "More" submenu (driver must click tool_more first).
    tool_targets:
      deep_research: tool_deep_research
      web_search: tool_web_search
      create_image: tool_create_image
      github: { target: tool_github, via: tool_more }
      gmail: { target: tool_gmail, via: tool_more }
      agent_mode: { target: tool_agent_mode, via: tool_more }
  # GitHub repo connector flow (verified live 2026-05-22):
  #  attach_trigger -> tool_more -> tool_github (activates tool) ->
  #  github_repo_selector (push button) -> repo dropdown
  #  (github_search_repos to filter; click github_repo_item "palios-taey/<repo>").
  # INDEXING: repo items ending " Not indexed" must be indexed first via
  # github_configure_repos (slow/async). Select an indexed repo to scope it.
  connectors:
    trigger: attach_trigger
    enable_tool: { target: tool_github, via: tool_more }
    repo_selector: github_repo_selector
    repo_search: github_search_repos
    repo_item_pattern: "palios-taey/{repo}"
    not_indexed_suffix: " Not indexed"
    configure: github_configure_repos
  attachment:
    trigger: attach_trigger
    menu_target: tool_upload
    open_method: keyboard_nav
  prompt:
    input: input
    send_button: send_button
  send:
    trigger: send_button
    require_new_url: true
    stop_key: stop_button
  monitor:
    stop_key: stop_button
    complete_key: copy_button
  extract:
    primary_key: copy_button
    strategy: last_by_y
  extra_extract:
    strategy: none
validation:
  attach_success:
    indicators:
    - name_contains: Remove # lint-allow: known p1 debt; attach-success still uses generic remove chip until exact indicator is mapped
      role_contains: button # lint-allow: known p1 debt; attach-success still uses generic role filter until exact indicator is mapped
  prompt_ready:
    indicators:
    - name: Send prompt
      role: push button
  send_success:
    indicators:
    - name_contains: Stop streaming # lint-allow: known p4 debt; send-success still keyed to substring until exact completion spec lands
      role: push button
    timeout: 30
  response_complete:
    indicators:
    - name_contains: Copy # lint-allow: known p3 debt; response-complete still uses generic copy indicator pending extract matrix
      role_contains: button # lint-allow: known p3 debt; response-complete still uses generic role filter pending extract matrix
    stop_absent: true
  # pro_active: Pro model is selected.
  # pro_indicator (persistent toolbar button) is the authoritative signal —
  # it appears as soon as Pro is active and does NOT vanish on dropdown close.
  pro_active:
    indicators:
    - name: Extended Pro, click to remove
      role: push button
  # pro_extended_active: Pro + Extended Pro are both active.
  # Same persistent toolbar indicator as pro_active — when Extended Pro is
  # engaged the pro_indicator element IS present in the toolbar snapshot.
  pro_extended_active:
    indicators:
    - name: Extended Pro, click to remove
      role: push button
  # instant_active: No persistent toolbar badge exists for Instant.
  # Use best_effort + dropdown item check (open selector, verify item present).
  # Driver opens the dropdown, finds the item, then closes — acceptable because
  # best_effort: true means a miss here does not abort the run.
  instant_active:
    best_effort: true
    indicators:
    - name: Instant For everyday chats
      role: menu item
  # thinking_active: No persistent toolbar badge exists for Thinking.
  # Same best_effort + dropdown item approach as instant_active.
  thinking_active:
    best_effort: true
    indicators:
    - name: Thinking For complex questions
      role: menu item
  # extended_thinking_active: The thinking_mode element (, click to remove)
  # appears in the toolbar when Extended Thinking is active — use it as the
  # primary persistent check, mirroring the pro_indicator pattern.
  extended_thinking_active:
    indicators:
    - name_pattern: ', click to remove' # lint-allow: known p1 debt; extended-thinking badge still wildcarded pending exact active-state map
      role: push button
