platform: chatgpt
click_strategy: xdotool_first
urls:
  # Bare chatgpt.com/ opens a new chat AND carries the real model selector
  # ('Pro Extended'). NOTE: ?temporary-chat=true was tried and REVERTED — the
  # temporary-chat page REMOVES the model selector (shows only a 'High' effort
  # dropdown) so select_model fails. The stale-thread send false-positive is
  # fixed by Stop-button send validation (16d4f67), not by the URL.
  fresh: https://chatgpt.com/
  verify_navigation: false
tree:
  fence_after: []
  exclude:
    names:
    - Close sidebar
    - Turn off temporary chat
    - Start Voice
    - Profile image
    - ChatGPT
    - Chat history
    - Skip to content
    name_contains: # lint-allow: known p1 debt; sidebar/noise exclusions still rely on substring until exact live map rewrite
    - Upgrade
    - Get Plus
    - ', open profile menu'
    - Manage my account
    roles:
    - separator
    - document web
    - landmark
    - heading
    - section
  sidebar_nav:
  - name: Home
    role: link
  - names_any_of:
    - New chat
    - New chat Control Shift O
    role: link
  - name: Pulse
    role: link
  - name: Images
    role: link
  - name: Apps
    role: link
  - name: Deep research
    role: link
  - name: Codex
    role: link
  - name: GPTs
    role: link
  - name: Projects
    role: push button
  - name: Your chats
    role: push button
  element_map:
    input:
      name: Chat with ChatGPT
      role: entry
      states_include:
      - editable
    model_selector:
      # The effort/model trigger button is named after the CURRENTLY-selected
      # effort — it drifted from a fixed 'Pro Extended' label. It is always
      # exactly one of these (enumerated-exact set, contract-allowed names_any_of),
      # so it matches regardless of current effort. Clicking it opens the radio
      # menu (Instant/Medium/High/Extra High/Pro Extended → model_* targets).
      names_any_of: [Instant, Medium, High, Extra High, Pro Extended] # lint-allow: known p5 debt; dynamic-name model picker needs structural/stable locator remap
      role: push button
    attach_trigger:
      name: Add files and more
      role: push button
    copy_button:
      name: Copy response
      role: push button
    stop_button:
      names_any_of:
      - Stop streaming
      - Stop answering
      role: push button
    pro_indicator:
      name: Pro Extended
      role: push button
    thinking_mode:
      name: Pro Extended
      role: push button
    extended_pro:
      name: Pro Extended
      role: push button
    search_chats:
      name: Search chats Control K
      role: push button
    dictation:
      name: Start dictation
      role: push button
    send_button:
      name: Send prompt
      role: push button
    # New-chat link in the sidebar — clicking it FORCES a clean fresh chat so a
    # restored stale draft / old file attachment / reopened temporary thread can
    # never be sent (D1 clean-composer). Exact name+role from the live :2 scan
    # (consultations/p2_map_chatgpt_exact.md line 40: sidebar links 'New chat'
    # and 'New chat Control Shift O'). Both exact labels are valid live states.
    new_chat:
      names_any_of:
      - New chat
      - New chat Control Shift O
      role: link
    # --- Model selector dropdown items (Firefox root / menu_snapshot) ---
    model_instant:
      name: Instant
      role: radio menu item
    model_thinking:
      name: Medium
      role: radio menu item
    model_medium:
      name: Medium
      role: radio menu item
    model_high:
      name: High
      role: radio menu item
    model_extra_high:
      name: Extra High
      role: radio menu item
    model_pro:
      name: Pro Extended
      role: radio menu item
    # Bug 4 fixed: "Configure..." was present in live scan, missing from YAML
    model_configure:
      name: "Configure..."
      role: menu item
    # --- Pro Extended thinking selector (Firefox root / menu_snapshot) ---
    thinking_standard:
      name: Standard
      role: radio menu item
    thinking_extended:
      name: Extended
      role: radio menu item
    # --- Attach/+ dropdown items (Firefox root / menu_snapshot) ---
    # Bug 1 fixed: was name:"Add photos and files" role:push button
    # AT-SPI actual: [menu item] "Add photos & files Control U"
    tool_upload:
      name: "Add photos & files Control U"
      role: menu item
    tool_recent_files:
      name: Recent files
      role: menu item
    # Re-baselined 2026-05-22 (live scan, "More" submenu EXPANDED).
    # TOP-LEVEL items of the "Add files and more" menu:
    tool_create_image:
      name: Create image
      role: radio menu item
    tool_deep_research:
      name: Deep research
      role: radio menu item
    tool_web_search:
      name: Web search
      role: radio menu item
    tool_more:
      name: More
      role: menu item
      trigger_type: hover
    # "More" SUBMENU items (must hover/click tool_more first to reveal these):
    tool_agent_mode:
      name: Agent mode
      role: radio menu item
    tool_create_task:
      name: Create task
      role: radio menu item
    tool_finances:
      name: Finances
      role: radio menu item
    tool_github:
      name: GitHub
      role: radio menu item
    tool_gmail:
      name: Gmail
      role: radio menu item
    tool_openai_platform:
      name: OpenAI Platform
      role: radio menu item
    # GitHub repo picker (after selecting tool_github, a chip + selector appear in
    # the composer). Verified live 2026-05-22:
    github_chip:
      name: "GitHub, click to remove"
      role: push button
    github_repo_selector:
      name: GitHub
      role: push button
    github_search_repos:
      name: "Search repositories…"
      role: menu item
    github_configure_repos:
      name: Configure Repositories
      role: menu item
    # Repo menu items are dynamic and must be mapped from a live exact inventory
    # before connector repo selection is enabled in the clean driver.
workflow:
  defaults:
    model: pro
    mode: pro
    tools: []
  selection:
    model_targets:
      instant: model_instant
      thinking: model_thinking
      pro: model_pro
      medium: model_medium
      high: model_high
      extra_high: model_extra_high
    composite_modes:
      pro_extended:
      - trigger: model_selector
        target: model_pro
        verification: pro_active
      - trigger: extended_pro
        target: thinking_extended
        verification: pro_extended_active
      extended_thinking:
      - trigger: model_selector
        target: model_pro
        verification: pro_active
      - trigger: extended_pro
        target: thinking_extended
        verification: extended_thinking_active
    # Re-baselined 2026-05-22. Top-level tools selectable directly; tools marked
    # `via: tool_more` live in the "More" submenu (driver must click tool_more first).
    tool_targets:
      deep_research: tool_deep_research
      web_search: tool_web_search
      create_image: tool_create_image
      github: { target: tool_github, via: tool_more }
      gmail: { target: tool_gmail, via: tool_more }
      agent_mode: { target: tool_agent_mode, via: tool_more }
  # GitHub repo connector flow (verified live 2026-05-22):
  #  attach_trigger -> tool_more -> tool_github (activates tool) ->
  #  github_repo_selector (push button) -> repo dropdown
  #  (github_search_repos to filter; click github_repo_item "palios-taey/<repo>").
  # INDEXING: repo items ending " Not indexed" must be indexed first via
  # github_configure_repos (slow/async). Select an indexed repo to scope it.
  connectors:
    trigger: attach_trigger
    enable_tool: { target: tool_github, via: tool_more }
    repo_selector: github_repo_selector
    repo_search: github_search_repos
    repo_item_pattern: "palios-taey/{repo}"
    not_indexed_suffix: " Not indexed"
    configure: github_configure_repos
  attachment:
    trigger: attach_trigger
    menu_target: tool_upload
    open_method: keyboard_nav
  prompt:
    input: input
    send_button: send_button
  send:
    trigger: send_button
    require_new_url: true
    stop_key: stop_button
  monitor:
    stop_key: stop_button
    complete_key: copy_button
  extract:
    primary_key: copy_button
    strategy: last_by_y
  extra_extract:
    strategy: none
settle:
  default_ms: 2000
  navigate_ms: 4000
  attach_ms: 3500
  rescan_attempts: 1
validation:
  attach_success:
    file_chip:
      roles:
      - push button
  prompt_ready:
    indicators:
    - name: Send prompt
      role: push button
  send_success:
    indicators:
    - names_any_of:
      - Stop streaming
      - Stop answering
      role: push button
    timeout: 30
  response_complete:
    stop_absent: stop_button
  # pro_active: Pro model is selected.
  # The live signal is the composer model_selector button itself.
  pro_active:
    indicators:
    - name: Pro Extended
      role: push button
  # pro_extended_active: Pro Extended is active.
  pro_extended_active:
    indicators:
    - name: Pro Extended
      role: push button
  # instant_active: No persistent toolbar badge exists for Instant.
  # Use best_effort + dropdown item check (open selector, verify item present).
  # Driver opens the dropdown, finds the item, then closes — acceptable because
  # best_effort: true means a miss here does not abort the run.
  instant_active:
    best_effort: true # lint-allow: known p5 debt; model active validation needs mapped persistent exact state
    indicators:
    - name: Instant
      role: menu item
  # thinking_active: No persistent toolbar badge exists for Thinking.
  # Same best_effort + dropdown item approach as instant_active.
  thinking_active:
    best_effort: true # lint-allow: known p5 debt; mode active validation needs mapped persistent exact state
    indicators:
    - name: Medium
      role: menu item
  # extended_thinking_active: The live model selector itself is the persistent
  # signal for Extended Thinking on this surface; mirror pro_indicator.
  extended_thinking_active:
    indicators:
    - name: Pro Extended
      role: push button

# ============================================================================
# extraction — output-type -> ordered exact-matched workflow.
# Schema + load-time validation: consultation_v2/yaml_contract.py
# (EXTRACTION_OUTPUT_TYPES / EXTRACTION_STEP_ACTIONS); grammar doc:
# consultation_v2/EXTRACTION_SCHEMA.md. Each step's `element` is an exact
# element_map key; the strict loader rejects unknown output types, unknown step
# actions, loose matchers, and missing element/validation keys, fail-loud at
# load. Drivers consume this via get_extraction(); they are NOT rewritten here
# (p4-assistant-text wires the runtime executor).
#
# Only assistant_text is mapped: production-proven path is captured answer-thread
# URL reassertion, absolute bottom scroll, hover-mounted `Copy response`, then
# lowest response Copy by y.
# ChatGPT Deep Research Canvas / Download (artifact / downloaded_file) is documented in
# EXTRACTION_PATTERNS.md but NOT wired in V2 — deliberately NOT declared here so
# the engine stops rather than silently extracting the wrong surface. Mapping it
# is the downstream p4-artifact task.
# ============================================================================
extraction:
  assistant_text:
    steps:
      - action: scroll_to_bottom
        element: attach_trigger
      - action: copy_element
        element: copy_button
        select: last
      - action: read_clipboard
        validation: response_complete
