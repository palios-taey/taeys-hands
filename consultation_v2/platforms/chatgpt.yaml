platform: chatgpt
identity_file: IDENTITY_HORIZON.md
click_strategy: coordinate_only
navigation_key: F6

urls:
  fresh: https://chatgpt.com/
  settle_delay: 5
  fresh_url_must_not_contain:
    - /c/

tree:
  # Empty fence keeps snapshot() on the Firefox app root. ChatGPT needs this
  # because key controls and React portals escape the document subtree.
  scan_root: app
  dialog_titles:
    - "File Upload"
    - "Open"
    - "Open File"
  fence_after: []

  exclude:
    names:
      - "Search with Google or enter address"
      - "Google, pick a search engine"
      - "View site information"
      - "You have granted this website additional permissions."
      - "Bookmark this page (Ctrl+D)"
      - "Sidebars"
      - "Back"
      - "Forward"
      - "Reload"
      - "Firefox View"
      - "Close tab"
      - "Open a new tab (Ctrl+T)"
      - "List all tabs"
      - "Account"
      - "Extensions"
      - "Firefox"
    roles:
      - separator
      - document web
      - paragraph
      - list item
      - page tab

  sidebar_nav:
    - name: "Home"
      role: link
    - name: "Close sidebar"
      role: push button
    - name: "New chat Control Shift O"
      role: link
    - name: "Search chats Control K"
      role: push button
    - name: "Pulse"
      role: link
    - name: "Images"
      role: link
    - name: "Library"
      role: link
    - name: "Apps"
      role: link
    - name: "Codex"
      role: link
    - name: "GPTs"
      role: link
    - name: "Projects"
      role: push button
    - name: "New project"
      role: push button
    - name: "Recents"
      role: push button
    - name: "Jesse LaRose, open profile menu"
      role: push button

  element_map:
    input:
      name: "Chat with ChatGPT"
      role: entry
      states_include: [editable, multi-line]

    attach_trigger:
      name: "Add files and more"
      role: push button

    send_button:
      name: "Send prompt"
      role: push button

    stop_button:
      name: "Stop streaming"
      role: push button

    copy_button:
      name: "Copy response"
      role: push button

    # ChatGPT converts pastes above ~5000 chars into a file-attachment chip
    # with a "Show in text field" link that restores the content into the
    # composer. Without clicking it, the input has only the "Ask anything"
    # placeholder (13 chars) and verify_text_landed correctly fails. The
    # prompt sequence clicks this (optional — absent for short pastes).
    show_in_text_field_button:
      name: "Show in text field"
      role: push button

    model_selector:
      name: "Model selector"
      role: push button

    temporary_chat:
      name: "Turn on temporary chat"
      role: push button

    extended_pro_option:
      name: "Extended Pro"
      role: push button

    extended_pro_active_indicator:
      name: "Extended Pro, click to remove"
      role: push button

    agent_mode_active_indicator:
      name: "Agent, click to remove"
      role: push button

    deep_research_active_indicator:
      name: "Deep research, click to remove"
      role: push button

    github_active_indicator:
      name: "GitHub, click to remove"
      role: push button

    gmail_active_indicator:
      name: "Gmail, click to remove"
      role: push button

    quizzes_active_indicator:
      name: "Quizzes, click to remove"
      role: push button

    dictation:
      name: "Start dictation"
      role: push button

    voice_mode:
      name: "Start Voice"
      role: push button

    upload_files_item:
      name: "Add photos & files Control U"
      role: menu item

    recent_files_item:
      name: "Recent files"
      role: menu item

    create_image_item:
      name: "Create image"
      role: radio menu item

    deep_research_item:
      name: "Deep research"
      role: radio menu item

    web_search_item:
      name: "Web search"
      role: radio menu item

    more_submenu_trigger:
      name: "More"
      role: menu item

    agent_mode_item:
      name: "Agent mode"
      role: radio menu item

    github_item:
      name: "GitHub"
      role: radio menu item

    gmail_item:
      name: "Gmail"
      role: radio menu item

    quizzes_item:
      name: "Quizzes"
      role: radio menu item

    model_instant:
      name: "Instant For everyday chats"
      role: radio menu item

    model_thinking:
      name: "Thinking For complex questions"
      role: radio menu item

    model_pro:
      name: "Pro Research-grade intelligence"
      role: radio menu item

    model_configure:
      name: "Configure..."
      role: menu item

workflow:
  defaults:
    mode: pro_extended
    tools: []

  selection:
    sequences:
      pro_extended:
        # Step 1: open model picker, select Pro if not already. Do NOT
        # verify_by_checked_state — pro_active has no persistent document
        # indicator (only "Extended Pro, click to remove" which needs
        # step 2 first), and the menu auto-closes on select so in-scope
        # checked verification would always fail. close_with_escape is
        # required on the skip path so the next step (document-scope
        # extended_pro_option click) isn't obstructed by an open menu.
        # pro_extended_active is the real post-sequence proof (step 2
        # validates it). R2 audit (ChatGPT + Gemini).
        - trigger: model_selector
          snapshot: menu
          target: model_pro
          click_strategy: atspi_only
          skip_if_checked: true
          close_with_escape: true
          validation: pro_active
        - snapshot: document
          target: extended_pro_option
          click_strategy: coordinate_only
          validation: pro_extended_active

      agent_mode:
        - trigger: attach_trigger
          snapshot: menu
          target: more_submenu_trigger
        - snapshot: menu
          target: agent_mode_item
          click_strategy: atspi_only
          validation: agent_mode_active

      github:
        - trigger: attach_trigger
          snapshot: menu
          target: more_submenu_trigger
        - snapshot: menu
          target: github_item
          click_strategy: atspi_only
          validation: github_active

      gmail:
        - trigger: attach_trigger
          snapshot: menu
          target: more_submenu_trigger
        - snapshot: menu
          target: gmail_item
          click_strategy: atspi_only
          validation: gmail_active

      quizzes:
        - trigger: attach_trigger
          snapshot: menu
          target: more_submenu_trigger
        - snapshot: menu
          target: quizzes_item
          click_strategy: atspi_only
          validation: quizzes_active

      deep_research:
        - trigger: attach_trigger
          snapshot: menu
          target: deep_research_item
          click_strategy: atspi_only
          validation: deep_research_active

  attachment:
    trigger: attach_trigger
    menu_target: upload_files_item
    menu_target_scope: menu
    dialog_location_shortcut: ctrl+l
    dialog_select_all_key: ctrl+a
    dialog_paste_key: ctrl+v
    dialog_confirm_key: Return
    validation: attach_success
    sequence:
      - action: snapshot_buttons
        into: pre_attach_buttons
        role: push button
      - action: click
        element: attach_trigger
        delay: 1.5
      - action: click
        element: upload_files_item
        scope: menu
        delay: 3.0
      - action: file_dialog_upload
        file: ${pkg}
        delay: 5.0
      - action: verify_attachment_chip
        baseline: pre_attach_buttons
        role: push button
        validation: attach_success
        file: ${pkg}
        timeout: 20
        poll_interval: 1.0

  prompt:
    input: input
    validation: prompt_ready
    # ChatGPT-specific: pastes > ~5000 chars get converted into a file-
    # attachment chip automatically. A "Show in text field" push button
    # appears that restores the content into the composer. The step is
    # optional — for shorter pastes the button never appears. verify_text_
    # landed catches the case where auto-attach happened AND the show-in-
    # text-field button is also missing (UI broke).
    sequence:
      - action: click
        element: input
        delay: 0.5
      - action: paste
        text: ${message}
        delay: 1.0
      - action: click
        element: show_in_text_field_button
        click_strategy: atspi_only
        delay: 2.0
        optional: true
      - action: verify_text_landed
        element: input
        slack_absolute: 20
        slack_ratio: 0.01
        head_chars: 30
      - action: wait_for_indicator
        validation: prompt_ready
        timeout: 10
        poll_interval: 1.0

  send:
    confirmation_key: stop_button
    trigger: send_button
    require_new_url: true
    confirmation_timeout: 30
    validation: send_success
    sequence:
      - action: capture_url
        into: pre_send_url
      - action: assert_indicator_absent
        validation: send_success
      - action: click
        element: send_button
        delay: 0.5
      - action: wait_for_indicator
        validation: send_success
        timeout: 30
        poll_interval: 2.0
      - action: require_url_changed
        baseline: pre_send_url

  timing:
    after_trigger_click: 1.5
    after_target_click: 1.0
    after_escape: 1.0
    after_input_click: 0.5
    after_paste: 1.0
    after_attach_menu: 3.0
    after_file_dialog: 5.0
    send_poll_interval: 2.0
    dialog_after_focus: 0.5
    dialog_after_path_entry: 0.2
    dialog_after_paste: 0.5

  monitor:
    stop_key: stop_button
    poll_interval: 2.0
    required_stop_absent_cycles: 3
    complete_key: copy_button
    timeout: 3600
    validation: response_complete
    # Generation is done when stop_button has been absent for N consecutive
    # cycles; completion is verified when the Copy button appears on the
    # latest assistant message. The final wait records its outcome via
    # `into: complete_key_present` so the monitor process can distinguish
    # RESPONSE_COMPLETE (True) from RESPONSE_UNVERIFIED (False).
    sequence:
      - action: wait_for_indicator_absent
        validation: send_success
        required_absent_cycles: 3
        poll_interval: 2.0
        timeout: 3600
      - action: wait_for_indicator
        validation: response_complete
        into: complete_key_present
        timeout: 30
        poll_interval: 2.0
        optional: true

  extract:
    # ChatGPT shows a "Copy response" push button on each completed message.
    # For the most recent response, pick last_by_y. Clear clipboard first
    # so a silently-failed click reads stale content (would be the prompt
    # text from the paste).
    output_var: response
    sequence:
      - action: press
        key: ctrl+End
        delay: 2.0
      - action: write_clipboard
        text: ""
      - action: click
        element: copy_button
        pick: last_by_y
        click_strategy: atspi_only
        delay: 2.0
      - action: read_clipboard
        into: response
        min_chars: 20


validation:
  attach_success:
    # Validated by snapshot diff in driver — new push button (file chip) must appear.
    # No YAML indicators needed; driver compares pre/post-attach snapshots.
    diff_validated: true
    file_chip_template: "{filename}"

  prompt_ready:
    # Send button must be present after paste — persistent indicator
    indicators:
      - name: "Send prompt"
        role: push button

  send_success:
    indicators:
      - name: "Stop streaming"
        role: push button
      - name: "Stop research"
        role: push button

  response_complete:
    indicators:
      - name: "Copy response"
        role: push button

  pro_active:
    # No persistent document indicator exists for Pro alone — "Extended
    # Pro" only appears when Extended Pro is toggled (step 2 of the
    # pro_extended sequence validates that). When pro_extended's step 1
    # either skipped (Pro already selected) or clicked and the menu
    # auto-closed, in-scope checked verification isn't possible here.
    # The primitive clicks blindly; this unverifiable_reason routes the
    # post-check (consult.py) through the documented warning path.
    # Step 2's pro_extended_active indicator is the real confirmation.
    unverifiable_reason: "No document indicator for Pro alone; pro_extended_active (step 2) is the canonical proof."

  pro_extended_active:
    indicators:
      - name: "Extended Pro, click to remove"
        role: push button

  instant_active:
    # No persistent indicator — verified by checked state during selection
    verified_by_checked_state: true

  thinking_active:
    # No persistent indicator — verified by checked state during selection
    verified_by_checked_state: true

  agent_mode_active:
    indicators:
      - name: "Agent, click to remove"
        role: push button

  deep_research_active:
    indicators:
      - name: "Deep research, click to remove"
        role: push button

  github_active:
    indicators:
      - name: "GitHub, click to remove"
        role: push button

  gmail_active:
    indicators:
      - name: "Gmail, click to remove"
        role: push button

  quizzes_active:
    indicators:
      - name: "Quizzes, click to remove"
        role: push button
