platform: chatgpt
click_strategy: xdotool_first
urls:
  fresh: https://chatgpt.com/
  verify_navigation: false
tree:
  fence_after: []
  exclude:
    names:
    - Close sidebar
    - Turn off temporary chat
    - Start Voice
    - Profile image
    - ChatGPT
    - Chat history
    - Skip to content
    name_contains:
    - Upgrade
    - Get Plus
    - ', open profile menu'
    - Manage my account
    roles:
    - separator
    - document web
    - landmark
    - heading
    - section
  sidebar_nav:
  - name: Home
    role: link
  - name_pattern: New chat*
    role: link
  - name: Pulse
    role: link
  - name: Images
    role: link
  - name: Apps
    role: link
  - name: Deep research
    role: link
  - name: Codex
    role: link
  - name: GPTs
    role: link
  - name: Projects
    role: push button
  - name: Your chats
    role: push button
  element_map:
    input:
      name: Chat with ChatGPT
      role: entry
      states_include:
      - editable
    model_selector:
      name: Model selector
      role: push button
    attach_trigger:
      name: Add files and more
      role: push button
    copy_button:
      name_contains: Copy
      role: push button
    stop_button:
      name: Stop streaming
      role: push button
    pro_indicator:
      name: Extended Pro, click to remove
      role: push button
    thinking_mode:
      name_pattern: '*, click to remove'
      role: push button
    extended_pro:
      name: Extended Pro
      role: push button
    temporary_chat:
      name_contains: temporary chat
      role: push button
    search_chats:
      name: Search chats Control K
      role: push button
    dictation:
      name: Start dictation
      role: push button
    send_button:
      name: Send prompt
      role: push button
    # --- Model selector dropdown items (Firefox root / menu_snapshot) ---
    model_instant:
      name: Instant For everyday chats
      role: menu item
    model_thinking:
      name: Thinking For complex questions
      role: menu item
    model_pro:
      name: Pro Research-grade intelligence
      role: menu item
    # Bug 4 fixed: "Configure..." was present in live scan, missing from YAML
    model_configure:
      name: "Configure..."
      role: menu item
    # --- Extended Pro thinking selector (Firefox root / menu_snapshot) ---
    thinking_standard:
      name: Standard
      role: radio menu item
    thinking_extended:
      name: Extended
      role: radio menu item
    # --- Attach/+ dropdown items (Firefox root / menu_snapshot) ---
    # Bug 1 fixed: was name:"Add photos and files" role:push button
    # AT-SPI actual: [menu item] "Add photos & files Control U"
    tool_upload:
      name: "Add photos & files Control U"
      role: menu item
    tool_recent_files:
      name: Recent files
      role: menu item
    # Bug 2 fixed: these 5 are radio menu item in AT-SPI, not menu item
    # Bug 2 also: tool_create_image was entirely missing, now added
    tool_create_image:
      name: Create image
      role: radio menu item
    tool_web_search:
      name: Web search
      role: radio menu item
    tool_github:
      name: GitHub
      role: radio menu item
    tool_gmail:
      name: Gmail
      role: radio menu item
    tool_quizzes:
      name: Quizzes
      role: radio menu item
    # Bug 3: removed stale entries not present in current AT-SPI scan:
    #   tool_deep_research ("Deep research")
    #   tool_google_drive ("Add from Google Drive")
    #   tool_study ("Study and learn")
    #   tool_more ("More")
    #   tool_agent_mode ("Agent mode")
workflow:
  defaults:
    model: pro
    mode: pro
    tools: []
  selection:
    model_targets:
      instant: model_instant
      thinking: model_thinking
      pro: model_pro
    composite_modes:
      pro_extended:
      - trigger: model_selector
        target: model_pro
        verification: pro_active
      - trigger: extended_pro
        target: thinking_extended
        verification: pro_extended_active
      extended_thinking:
      - trigger: model_selector
        target: model_pro
        verification: pro_active
      - trigger: extended_pro
        target: thinking_extended
        verification: extended_thinking_active
    # Bug 3 follow-on: removed stale tool_targets that referenced deleted elements
    tool_targets:
      web_search: tool_web_search
      github: tool_github
  attachment:
    trigger: attach_trigger
    menu_target: tool_upload
    open_method: keyboard_nav
  prompt:
    input: input
    send_button: send_button
  send:
    trigger: send_button
    require_new_url: true
    stop_key: stop_button
  monitor:
    stop_key: stop_button
    complete_key: copy_button
  extract:
    primary_key: copy_button
    strategy: last_by_y
  extra_extract:
    strategy: none
validation:
  attach_success:
    indicators:
    - name_contains: Remove
      role_contains: button
  prompt_ready:
    indicators:
    - name: Send prompt
      role: push button
  send_success:
    indicators:
    - name_contains: Stop streaming
      role: push button
    timeout: 30
  response_complete:
    indicators:
    - name_contains: Copy
      role_contains: button
    stop_absent: true
  # pro_active: Pro model is selected.
  # pro_indicator (persistent toolbar button) is the authoritative signal —
  # it appears as soon as Pro is active and does NOT vanish on dropdown close.
  pro_active:
    indicators:
    - name: Extended Pro, click to remove
      role: push button
  # pro_extended_active: Pro + Extended Pro are both active.
  # Same persistent toolbar indicator as pro_active — when Extended Pro is
  # engaged the pro_indicator element IS present in the toolbar snapshot.
  pro_extended_active:
    indicators:
    - name: Extended Pro, click to remove
      role: push button
  # instant_active: No persistent toolbar badge exists for Instant.
  # Use best_effort + dropdown item check (open selector, verify item present).
  # Driver opens the dropdown, finds the item, then closes — acceptable because
  # best_effort: true means a miss here does not abort the run.
  instant_active:
    best_effort: true
    indicators:
    - name: Instant For everyday chats
      role: menu item
  # thinking_active: No persistent toolbar badge exists for Thinking.
  # Same best_effort + dropdown item approach as instant_active.
  thinking_active:
    best_effort: true
    indicators:
    - name: Thinking For complex questions
      role: menu item
  # extended_thinking_active: The thinking_mode element (, click to remove)
  # appears in the toolbar when Extended Thinking is active — use it as the
  # primary persistent check, mirroring the pro_indicator pattern.
  extended_thinking_active:
    indicators:
    - name_pattern: ', click to remove'
      role: push button
