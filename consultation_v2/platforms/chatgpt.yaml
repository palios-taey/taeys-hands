platform: chatgpt
identity_file: IDENTITY_HORIZON.md
click_strategy: coordinate_only
navigation_key: F6

urls:
  fresh: https://chatgpt.com/
  verify_navigation: false

tree:
  # Empty fence keeps snapshot() on the Firefox app root. ChatGPT needs this
  # because key controls and React portals escape the document subtree.
  scan_root: app
  dialog_titles:
    - "File Upload"
    - "Open"
    - "Open File"
  fence_after: []

  exclude:
    names:
      - "Search with Google or enter address"
      - "Google, pick a search engine"
      - "View site information"
      - "You have granted this website additional permissions."
      - "Bookmark this page (Ctrl+D)"
      - "Sidebars"
      - "Back"
      - "Forward"
      - "Reload"
      - "Firefox View"
      - "Close tab"
      - "Open a new tab (Ctrl+T)"
      - "List all tabs"
      - "Account"
      - "Extensions"
      - "Firefox"
    roles:
      - separator
      - document web
      - paragraph
      - list item
      - page tab

  sidebar_nav:
    - name: "Home"
      role: link
    - name: "Close sidebar"
      role: push button
    - name: "New chat Control Shift O"
      role: link
    - name: "Search chats Control K"
      role: push button
    - name: "Pulse"
      role: link
    - name: "Images"
      role: link
    - name: "Library"
      role: link
    - name: "Apps"
      role: link
    - name: "Codex"
      role: link
    - name: "GPTs"
      role: link
    - name: "Projects"
      role: push button
    - name: "New project"
      role: push button
    - name: "Recents"
      role: push button
    - name: "Jesse LaRose, open profile menu"
      role: push button

  element_map:
    input:
      name: "Chat with ChatGPT"
      role: entry
      states_include: [editable, multi-line]

    attach_trigger:
      name: "Add files and more"
      role: push button

    send_button:
      name: "Send prompt"
      role: push button

    stop_button:
      name: "Stop streaming"
      role: push button

    copy_button:
      name: "Copy response"
      role: push button

    model_selector:
      name: "Model selector"
      role: push button

    temporary_chat:
      name: "Turn on temporary chat"
      role: push button

    extended_pro_option:
      name: "Extended Pro"
      role: push button

    extended_pro_active_indicator:
      name: "Extended Pro, click to remove"
      role: push button

    agent_mode_active_indicator:
      name: "Agent, click to remove"
      role: push button

    github_active_indicator:
      name: "GitHub, click to remove"
      role: push button

    gmail_active_indicator:
      name: "Gmail, click to remove"
      role: push button

    quizzes_active_indicator:
      name: "Quizzes, click to remove"
      role: push button

    dictation:
      name: "Start dictation"
      role: push button

    voice_mode:
      name: "Start Voice"
      role: push button

    upload_files_item:
      name: "Add photos & files Control U"
      role: menu item

    recent_files_item:
      name: "Recent files"
      role: menu item

    create_image_item:
      name: "Create image"
      role: radio menu item

    deep_research_item:
      name: "Deep research"
      role: radio menu item

    web_search_item:
      name: "Web search"
      role: radio menu item

    more_submenu_trigger:
      name: "More"
      role: menu item

    agent_mode_item:
      name: "Agent mode"
      role: radio menu item

    github_item:
      name: "GitHub"
      role: radio menu item

    gmail_item:
      name: "Gmail"
      role: radio menu item

    quizzes_item:
      name: "Quizzes"
      role: radio menu item

    model_instant:
      name: "Instant For everyday chats"
      role: radio menu item

    model_thinking:
      name: "Thinking For complex questions"
      role: radio menu item

    model_pro:
      name: "Pro Research-grade intelligence"
      role: radio menu item

    model_configure:
      name: "Configure..."
      role: menu item

workflow:
  defaults:
    model: null
    mode: pro_extended
    tools: []

  selection:
    model_trigger: model_selector
    model_snapshot: menu
    model_click_strategy: atspi_only
    model_verified_by_checked_state: true
    model_targets:
      instant: model_instant
      thinking: model_thinking
      pro: model_pro
    model_validations:
      instant: instant_active
      thinking: thinking_active
      pro: pro_active

    tool_trigger: attach_trigger
    tool_snapshot: menu
    tool_click_strategy: atspi_only
    tool_targets:
      create_image: create_image_item
      deep_research: deep_research_item
      web_search: web_search_item

    sequences:
      pro_extended:
        - trigger: model_selector
          snapshot: menu
          target: model_pro
          click_strategy: atspi_only
          verified_by_checked_state: true
          validation: pro_active
        - snapshot: document
          target: extended_pro_option
          click_strategy: coordinate_only
          validation: pro_extended_active

      agent_mode:
        - trigger: attach_trigger
          snapshot: menu
          target: more_submenu_trigger
          action: hover
        - snapshot: menu
          target: agent_mode_item
          click_strategy: atspi_only
          validation: agent_mode_active

      github:
        - trigger: attach_trigger
          snapshot: menu
          target: more_submenu_trigger
          action: hover
        - snapshot: menu
          target: github_item
          click_strategy: atspi_only
          validation: github_active

      gmail:
        - trigger: attach_trigger
          snapshot: menu
          target: more_submenu_trigger
          action: hover
        - snapshot: menu
          target: gmail_item
          click_strategy: atspi_only
          validation: gmail_active

      quizzes:
        - trigger: attach_trigger
          snapshot: menu
          target: more_submenu_trigger
          action: hover
        - snapshot: menu
          target: quizzes_item
          click_strategy: atspi_only
          validation: quizzes_active

  attachment:
    trigger: attach_trigger
    menu_target: upload_files_item
    open_method: keyboard_shortcut
    keyboard_shortcut: ctrl+u
    prefer_keyboard_shortcut: true
    dialog_location_shortcut: ctrl+l
    validation: attach_success

  prompt:
    input: input
    paste_via_clipboard: true
    validation: prompt_ready

  send:
    confirmation_key: stop_button
    trigger: send_button
    require_new_url: true
    validation: send_success

  monitor:
    stop_key: stop_button
    complete_key: copy_button
    validation: response_complete

  extract:
    scroll_before_extract: ctrl+End
    primary_key: copy_button
    strategy: last_by_y
    click_strategy: atspi_only

  extra_extract:
    strategy: none

validation:
  attach_success:
    # Validated by snapshot diff in driver — new push button (file chip) must appear.
    # No YAML indicators needed; driver compares pre/post-attach snapshots.
    diff_validated: true

  prompt_ready:
    # Send button presence is sufficient — if send_button is in tree, prompt is ready.
    # The send step will fail if send_button is missing.
    pass_through: true

  send_success:
    indicators:
      - name: "Stop streaming"
        role: push button

  response_complete:
    indicators:
      - name: "Copy response"
        role: push button
    stop_absent: true

  pro_active:
    # No persistent indicator — verified by checked state during selection
    verified_by_checked_state: true

  pro_extended_active:
    indicators:
      - name: "Extended Pro, click to remove"
        role: push button

  instant_active:
    # No persistent indicator — verified by checked state during selection
    verified_by_checked_state: true

  thinking_active:
    # No persistent indicator — verified by checked state during selection
    verified_by_checked_state: true

  agent_mode_active:
    indicators:
      - name: "Agent, click to remove"
        role: push button

  github_active:
    indicators:
      - name: "GitHub, click to remove"
        role: push button

  gmail_active:
    indicators:
      - name: "Gmail, click to remove"
        role: push button

  quizzes_active:
    indicators:
      - name: "Quizzes, click to remove"
        role: push button
