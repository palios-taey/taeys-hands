schema: identity_v1
platform: chatgpt
click_strategy: xdotool_first
urls:
  fresh: https://chatgpt.com/
  verify_navigation: false
tree:
  schema: identity_v1
  fence_after: []
  menu_snapshot_scan: document_menu_roles
  menu_snapshot_roles:
    - menu item
    - radio menu item
    - check menu item
    - option
  prune_subtrees:
    - role: list
      name: ""
      ancestor:
        role: landmark
        name: Chat history
      min_child_count: 3
  exclude:
    names:
      - Skip to content
      - Profile image
    roles:
      - alert
      - document web
      - form
      - heading
      - image
      - landmark
      - list
      - list item
      - menu
      - paragraph
      - section
      - separator
      - static
      - status bar
  element_map:
    home_link:
      name: Home
      role: link
      scope: base.sidebar
    close_sidebar:
      name: Close sidebar
      role: push button
      scope: base.sidebar
    temporary_chat_on:
      name: Turn on temporary chat
      role: push button
      scope: base.header
    temporary_chat_off:
      name: Turn off temporary chat
      role: push button
      scope: base.header
    new_chat_shortcut:
      name: New chat Control Shift O
      role: link
      scope: base.sidebar
    search_chats:
      name: Search chats Control K
      role: push button
      scope: base.sidebar
    library_link:
      name: Library
      role: link
      scope: base.sidebar
    projects_link:
      name: Projects New project
      role: link
      scope: base.sidebar
    new_project:
      name: New project
      role: push button
      scope: base.sidebar
    scheduled_link:
      name: Scheduled
      role: link
      scope: base.sidebar
    apps_link:
      name: Apps
      role: link
      scope: base.sidebar
    pinned_toggle:
      name: Pinned
      role: push button
      scope: base.sidebar
    recents_toggle:
      name: Recents
      role: push button
      scope: base.sidebar
    new_chat_recent:
      name: New chat
      role: link
      scope: base.sidebar
    organize_chats:
      name: Organize chats
      role: push button
      scope: base.sidebar
    profile_menu:
      name: Jesse LaRose Pro, open profile menu
      role: push button
      scope: base.sidebar.footer
    download_apps:
      name: Download apps
      role: push button
      scope: base.sidebar.footer
    attach_trigger:
      name: Add files and more
      role: push button
      scope: base.composer
    input_chat_with_chatgpt:
      name: Chat with ChatGPT
      role: entry
      scope: base.composer
    input_ask_anything:
      name: Ask anything
      role: entry
      scope: base.composer
    model_selector:
      name: Pro
      role: push button
      scope: base.composer
    dictation:
      name: Start dictation
      role: push button
      scope: base.composer
    voice_button:
      name: Start Voice
      role: push button
      scope: base.composer
    send_button:
      name: Send prompt
      role: push button
      scope: base.composer
    stop_streaming_button:
      name: Stop streaming
      role: push button
      scope: response.generating
    stop_answering_button:
      name: Stop answering
      role: push button
      scope: response.generating
    copy_button:
      name: Copy response
      role: push button
      scope: response.actions
    model_instant:
      name: Instant
      role: radio menu item
      scope: model_menu
      active_state: checked
    model_medium:
      name: Medium
      role: radio menu item
      scope: model_menu
      active_state: checked
    model_high:
      name: High
      role: radio menu item
      scope: model_menu
      active_state: checked
    model_extra_high:
      name: Extra High
      role: radio menu item
      scope: model_menu
      active_state: checked
    model_pro:
      name: Pro
      role: radio menu item
      scope: model_menu
      active_state: checked
    model_gpt_5_5:
      name: GPT-5.5
      role: menu item
      scope: model_menu
    tool_upload:
      name: Add photos & files Control U
      role: menu item
      scope: tools_menu
    tool_recent_files:
      name: Recent files
      role: menu item
      scope: tools_menu
    tool_create_image:
      name: Create image
      role: radio menu item
      scope: tools_menu
      active_state: checked
    tool_deep_research:
      name: Deep research
      role: radio menu item
      scope: tools_menu
      active_state: checked
    tool_web_search:
      name: Web search
      role: radio menu item
      scope: tools_menu
      active_state: checked
    tool_more:
      name: More
      role: menu item
      scope: tools_menu
    tool_projects:
      name: Projects
      role: menu item
      scope: tools_menu
    tool_agent_mode:
      name: Agent mode
      role: radio menu item
      scope: more_submenu
      active_state: checked
    tool_create_task:
      name: Create task
      role: radio menu item
      scope: more_submenu
      active_state: checked
    tool_finances:
      name: Finances
      role: radio menu item
      scope: more_submenu
      active_state: checked
    tool_github:
      name: GitHub
      role: radio menu item
      scope: more_submenu
      active_state: checked
    tool_gmail:
      name: Gmail
      role: radio menu item
      scope: more_submenu
      active_state: checked
    tool_openai_platform:
      name: OpenAI Platform
      role: radio menu item
      scope: more_submenu
      active_state: checked
workflow:
  defaults:
    model: pro
    mode: pro
    tools: []
  clean:
    new_chat_keys:
      - new_chat_recent
      - new_chat_shortcut
  selection:
    model_targets:
      instant: model_instant
      thinking: model_medium
      medium: model_medium
      high: model_high
      extra_high: model_extra_high
      pro: model_pro
    composite_modes: {}
    tool_targets:
      create_image: tool_create_image
      deep_research: tool_deep_research
      web_search: tool_web_search
      github:
        target: tool_github
        via: tool_more
        via_action: hover
      gmail:
        target: tool_gmail
        via: tool_more
        via_action: hover
      agent_mode:
        target: tool_agent_mode
        via: tool_more
        via_action: hover
      finances:
        target: tool_finances
        via: tool_more
        via_action: hover
      openai_platform:
        target: tool_openai_platform
        via: tool_more
        via_action: hover
  attachment:
    trigger: attach_trigger
    menu_target: tool_upload
    open_method: keyboard_nav
  prompt:
    input_keys:
      - input_chat_with_chatgpt
      - input_ask_anything
    send_button_keys:
      - send_button
  send:
    require_new_url: true
    stop_keys:
      - stop_streaming_button
      - stop_answering_button
    timeout: 30
  monitor:
    stop_keys:
      - stop_streaming_button
      - stop_answering_button
    complete_key: copy_button
  extract:
    primary_key: copy_button
    strategy: last_by_y
    hover_anchor_key: input_chat_with_chatgpt
    hover_offset_y: 60
  extra_extract:
    strategy: none
settle:
  default_ms: 2000
  navigate_ms: 4000
  attach_ms: 3500
  rescan_attempts: 1
extraction:
  assistant_text:
    steps:
      - action: scroll_to_bottom
        element: attach_trigger
      - action: copy_element
        element: copy_button
        select: last
      - action: read_clipboard
