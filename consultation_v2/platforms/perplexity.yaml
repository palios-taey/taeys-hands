platform: perplexity
identity_file: IDENTITY_CLARITY.md
click_strategy: coordinate_only
navigation_key: F6

urls:
  fresh: https://www.perplexity.ai/
  settle_delay: 5

tree:
  # Empty fence is intentional: the compose controls appear after sidebar/history
  # content in the current AT-SPI tree, so fencing would hide the real targets.
  scan_root: app
  dialog_titles:
    - "File Upload"
    - "Open"
    - "Open File"
  fence_after: []

  exclude:
    names:
      - "Search with Google or enter address"
      - "Google, pick a search engine"
      - "View site information"
      - "You have granted this website additional permissions."
      - "Bookmark this page (Ctrl+D)"
      - "Sidebars"
      - "Back"
      - "Forward"
      - "Reload"
      - "Firefox View"
      - "Close tab"
      - "Open a new tab (Ctrl+T)"
      - "List all tabs"
      - "Account"
      - "Extensions"
      - "Firefox"
    roles:
      - separator
      - document web
      - paragraph
      - list item
      - page tab

  sidebar_nav:
    - name: "Search ⌥⌃1"
      role: link
    - name: "Computer ⌥⌃2"
      role: link
    - name: "New thread Ctrl I"
      role: push button
    - name: "History"
      role: link
    - name: "Discover"
      role: link
    - name: "Spaces"
      role: link
    - name: "Finance"
      role: link
    - name: "Health"
      role: link
    - name: "More"
      role: push button

  element_map:
    input:
      name: ""
      role: entry
      states_include: [editable]

    attach_trigger:
      name: "Add files or tools"
      role: push button

    send_button:
      name: "Submit"
      role: push button

    stop_button:
      name: "Stop response (Esc)"
      role: push button

    copy_button:
      name: "Copy"
      role: push button

    copy_contents_button:
      name: "Copy contents"
      role: push button

    # Rewrite Thread button sits in the response action bar next to Copy
    # (Share / Download / Copy / Rewrite Thread / 1 source / Helpful /
    # Not helpful / More actions). Used when Deep Research stops after
    # announcing a synthesis plan but never writes the report — click
    # this to re-run synthesis against the already-gathered source set.
    rewrite_thread:
      name: "Rewrite Thread"
      role: push button

    # Response container for extract.strategy=tree_walk.
    # Perplexity's page has 4 landmarks:
    #   - "Main" at x=420 y=590 states=[showing,enabled,visible]   ← sidebar
    #   - ""     at x=1060 y=590 states=[showing,enabled,visible]  ← response
    #   - ""     at x=960 y=562 states=[enabled,visible]           ← header
    #   - ""     at x=-2 y=-2   states=[enabled,visible]           ← offscreen
    # Distinguished by having a SHOWING state with an empty name.
    # states_include filters to the unique response content landmark.
    response_landmark:
      name: ""
      role: landmark
      states_include: [showing]

    new_thread:
      name: "New thread Ctrl I"
      role: push button

    dictation:
      name: "Dictation"
      role: push button

    voice_mode:
      name: "Use voice mode"
      role: push button

    notifications:
      name: "Notifications"
      role: push button

    scheduled:
      name: "Scheduled"
      role: push button

    incognito:
      name: "Use incognito: create anonymous threads that aren't saved to your history and expire after 24 hours"
      role: push button

    computer_ready:
      name: "Your Computer is ready"
      role: push button

    # Deep Research expands its report behind a "Show full report" push
    # button. Without clicking it, Copy / Copy contents return a collapsed
    # summary with empty bullets where URLs should be. Used by
    # extract.pre_expand_click_key.
    show_full_report_button:
      name: "Show full report"
      role: push button

    # Toolbar mode-tile semantics:
    # - Active mode appears as a push button with the mode name (toolbar tile).
    # - The adjacent "Remove" push button appears with the active tile.
    # - All modes follow this same pattern (verified via live AT-SPI scans 2026-04-13).
    active_mode_remove:
      name: "Remove"
      role: push button

    deep_research_active_indicator:
      name: "Deep research"
      role: push button

    computer_active_indicator:
      name: "Computer"
      role: push button

    model_council_active_indicator:
      name: "Model council"
      role: push button

    learn_step_by_step_active_indicator:
      name: "Learn step by step"
      role: push button

    upload_files_item:
      name: "Upload files or images"
      role: menu item

    connectors_and_sources_item:
      name: "Connectors and sources"
      role: menu item

    mode_computer_item:
      name: "Computer"
      role: radio menu item

    mode_deep_research_item:
      name: "Deep research"
      role: radio menu item

    mode_model_council_item:
      name: "Model council Max"
      role: radio menu item

    more_submenu_trigger:
      name: "More"
      role: menu item

    mode_learn_step_by_step_item:
      name: "Learn step by step"
      role: radio menu item

    search_sources:
      name: "Search sources"
      role: entry
      states_include: [editable]

    source_web:
      name: "Web"
      role: check menu item

    source_github:
      name: "GitHub GitHub"
      role: check menu item

    source_academic:
      name: "Academic"
      role: check menu item

    source_gmail_with_calendar:
      name: "Gmail with Calendar Gmail with Calendar"
      role: check menu item

    source_google_drive:
      name: "Google Drive Google Drive"
      role: check menu item

    source_health:
      name: "Health"
      role: check menu item

    source_social:
      name: "Social"
      role: check menu item

    source_blockscout:
      name: "Blockscout Blockscout"
      role: check menu item

    source_cb_insights:
      name: "CB Insights CB Insights"
      role: check menu item

    source_godaddy:
      name: "GoDaddy GoDaddy"
      role: check menu item

    source_pitchbook:
      name: "PitchBook PitchBook"
      role: check menu item

    source_statista:
      name: "Statista Statista"
      role: check menu item

    source_trivago:
      name: "Trivago Trivago"
      role: check menu item

    source_wiley:
      name: "Wiley logo Wiley"
      role: check menu item

    add_files_from_cloud_item:
      name: "Add files from cloud"
      role: menu item

    manage_connectors_item:
      name: "Manage Connectors"
      role: menu item

    connector_asana:
      name: "Asana Asana"
      role: menu item

    connector_box:
      name: "Box Box"
      role: menu item

    connector_cloudinary:
      name: "Cloudinary Cloudinary"
      role: menu item

    connector_confluence:
      name: "Confluence Confluence"
      role: menu item

    connector_dropbox:
      name: "Dropbox Dropbox"
      role: menu item

workflow:
  defaults:
    mode: deep_research
    tools: []

  selection:
    mode_trigger: attach_trigger
    mode_snapshot: menu
    mode_click_strategy: atspi_only
    mode_close_with_escape: true
    mode_skip_if_checked: true
    mode_verified_by_checked_state: true
    mode_targets:
      computer: mode_computer_item
      deep_research: mode_deep_research_item
      model_council: mode_model_council_item
    mode_validations:
      computer: computer_active
      deep_research: deep_research_active
      model_council: model_council_active

    sequences:
      learn_step_by_step:
        - trigger: attach_trigger
          snapshot: menu
          target: more_submenu_trigger
          click_strategy: coordinate_only
        - snapshot: menu
          target: mode_learn_step_by_step_item
          click_strategy: atspi_only
          close_with_escape: true
          validation: learn_step_by_step_active

  connectors:
    open_sequence:
      - trigger: attach_trigger
        snapshot: menu
        target: connectors_and_sources_item
        click_strategy: coordinate_only
    search_input: search_sources
    item_click_strategy: coordinate_only
    verify_checked: true
    close_with_escape: true
    source_targets:
      web: source_web
      github: source_github
      academic: source_academic
      gmail: source_gmail_with_calendar
      google_drive: source_google_drive
      health: source_health
      social: source_social
      blockscout: source_blockscout
      cb_insights: source_cb_insights
      godaddy: source_godaddy
      pitchbook: source_pitchbook
      statista: source_statista
      trivago: source_trivago
      wiley: source_wiley

  attachment:
    trigger: attach_trigger
    menu_target: upload_files_item
    menu_target_scope: menu
    dialog_location_shortcut: ctrl+l
    dialog_select_all_key: ctrl+a
    dialog_paste_key: ctrl+v
    dialog_confirm_key: Return
    validation: attach_success
    sequence:
      - action: snapshot_buttons
        into: pre_attach_buttons
      - action: click
        element: attach_trigger
        delay: 1.5
      - action: click
        element: upload_files_item
        scope: menu
        delay: 3.0
      - action: file_dialog_upload
        file: ${pkg}
        delay: 5.0
      - action: verify_attachment_chip
        baseline: pre_attach_buttons
        validation: attach_success
        file: ${pkg}
        timeout: 20
        poll_interval: 1.0

  prompt:
    input: input
    validation: prompt_ready
    sequence:
      - action: click
        element: input
        delay: 0.5
      - action: paste
        text: ${message}
        delay: 1.0
      - action: verify_text_landed
        element: input
        slack_absolute: 20
        slack_ratio: 0.01
        head_chars: 30
      - action: wait_for_indicator
        validation: prompt_ready
        timeout: 10
        poll_interval: 1.0

  send:
    confirmation_key: stop_button
    trigger: send_button
    require_new_url: true
    confirmation_timeout: 60
    validation: send_success
    sequence:
      - action: capture_url
        into: pre_send_url
      - action: assert_indicator_absent
        validation: send_success
      - action: click
        element: send_button
        delay: 0.5
      - action: wait_for_indicator
        validation: send_success
        timeout: 60
        poll_interval: 2.0
      - action: require_url_changed
        baseline: pre_send_url
        timeout: 30
        poll_interval: 1.0
      # Perplexity R11 #C: Deep Research is two-phase — the stop_button
      # disappears briefly after the source-gathering pass, then
      # reappears for the synthesis phase. Without this continuation,
      # the monitor sees the first stop-disappearance and declares
      # complete before the actual report is written. For non-DR
      # prompts, the first stop vanish is the real completion and
      # these optional steps time out harmlessly.
      - action: wait_for_indicator_absent
        validation: send_success
        required_absent_cycles: 2
        timeout: 120
        poll_interval: 2.0
        optional: true
      - action: wait_for_indicator
        validation: send_success
        timeout: 30
        poll_interval: 2.0
        optional: true

  timing:
    after_trigger_click: 1.5
    after_target_click: 1.0
    after_escape: 1.0
    after_input_click: 0.5
    after_paste: 1.0
    after_attach_menu: 3.0
    after_file_dialog: 5.0
    send_poll_interval: 2.0
    dialog_after_focus: 0.5
    dialog_after_path_entry: 0.2
    dialog_after_paste: 0.5

  monitor:
    stop_key: stop_button
    poll_interval: 2.0
    required_stop_absent_cycles: 3
    complete_key: copy_button
    timeout: 3600
    validation: response_complete
    # Perplexity Deep Research is two-phase: the stop_button disappears
    # briefly between the source-gathering pass and the synthesis phase.
    # The send step already rides out the gap via its two optional
    # wait_for_indicator_absent/wait_for_indicator pair; by the time the
    # monitor starts, we're in the synthesis phase and waiting for the
    # real final stop_button disappearance.
    sequence:
      - action: wait_for_indicator_absent
        validation: send_success
        required_absent_cycles: 3
        poll_interval: 2.0
        timeout: 3600
      - action: wait_for_indicator
        validation: response_complete
        into: complete_key_present
        timeout: 30
        poll_interval: 2.0
        optional: true

  extract:
    # Perplexity Deep Research: multiple UI states can exist for the same
    # completed report (collapsed summary with "Show full report" button,
    # expanded document viewer card with "Copy contents", inline scrolled
    # answer with only the regular Copy button). Each path has different
    # element requirements and the state isn't predictable. The AT-SPI
    # Text interface on the response landmark returns the full rendered
    # answer regardless of which rendering is active — one canonical path
    # that doesn't need pre-expand clicks or multi-state fallbacks.
    #
    # After the initial read, the regenerate_if_short step handles the
    # Deep Research validation-failure pattern where synthesis stops
    # after announcing a plan (~30 char response) but never writes the
    # report. Clicks Rewrite Thread (next to Copy), waits for the fresh
    # generation pass to complete, re-reads. Up to 3 retries. Healthy
    # DR responses (2000+ chars) skip the retry entirely.
    output_var: response
    sequence:
      - action: press
        key: ctrl+End
        delay: 2.0
      - action: read_element_text
        element: response_landmark
        into: response
        min_chars: 20
      - action: regenerate_if_short
        response_var: response
        min_chars: 500
        retry_element: rewrite_thread
        stop_validation: send_success
        complete_validation: response_complete
        extract_element: response_landmark
        max_retries: 3
        required_stop_absent_cycles: 3
        poll_interval: 2.0
        regen_timeout: 3600


validation:
  attach_success:
    # Perplexity truncates long filenames in chip display: "taey_package_perplexity_...md"
    # and appends size as " {size_kb} KB". The template below encodes this exact
    # visible pattern — our package filenames always start with the stable prefix
    # "taey_package_perplexity_" so the truncation point is predictable.
    diff_validated: true
    file_chip_template: "taey_package_perplexity_...md {size_kb} KB"

  prompt_ready:
    # Send button must be present after paste — persistent indicator
    indicators:
      - name: "Submit"
        role: push button

  send_success:
    indicators:
      - name: "Stop response (Esc)"
        role: push button

  response_complete:
    indicators:
      - name: "Copy"
        role: push button

  deep_research_active:
    indicators:
      - name: "Deep research"
        role: push button

  computer_active:
    indicators:
      - name: "Computer"
        role: push button

  model_council_active:
    indicators:
      - name: "Model council"
        role: push button

  learn_step_by_step_active:
    indicators:
      - name: "Learn step by step"
        role: push button
