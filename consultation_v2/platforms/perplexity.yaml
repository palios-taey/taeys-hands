platform: perplexity
click_strategy: xdotool_first
urls:
  fresh: https://www.perplexity.ai/
  verify_navigation: false
tree:
  # fence_after disabled — Deep Research and input controls appear AFTER
  # sidebar history in AT-SPI tree. Fencing cuts them off.
  fence_after: []
  exclude:
    names:
    - User avatar
    name_contains:
    - Upgrade to Pro
    - ', open profile menu'
    - User avatar Jesse
    roles:
    - separator
    - document web
    - paragraph
    - landmark
  sidebar_nav:
  - name: Search
    role: link
  - name: Computer
    role: link
  - name: New Thread
    role: push button
  - name: History
    role: link
  - name: Discover
    role: link
  - name: Spaces
    role: link
  - name: Finance
    role: link
  - name: More
    role: push button
  element_map:
    input:
      name: ""
      role: entry
      states_include:
      - editable
    attach_trigger:
      name: Add files or tools
      role: push button
    upload_files_item:
      name: "Upload files or images"
      role: menu item
    git_connector_item:
      name: Connectors and sources
      role: menu item
    model_selector:
      name: Model
      role: push button
    copy_button:
      name_contains: Copy
      role: push button
    copy_code:
      name: Copy code
      role: push button
    stop_button:
      name: Stop response
      role: push button
    submit_button:
      name: Submit
      role: push button
    share_button:
      name: Share
      role: push button
    download_button:
      name: Download
      role: push button
    copy_contents_button:
      name: Copy contents
      role: push button
    rewrite_thread:
      name: Rewrite Thread
      role: push button
    helpful:
      name: Helpful
      role: push button
    not_helpful:
      name: Not helpful
      role: push button
    more_actions:
      name: More actions
      role: push button
    thread_actions:
      name: Thread actions
      role: push button
    deep_research:
      name: Deep research
      role: radio menu item
    new_thread:
      name: New thread Ctrl I
      role: push button
    dictation:
      name: Dictation
      role: push button
    suggestion_tabs:
      name: Primer query categories
      role: page tab list
    notifications:
      name: Notifications
      role: push button
    computer_dropdown:
      name: Computer
      role: radio menu item
    computer_ready:
      name: "Your Computer is ready"
      role: push button
    voice_mode:
      name: Use voice mode
      role: push button
    incognito:
      name: "Use incognito: create anonymous threads that aren't saved to your history and expire after 24 hours"
      role: push button
    deep_research_toggle:
      name: Deep research
      role: push button
    tool_model_council:
      name: "Model council Max"
      role: radio menu item
workflow:
  defaults:
    model: null
    mode: deep_research
    tools: []
  selection:
    # model_targets removed — no AT-SPI scan of model selector dropdown available yet.
    # Add back after live scan provides exact [radio menu item] names.
    model_targets: {}
    mode_targets:
      deep_research: deep_research
      model_council: tool_model_council
      computer: computer_dropdown  # driver must read this target, not hardcode key names
  attachment:
    trigger: attach_trigger
    menu_target: upload_files_item
    open_method: atspi_menu
  prompt:
    input: input
    send_button: submit_button
  send:
    trigger: submit_button
    require_new_url: true
    stop_key: stop_button
    settle_redirects: true
  monitor:
    stop_key: stop_button
    complete_key: copy_button
  extract:
    primary_key: copy_button
    strategy: last_by_y
  extra_extract:
    strategy: copy_contents_button
    copy_contents_key: copy_contents_button
validation:
  attach_success:
    indicators:
    - name_contains: Remove
      role_contains: button
  prompt_ready:
    indicators:
    - name: Submit
      role: push button
  send_success:
    indicators:
    - name_contains: Stop response
      role: push button
    timeout: 30
  response_complete:
    indicators:
    - name: Copy
      role: push button
    stop_absent: true
  computer_active:
    url_contains: /computer/
  deep_research_active:
    indicators:
    - name: Deep research
      role: push button
      states_include: [checked]
  model_council_active:
    # NOTE: This checks the dropdown radio item which is only visible while dropdown is open.
    # No toolbar push button for model council confirmed in AT-SPI scan yet.
    # Follow-up scan needed to find post-close indicator.
    indicators:
    - name: "Model council Max"
      role: radio menu item
      states_include: [checked]
  # Model-specific *_active specs removed — model_targets is empty.
  # Add back after AT-SPI scan of model selector dropdown.

