platform: x_twitter
# No identity_file — X voice lives in the caller's prompt, NOT in a constitutional
# package. Attaching FAMILY_KERNEL/IDENTITY to a public tweet is unsafe.
identity_file: null
click_strategy: coordinate_only
navigation_key: F6

# Rate limiter — Redis-backed action log at taey:rate:x_twitter.
# CLI overrides: --min-delay, --max-per-hour.
# If the limiter would defer >10min it logs at WARN so the dispatcher
# can back off upstream instead of silently sleeping.
rate_limit:
  max_actions_per_hour: 3
  min_delay_seconds: 60
  jitter_seconds: [5, 120]
  defer_warn_threshold_seconds: 600

urls:
  # `post` action: navigate to home (composer is top of feed).
  # `reply` action: override via --url to the target status URL.
  fresh: https://x.com/home
  settle_delay: 6

tree:
  scan_root: app
  dialog_titles: []
  fence_after: []

  exclude:
    # Right sidebar cutoff — x ≥ 1450 on 1920x1080 is the trending/
    # who-to-follow/live-spaces column, pure noise for our automation.
    # Individual "More" / "Follow" buttons inside trending cards would
    # otherwise match our element_map entries and pollute picks.
    # (Jesse guidance 2026-04-20: right sidebar is tree noise, exclude.)
    x_gte: 1450

    # Curated noise list from the v1 yaml + verified against live AT-SPI scan.
    names:
      - "Search with Google or enter address"
      - "Google, pick a search engine"
      - "View site information"
      - "You have granted this website additional permissions."
      - "Bookmark this page (Ctrl+D)"
      - "Sidebars"
      - "Back"
      - "Forward"
      - "Reload"
      - "Firefox View"
      - "Close tab"
      - "Open a new tab (Ctrl+T)"
      - "List all tabs"
      - "Account"
      - "Extensions"
      - "Firefox"
      # X-specific right-sidebar noise (trending / who-to-follow cards)
      - "What's happening"
      - "Trending now"
      - "Trending"
      - "Relevant people"
      - "Who to follow"
      - "Live on X"
      - "Terms of Service"
      - "Privacy Policy"
      - "Cookie Policy"
      - "Accessibility"
      - "Ads info"
    roles:
      - separator
      - document web
      - paragraph
      - list item
      - page tab

  element_map:
    # Shared composer — same entry on home page (post) and reply overlay.
    # focused state differs (home: not auto-focused; overlay: auto-focused)
    # but states_include matches both via editable+multi_line.
    composer_input:
      name: "Post text"
      role: entry
      states_include: [editable, multi-line]

    # Submit button — labeled "Post" for top-level composer and
    # first-level reply overlays, "Reply" for reply-to-reply overlays
    # (X renames the submit in nested-reply context), "Post all" when
    # in thread mode (multiple composers chained). names: [] accepts
    # any of these exact labels.
    # When composer is empty, states are ['showing', 'visible'] (no enabled).
    # After text is entered, states become ['enabled', 'focusable',
    # 'opaque', 'sensitive', 'showing', 'visible'].
    submit_button:
      names: ["Post", "Reply", "Post all"]
      role: push button

    # Add post link — the "+" icon in the composer toolbar that creates
    # a new composer below the current one, enabling thread mode. Only
    # appears when the current composer has text (X disables it on
    # empty composers). Role is link, not push button.
    # Note: AT-SPI reports the link's top-left but its clickable visual
    # icon is offset ~11px right and ~12px down; thread_compose primitive
    # applies add_post_x_offset / add_post_y_offset to hit the icon.
    add_post_link:
      name: "Add post"
      role: link

    # Close button on the reply overlay — used to cancel a stuck reply
    # and as the canonical "overlay is open" indicator (see validation).
    close_overlay:
      name: "Close"
      role: push button

    # Status-page "More" button — the three-dot menu on the main tweet.
    # Multiple "More" buttons exist on a status page (main tweet + each
    # thread reply + rightbar cards). Main tweet's More is at the
    # smallest y in the main column (~y=177 on 1920x1080 status view).
    # click pick: first_by_y targets it specifically.
    more_trigger_status:
      name: "More"
      role: push button

    # Menu items that appear in More → dropdown for the main tweet.
    # "Pin to your profile" shows when tweet is NOT pinned.
    # "Unpin from profile" shows when tweet IS pinned.
    # These are mutually exclusive — presence of one implies absence of
    # the other. Both use optional: true in the sequences so the action
    # is idempotent (pin_post on already-pinned tweet = no-op).
    pin_menu_item:
      name: "Pin to your profile"
      role: menu item

    unpin_menu_item:
      name: "Unpin from profile"
      role: menu item

    # Confirm buttons in the Pin/Unpin dialog. X shows a modal dialog
    # after clicking the menu item with a primary button matching the
    # action name ("Pin" or "Unpin"). These are distinct from the
    # composer's submit_button ("Post"/"Reply") — different names.
    pin_confirm:
      name: "Pin"
      role: push button

    unpin_confirm:
      name: "Unpin"
      role: push button

    # Delete menu item + delete confirm (for delete_post action).
    delete_menu_item:
      name: "Delete"
      role: menu item

    delete_confirm:
      name: "Delete"
      role: push button

workflow:
  # x_twitter does not use the consultation flow (mode_setup/attach/prompt/
  # send/monitor/extract). It has action-specific sequences under
  # workflow.actions instead. consult.py's --action flag selects which
  # action sequence runs; for x_twitter default-action is 'post'.
  default_action: post

  # Action-specific flags
  actions:
    post:
      # No identity attach for public tweets.
      identity_attach: false
      sequence:
        - action: click
          element: composer_input
          delay: 0.5
        - action: paste
          text: ${message}
          delay: 1.0
        - action: verify_text_landed
          element: composer_input
          slack_absolute: 20
          slack_ratio: 0.02
          head_chars: 20
        # No pre-click validation for Post button state — the primitive
        # can't distinguish the button's 'enabled' from 'disabled' by
        # name+role alone (both states expose the same element). We
        # trust verify_text_landed that the paste worked; if Post was
        # still disabled (e.g. over-length text), the click is a no-op
        # and we detect the failure via the post-submit check below.
        - action: click
          element: submit_button
          delay: 2.5
        # Post success: composer text clears back to empty after the
        # post is submitted. read_element_text with min_chars=0 and
        # empty-match would be ideal; we approximate by re-reading
        # and requiring len(text) < verify_text_landed's head_chars.
        # Kept tolerant — even if detection is ambiguous, the post
        # has been dispatched; the caller can always inspect later.
        - action: read_element_text
          element: composer_input
          into: post_composer_after
          min_chars: 0

    # pin_post — pin a tweet to profile. Navigate to status URL first
    # (caller passes --url). Idempotent: dispatching on an already-
    # pinned tweet is a no-op (pin_menu_item won't be in the menu,
    # step skips via absent_optional; pin_confirm likewise).
    pin_post:
      identity_attach: false
      requires_url: true
      sequence:
        - action: click
          element: more_trigger_status
          pick: first_by_y
          delay: 2.0
        - action: click
          element: pin_menu_item
          scope: menu
          delay: 1.5
          optional: true
        - action: click
          element: pin_confirm
          delay: 2.0
          optional: true
        - action: press
          key: Escape
          delay: 0.5

    # unpin_post — mirror of pin_post. Idempotent the same way.
    unpin_post:
      identity_attach: false
      requires_url: true
      sequence:
        - action: click
          element: more_trigger_status
          pick: first_by_y
          delay: 2.0
        - action: click
          element: unpin_menu_item
          scope: menu
          delay: 1.5
          optional: true
        - action: click
          element: unpin_confirm
          delay: 2.0
          optional: true
        - action: press
          key: Escape
          delay: 0.5

    # delete_post — delete own tweet. Navigate to status URL first.
    # Only the author's tweets show 'Delete' in the More menu; on a
    # non-owned tweet the delete_menu_item won't be there and the step
    # skips (sequence completes with no effect — treat as a no-op for
    # non-author tweets; caller is responsible for URL ownership).
    delete_post:
      identity_attach: false
      requires_url: true
      sequence:
        - action: click
          element: more_trigger_status
          pick: first_by_y
          delay: 2.0
        - action: click
          element: delete_menu_item
          scope: menu
          delay: 1.5
          optional: true
        - action: click
          element: delete_confirm
          delay: 2.0
          optional: true
        - action: press
          key: Escape
          delay: 0.5

    # like_post — press 'l' keyboard shortcut while the target tweet
    # is focused (navigate to its status URL first so it IS the focused
    # main tweet). X toggles like state; dispatching on an already-
    # liked tweet un-likes it. Caller can check state beforehand if
    # idempotency matters.
    like_post:
      identity_attach: false
      requires_url: true
      sequence:
        - action: press
          key: l
          delay: 1.5

    # thread_post — compose an atomic multi-tweet thread using X's
    # native thread composer (the '+' icon that adds a new composer
    # below the current). Caller passes --message as a JSON-encoded
    # array of tweet strings:
    #   python3 -m consultation_v2.consult x_twitter \
    #     '["tweet 1", "tweet 2", "tweet 3"]' --action thread_post
    # Each tweet becomes one post in the thread. "Post all" click at
    # the end submits the whole thread atomically. Beats the old
    # reply-chain workaround per Jesse's 2026-04-20 direction.
    thread_post:
      identity_attach: false
      sequence:
        - action: click
          element: composer_input
          pick: first_by_y
          delay: 0.5
        - action: thread_compose
          add_post_element: add_post_link
          add_post_x_offset: 11
          add_post_y_offset: 12
          delay_between_tweets: 1.5
        - action: click
          element: submit_button
          delay: 2.5

    # get_newest_status_id — navigate to an @handle's profile
    # (caller passes --url like https://x.com/handle), click the
    # topmost NON-pinned article (pinned article's accessible name
    # always starts with "Pinned " on X), capture the resulting
    # status URL. Output is in run_action's final 'dispatched'
    # event URL field — caller parses that JSON and pulls .url.
    get_newest_status_id:
      identity_attach: false
      requires_url: true
      sequence:
        - action: click_newest_article
          skip_prefix: "Pinned "
          y_offset: 30
          delay: 5.0

    reply:
      identity_attach: false
      # Reply requires --url to be passed (target status URL). consult.py
      # overrides urls.fresh with --url before running this sequence.
      requires_url: true
      sequence:
        # Open reply overlay via X's keyboard shortcut 'r' on the
        # focused main tweet. Avoids hunting the dynamic
        # "N Replies. Reply" button name (which violates no-name_contains
        # rule). After page load the main tweet is the focused element,
        # so 'r' opens its reply overlay. If something else is focused
        # (search box, etc) 'r' would type a literal 'r' — the
        # wait_for_indicator(overlay_open) below catches that case.
        - action: press
          key: r
          delay: 2.5
        - action: wait_for_indicator
          validation: overlay_open
          timeout: 5
          poll_interval: 0.5
        # Composer is auto-focused in the overlay — no need to click it.
        - action: paste
          text: ${message}
          delay: 1.0
        - action: verify_text_landed
          element: composer_input
          slack_absolute: 20
          slack_ratio: 0.02
          head_chars: 20
        - action: click
          element: submit_button
          delay: 2.5
        # Reply success: the overlay closes, which removes the Close
        # button from the tree. This is a clean signal — unlike the
        # Post button (always present), the Close button only exists
        # while the overlay is open.
        - action: wait_for_indicator_absent
          validation: overlay_open
          required_absent_cycles: 2
          poll_interval: 1.0
          timeout: 15

validation:
  # overlay_open — the Close button exists only while the reply overlay
  # is open. Used by reply action to detect when the overlay has closed
  # (=> reply posted successfully).
  overlay_open:
    indicators:
      - name: "Close"
        role: push button
