platform: grok
click_strategy: xdotool_first
urls:
  fresh: https://grok.com/
  verify_navigation: true
tree:
  fence_after: []
  exclude:
    names:
    - Toggle Sidebar
    - pfp
    - Web page favicon
    - Markdown
    name_contains: # lint-allow: known p1 debt; sidebar/noise exclusions still rely on substring until exact live map rewrite
    - Upgrade to
    - SuperGrok
    roles:
    - separator
    - document web
    - list item
    - paragraph
    - image
  sidebar_nav:
  - name: Home page
    role: link
  - name: Search
    role: push button
  - name: Chat
    role: link
  - name: Voice
    role: link
  - name: Imagine
    role: link
  - name: Projects
    role: push button
  - name: History
    role: push button
  element_map:
    input:
      name: ""
      role: section
      states_include:
      - editable
      - focusable
    attach_trigger:
      name: Attach
      role: push button
    upload_files_item:
      name: "Upload a file"
      role: menu item
    model_auto:
      name: "Auto Chooses Fast or Expert"
      role: menu item
    model_fast:
      name: "Fast Quick responses"
      role: menu item
    model_expert:
      name: "Expert Thinks hard"
      role: menu item
    model_heavy:
      name: "Heavy Team of Experts"
      role: menu item
    model_selector:
      name: Model select
      role: push button
    copy_button:
      name_contains: Copy # lint-allow: known p3 debt; extract still keyed by substring until output-type matrix is implemented
      role: push button
    edit_button:
      name: Edit
      role: push button
    stop_button:
      name: Stop model response
      role: push button
    regenerate:
      name: Regenerate
      role: push button
    read_aloud:
      name: Read aloud
      role: push button
    start_thread:
      name: Start thread
      role: push button
    like:
      name: Like
      role: push button
    dislike:
      name: Dislike
      role: push button
    more_actions:
      name: More actions
      role: push button
    create_share_link:
      name: Create share link
      role: push button
    search:
      name: Search
      role: push button
    history:
      name: History
      role: push button
    thought_indicator:
      name_contains: Thought for # lint-allow: known p3 debt; thought indicator remains substring-based pending output-type mapping
      role: push button
    scroll_down:
      name: Scroll down
      role: push button
    dictation:
      name: Dictation (Ctrl+D)
      role: push button
    voice_mode:
      name: Enter voice mode (Ctrl+⇧O)
      role: push button
    sources_selector:
      name: Sources selector
      role: push button
    connect_gmail:
      name: Connect Gmail
      role: menu item
    connect_calendar:
      name: Connect Google Calendar
      role: menu item
    connectors:
      name: Connectors
      role: menu item
    # GitHub connector (verified live 2026-05-22): attach_trigger -> connectors ->
    # github_connector (check menu item TOGGLE; already authed on profile).
    # Submenu also exposes: Recent, Skills, Add connector (one-time setup path).
    github_connector:
      name: GitHub
      role: check menu item
    add_connector:
      name: Add connector
      role: menu item
workflow:
  defaults:
    model: null
    mode: null
    tools: []
  selection:
    model_targets:
      auto: model_auto
      fast: model_fast
      expert: model_expert
      heavy: model_heavy
  # Connector flow: open attach_trigger (COORDINATE click — React portal), click
  # connectors menu item, then toggle github_connector. Verify via checked state.
  connectors:
    trigger: attach_trigger
    menu: connectors
    source_targets:
      github: github_connector
  attachment:
    trigger: attach_trigger
    menu_target: upload_files_item
    open_method: coordinate_menu
  prompt:
    input: input
  send:
    trigger: null
    submit_via_return: true
    require_new_url: false
    stop_key: stop_button
  monitor:
    stop_key: stop_button
    complete_key: copy_button
  extract:
    primary_key: copy_button
    strategy: last_by_y_atspi_only
  extra_extract:
    strategy: none
validation:
  attach_success:
    indicators:
    - name_contains: Remove # lint-allow: known p1 debt; attach-success still uses generic remove chip until exact indicator is mapped
      role_contains: button # lint-allow: known p1 debt; attach-success still uses generic role filter until exact indicator is mapped
  prompt_ready:
    check_input_value: true
  send_success:
    indicators:
    - name_contains: Stop # lint-allow: known p4 debt; send-success still keyed to substring until exact completion spec lands
      role: push button
    timeout: 30
  response_complete:
    indicators:
    - name: Copy
      role: push button
    stop_absent: true
  auto_active:
    best_effort: true
    indicators:
    - name: "Auto Chooses Fast or Expert"
      role: menu item
  fast_active:
    best_effort: true
    indicators:
    - name: "Fast Quick responses"
      role: menu item
  expert_active:
    best_effort: true
    indicators:
    - name: "Expert Thinks hard"
      role: menu item
  heavy_active:
    best_effort: true
    indicators:
    - name: "Heavy Team of Experts"
      role: menu item
