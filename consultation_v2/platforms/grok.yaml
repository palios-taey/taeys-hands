platform: grok
click_strategy: xdotool_first
urls:
  fresh: https://grok.com/
  verify_navigation: true
tree:
  fence_after: []
  exclude:
    names:
    - Toggle Sidebar
    - pfp
    - Web page favicon
    - Markdown
    roles:
    - separator
    - document web
    - list item
    - paragraph
    - image
  sidebar_nav:
  - name: Home page
    role: link
  - name: Search
    role: push button
  - name: Chat
    role: link
  - name: Voice
    role: link
  - name: Imagine
    role: link
  - name: Projects
    role: push button
  - name: History
    role: push button
  element_map:
    # --- composer / input (document snapshot, LIVE-CONFIRMED :5 2026-06-03) ---
    # The composer is exposed as role "entry" with name "Ask Grok anything"
    # (states editable, focusable, focused, multi line). Prompt entry + send
    # (focus this entry + Enter) both key off this. Matched EXACTLY.
    input:
      name: "Ask Grok anything"
      role: entry
    # --- toolbar push buttons (document snapshot, EXACT from live scan :5 2026-06-03) ---
    attach_trigger:
      name: Attach
      role: push button
    model_selector:
      name: Model select
      role: push button
    # send button (LIVE-CONFIRMED :5 2026-06-03). The composer is MULTI-LINE, so
    # Enter inserts a newline — submit is THIS exact push button, not a keystroke.
    send_button:
      name: "Submit"
      role: push button
    copy_button:
      name: Copy
      role: push button
    regenerate:
      name: Regenerate
      role: push button
    like:
      name: Like
      role: push button
    dislike:
      name: Dislike
      role: push button
    more_actions:
      name: More actions
      role: push button
    create_share_link:
      name: Create share link
      role: push button
    search:
      name: Search
      role: push button
    history:
      name: History
      role: push button
    dictation:
      name: Dictation (Ctrl+D)
      role: push button
    voice_mode:
      name: Enter voice mode (Ctrl+⇧O)
      role: push button
    # --- generating-state stop button (EXACT per 100_TIMES §1) ---
    stop_button:
      name: Stop model response
      role: push button
    # --- model/mode dropdown items (menu_snapshot after clicking Model select) ---
    model_auto:
      name: "Auto Chooses Fast or Expert"
      role: menu item
    model_fast:
      name: "Fast Powered by Grok 4.3"
      role: menu item
    model_expert:
      name: "Expert Powered by Grok 4.3"
      role: menu item
    model_heavy:
      name: "Heavy Team of Experts"
      role: menu item
    # --- attach dropdown item (menu_snapshot after clicking Attach) ---
    upload_files_item:
      name: "Upload a file"
      role: menu item
    recent_item:
      name: Recent
      role: menu item
    skills_item:
      name: Skills
      role: menu item
    connectors_item:
      name: Connectors
      role: menu item
    # --- uploaded file chip (LIVE-CONFIRMED on :5 2026-06-03). The chip's
    # accessible name is STATIC ("Open attachment Remove this attachment"), NOT
    # the filename, so it is matched EXACTLY — no structural locator needed.
    # Exposed in the DOCUMENT scope (not a React portal).
    uploaded_file_chip:
      name: "Open attachment Remove this attachment"
      role: list item
    # Static remove button — persistent, exact, present iff a file is attached.
    # This is the attach-present indicator (doc scope).
    remove_attachment:
      name: "Remove this attachment"
      role: push button
workflow:
  defaults:
    model: null
    mode: null
    tools: []
  # mode_targets: requested mode -> exact element_map key of the dropdown item.
  mode_targets:
    auto: model_auto
    fast: model_fast
    expert: model_expert
    heavy: model_heavy
  attachment:
    trigger: attach_trigger
    menu_target: upload_files_item
  prompt:
    input: input
  send:
    # Multi-line composer: submit by clicking the exact send_button, NOT Enter.
    send_key: send_button
    stop_key: stop_button
  monitor:
    stop_key: stop_button
  extract:
    primary_key: copy_button
validation:
  # mode_active: gate on the dropdown menu item carrying a selected/checked
  # state. Read ONLY inside an opened model dropdown (menu_snapshot), since the
  # persistent "Model select" button name does not expose the active model.
  auto_active:
    indicators:
    - name: "Auto Chooses Fast or Expert"
      role: menu item
      states_include:
      - selected
  fast_active:
    indicators:
    - name: "Fast Powered by Grok 4.3"
      role: menu item
      states_include:
      - selected
  expert_active:
    indicators:
    - name: "Expert Powered by Grok 4.3"
      role: menu item
      states_include:
      - selected
  heavy_active:
    indicators:
    - name: "Heavy Team of Experts"
      role: menu item
      states_include:
      - selected
  # attach_present: presence of the static remove button (doc scope). Its name
  # is static (the filename is dynamic, the button name is not), so it is an
  # EXACT indicator — no structural locator. LIVE-CONFIRMED on :5 2026-06-03.
  attach_present:
    indicators:
    - name: "Remove this attachment"
      role: push button
  # send_fired: the stop button is present (generating).
  send_fired:
    stop_present: stop_button
  # response_complete: the stop button is GONE (persistent-element gate).
  response_complete:
    stop_absent: stop_button
settle:
  default_ms: 2000
  navigate_ms: 4000
  attach_ms: 3000
  rescan_attempts: 1

# ============================================================================
# IMAGINE surface — separate flow from chat. URL = https://grok.com/imagine.
# LIVE-CONFIRMED on :10 2026-06-04 (x-claude c64 quirk-post image generation).
# ============================================================================
imagine:
  url: https://grok.com/imagine
  input:
    note: |
      Imagine is out of scope for consultation_v2 chat runs. No coordinate
      fallback is defined here; consult flows must not try to drive this
      surface.

  # Submitted prompts return a panel grid. Each panel has 3 elements:
  #   - the IMAGE itself (the panel art) — top region of the card
  #   - a SAVE button (saves to Grok project, NOT to disk) — below the image
  #   - a like/heart icon overlay (top-right of image, only on hover)
  # The image content occupies y < save_button_y. Right-clicking on the
  # IMAGE (not the Save button, not page background between panels) opens the
  # standard Firefox image context menu with "Save Image..." as the 2nd entry.
  # Right-clicking on page background gives the generic page menu (no image
  # options), which is the failure mode to avoid.
  panel_grid:
    image_role: image
    # Top-row image centers on 1920x1080: approximately
    # (887, 286), (1223, 286), (1559, 286) when displayed in default Discover
    # layout (3 across). Save buttons sit BELOW at y=358. Image content body
    # extends from approximately y=120 to y=340 — right-click in the y=180-300
    # range to hit the image element rather than the Save button.
    image_centers_top_row: [[887, 220], [1223, 220], [1559, 220]]
    save_button_role: push button
    save_button_name: Save
    save_button_y_top_row: 358
    save_button_note: |
      Save button saves to Grok project (in-app library), NOT to disk. To
      download an actual image file you must use the browser's "Save Image..."
      flow via right-click on the panel image.

  # ===== DOWNLOAD FLOW =====
  download:
    # 1) Right-click on the panel image (use a y-coordinate in the image body,
    #    not on the Save button at y=358).
    step_1_right_click:
      action: right_click
      target: panel_image_center
      example_coord: [1223, 220]
    # 2) Firefox image context menu opens. "Save Image..." is the second item.
    #    AT-SPI role "menu item" does NOT expose this — it's a native browser
    #    context menu. Use keyboard navigation: Down twice + Return.
    step_2_select_save_image:
      action: keyboard
      sequence: ["Down", "Down", "Return"]
      alt_method: |
        Right-click the panel image, then press 'v' (Firefox accelerator key
        for "Save Image..."). Less reliable across Firefox versions; arrow-key
        navigation is preferred.
    # 3) Save File dialog opens with filename "Untitled.jpeg" pre-selected.
    #    Ctrl+A to select the field, type new name, Return to save.
    step_3_save_dialog:
      filename_field_focused: true
      default_filename: "Untitled.jpeg"
      action: keyboard
      sequence:
        - "ctrl+a"
        - "type:{custom_filename}"
        - "Return"
      save_path: "~/Downloads/{custom_filename}"
      file_extension_note: |
        Default extension is .jpeg. If you provide a name WITHOUT extension,
        Firefox saves with no extension (must rename after). Provide the
        custom filename WITH ".jpg" / ".jpeg" extension explicitly to avoid.
    # 4) Verify the file landed at ~/Downloads/{filename}. Typical sizes:
    #    1024x768 -> 200-500 KB JPEG.
    step_4_verify:
      target_directory: "~/Downloads"
      typical_size_bytes_min: 100000
      typical_size_bytes_max: 800000

  # ===== ANTI-PATTERNS (confirmed failures, captured 2026-06-04) =====
  anti_patterns:
    - id: "save_button_is_not_download"
      symptom: "Clicking the panel's 'Save' button does nothing visible to disk."
      explanation: "That button saves to Grok's in-app library, not to ~/Downloads."
      fix: "Use the right-click → Save Image flow above."
    - id: "right_click_on_page_background"
      symptom: "Right-click context menu shows generic page options (View Page Source, etc.) — no 'Save Image...' entry."
      explanation: "Click landed in the gap between panels or on the Save button row, not on the image element."
      fix: "Aim for the IMAGE BODY (e.g., y=220 for top-row panels at 1920x1080). Re-screenshot to verify if uncertain."
    - id: "screenshot_substitute"
      symptom: "Cropping a screenshot of the panel and using that as the image."
      explanation: "Results in a low-resolution, header-included, off-aspect crop. NOT the actual generated image."
      fix: "Always use the download flow above. The actual generated image is ~784x1168 or similar full resolution."
    - id: "ctrl_w_closes_imagine_tab"
      symptom: "After view-source or other tab work, Ctrl+W closes the imagine tab and lands on a different page."
      explanation: "Ctrl+W closes the active tab. If imagine was the active tab, it's gone."
      fix: "Re-navigate to https://grok.com/imagine. The session is preserved (results in History sidebar)."
