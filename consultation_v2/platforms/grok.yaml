platform: grok
click_strategy: xdotool_first
urls:
  fresh: https://grok.com/
  verify_navigation: true
tree:
  fence_after: []
  exclude:
    names:
    - Toggle Sidebar
    - pfp
    - Web page favicon
    - Markdown
    roles:
    - separator
    - document web
    - list item
    - paragraph
    - image
  sidebar_nav:
  - name: Home page
    role: link
  - name: Search
    role: push button
  - name: Chat
    role: link
  - name: Voice
    role: link
  - name: Imagine
    role: link
  - name: Projects
    role: push button
  - name: History
    role: push button
  element_map:
    # --- composer / input (document snapshot) ---
    # Grok composer is a contenteditable exposed as role "section" with an
    # empty name; matched by exact role + exact persistent AT-SPI states.
    input:
      name: ""
      role: section
      states_include:
      - editable
      - focusable
    # --- toolbar push buttons (document snapshot, EXACT from live scan :5 2026-06-03) ---
    attach_trigger:
      name: Attach
      role: push button
    model_selector:
      name: Model select
      role: push button
    copy_button:
      name: Copy
      role: push button
    regenerate:
      name: Regenerate
      role: push button
    like:
      name: Like
      role: push button
    dislike:
      name: Dislike
      role: push button
    more_actions:
      name: More actions
      role: push button
    create_share_link:
      name: Create share link
      role: push button
    search:
      name: Search
      role: push button
    history:
      name: History
      role: push button
    dictation:
      name: Dictation (Ctrl+D)
      role: push button
    voice_mode:
      name: Enter voice mode (Ctrl+⇧O)
      role: push button
    # --- generating-state stop button (EXACT per 100_TIMES §1) ---
    stop_button:
      name: Stop model response
      role: push button
    # --- model/mode dropdown items (menu_snapshot after clicking Model select) ---
    model_auto:
      name: "Auto Chooses Fast or Expert"
      role: menu item
    model_fast:
      name: "Fast Powered by Grok 4.3"
      role: menu item
    model_expert:
      name: "Expert Powered by Grok 4.3"
      role: menu item
    model_heavy:
      name: "Heavy Team of Experts"
      role: menu item
    # --- attach dropdown item (menu_snapshot after clicking Attach) ---
    upload_files_item:
      name: "Upload a file"
      role: menu item
    # --- uploaded file chip (inherently-dynamic leaf: timestamped filename).
    # Matched STRUCTURALLY (exact role + exact parent key + ordinal), never by
    # its text. NEEDS LIVE CONFIRMATION on :5 — the live scan did not capture
    # the chip container, so parent/role/ordinal are best-effort exact values.
    uploaded_file_chip:
      structural:
        role: list item
        parent: input
        ordinal: last
        name_must_be_nonempty: true
workflow:
  defaults:
    model: null
    mode: null
    tools: []
  # mode_targets: requested mode -> exact element_map key of the dropdown item.
  mode_targets:
    auto: model_auto
    fast: model_fast
    expert: model_expert
    heavy: model_heavy
  attachment:
    trigger: attach_trigger
    menu_target: upload_files_item
  prompt:
    input: input
  send:
    submit_via_return: true
    stop_key: stop_button
  monitor:
    stop_key: stop_button
  extract:
    primary_key: copy_button
validation:
  # mode_active: gate on the dropdown menu item carrying a selected/checked
  # state. Read ONLY inside an opened model dropdown (menu_snapshot), since the
  # persistent "Model select" button name does not expose the active model.
  auto_active:
    indicators:
    - name: "Auto Chooses Fast or Expert"
      role: menu item
      states_include:
      - selected
  fast_active:
    indicators:
    - name: "Fast Powered by Grok 4.3"
      role: menu item
      states_include:
      - selected
  expert_active:
    indicators:
    - name: "Expert Powered by Grok 4.3"
      role: menu item
      states_include:
      - selected
  heavy_active:
    indicators:
    - name: "Heavy Team of Experts"
      role: menu item
      states_include:
      - selected
  # attach_present: presence of the structural file chip (its text, not matched).
  attach_present:
    file_chip: uploaded_file_chip
  # send_fired: the stop button is present (generating).
  send_fired:
    stop_present: stop_button
  # response_complete: the stop button is GONE (persistent-element gate).
  response_complete:
    stop_absent: stop_button
