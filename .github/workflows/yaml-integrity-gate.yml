name: YAML Integrity Gate

on:
  pull_request:
  push:
    branches:
      - main
      - consultation-v2-isolated-drivers
      - 'agent/**'
      - 'fix/**'
      - 'feat/**'

jobs:
  consultation-v2-integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install gate dependencies
        run: pip install pyyaml

      - name: Run consultation_v2 integrity gate
        run: python3 consultation_v2/validators/lint_no_yaml_silent_fallbacks.py --all

      - name: Run consultation_v2 contract gate
        run: python3 consultation_v2/validators/lint_consultation_v2_contract.py --all
